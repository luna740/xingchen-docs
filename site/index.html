oading=\"lazy\"\u003e\u003c/figure\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/login-success-extra.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e登录成功后，【WhatsApp 账号】会加入到【星辰客服系统】中，后续可绑定坐席并进行业务操作。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e四、下一步：绑定坐席\u003c/h2\u003e\n\u003cp\u003e账号登录到星辰客服系统后，如需由坐席继续操作，请参考：\u003ca href=\"#8a8a83d08de3e1db318905f2\"\u003e如何将 WhatsApp 账号与坐席进行绑定\u003c/a\u003e\u003c/p\u003e"},{"id":"b72601dc3d6015a537f1e7bc","title":"在线、输入中状态上线和说明","updatedAt":"2026-03-23T08:49:04.770Z","searchText":"在线、输入中所有情况均已完备上线  1、官方中存在bug,看不看到对方在线;  在隐私有权限的情况下，还是看官方心情的如图，互加通讯录且互发过消息，真机环境存在看不到对方在线也存在看不到对方在线    2、官方中存在bug,看不到群在线人数;  不管是管理员还是普通成员，真机环境存在看不到群在线的情况，也存在能看到群在线的情况    3、官方中存在bug,每个人看到的群在线人数不一致    4、结论，这个功能是上线了，看不到，同一个群不同人看到的数目和显示不对都是正常情况，官方让每个人看的就是不一样的 ","html":"\u003cp\u003e在线、输入中所有情况均已完备上线\u003c/p\u003e\n\u003cp\u003e1、官方中存在bug,看不看到对方在线;\u003c/p\u003e\n\u003cp\u003e在隐私有权限的情况下，还是看官方心情的如图，互加通讯录且互发过消息，真机环境存在看不到对方在线也存在看不到对方在线\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/VdR4GLiqhI-a4a20828f6.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e2、官方中存在bug,看不到群在线人数;\u003c/p\u003e\n\u003cp\u003e不管是管理员还是普通成员，真机环境存在看不到群在线的情况，也存在能看到群在线的情况\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/uEMo7MQK3B-b3a99a44f4.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e3、官方中存在bug,每个人看到的群在线人数不一致\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/QHBvUoLE5S-92c71b4e29.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e4、结论，这个功能是上线了，看不到，同一个群不同人看到的数目和显示不对都是正常情况，官方让每个人看的就是不一样的\u003c/p\u003e"}]},{"category":{"id":"0adb1147b3a9b5455385bc91","name":"常见问题","articlesCount":13},"articles":[{"id":"a2980b63aff5e5944f3a8147","title":"提问模板以及视频录制教程","updatedAt":"2026-05-20T22:13:32+08:00","searchText":"  本文说明如何通过自助提交模块反馈问题，以及如何补充截图和录屏，方便问题更快被记录、定位和处理。    \u003e 注意：星辰需要能复现问题后才能准确处理。请按  /q  或  /qx  格式提交，普通聊天不会触发机器人记录。     一、自助提交模块说明  为了更好、更快响应问题，反馈时请使用自助提交模块。机器人会根据命令格式记录问题，并对缺少关键信息的提交进行提示。  1. 涉及 WhatsApp 号码的问题，使用  /q  提交。 2. 涉及坐席账号或管理员账号的问题，使用  /qx  提交。 3.  /q  和  /qx  必须放在消息开头。 4. 普通聊天不会触发机器人记录。     二、号码问题提交格式  涉及 WhatsApp 号码的问题，请使用以下格式：     text /q 号码 截图 问题描述      提交要求：  1.  /q  不可缺少，缺少后机器人不会记录为问题。 2.  号码  不可缺少，缺少号码时机器人会提示补充号码。 3.  截图  需要能判断问题发生的位置，例如是哪个私聊对话、哪个群、哪个账号页面。 4.  问题描述  需要说明异常现象和期望结果。 5. 如果截图内容无法判断问题发生位置，机器人会提示补充更完整的截图。  示例：     text /q 86135    3252 截图 发送消息失败，页面提示发送异常      \u003e 提示：涉及少于 5 个号码时，建议列出全部号码；涉及超过 5 个号码时，至少列出 5 个典型号码，并附对应截图。     三、坐席或管理员问题提交格式  涉及坐席账号或管理员账号的问题，请使用以下格式：     text /qx 坐席账号或者管理员账号 截图 问题描述      提交要求：  1.  /qx  必须放在消息开头。 2.  /qx  命令不审核内容，请自行确认账号、截图和问题描述是否完整。 3. 截图需要能看出发生问题的页面位置。 4. 问题描述需要说明具体操作和异常表现。  示例：     text /qx admin001 截图 坐席列表打开后无法新增坐席         四、截图和录屏要求  1. 截图请保留网址下方的完整页面区域，不能只截局部按钮或局部提示。 2. 录屏请从进入问题页面前开始，直到异常提示出现为止。 3. 如果问题可以稳定复现，请优先提供录屏。 4. 截图或录屏中需要能判断问题发生的账号、对话、群或页面。          五、使用 PowerPoint 录屏  PowerPoint 2013 及以上版本可以直接录制屏幕。  1. 打开 PowerPoint。 2. 点击顶部【插入】选项卡。 3. 点击右侧【屏幕录制】。 4. 点击【选择区域】，拖动选择需要录制的范围。 5. 如需全屏录制，可按  Windows + Shift + F 。 6. 点击红色【录制】按钮，倒计时结束后开始录制。 7. 操作完成后点击【停止】。 8. 视频会自动插入到 PPT 页面中。 9. 右键点击视频，选择【将媒体另存为】，保存为  .mp4  文件。     六、使用 LICEcap 录屏  LICEcap 适合录制较短的操作过程。  1. 安装并打开 LICEcap。 2. 调整透明录制框，让它覆盖需要录制的页面区域。 3. 点击右下角【Record】。 4. 选择保存位置和文件名。 5. 开始录制后，按正常流程复现问题。 6. 需要暂停时按  Ctrl + Alt + P 。 7. 录制完成后点击【Stop】保存文件。  \u003e 提示：录屏文件较大时，请先确认能正常打开播放，再提交给处理人员。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明如何通过自助提交模块反馈问题，以及如何补充截图和录屏，方便问题更快被记录、定位和处理。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：星辰需要能复现问题后才能准确处理。请按 `/q` 或 `/qx` 格式提交，普通聊天不会触发机器人记录。\u003c/blockquote\u003e\n\u003ch2\u003e一、自助提交模块说明\u003c/h2\u003e\n\u003cp\u003e为了更好、更快响应问题，反馈时请使用自助提交模块。机器人会根据命令格式记录问题，并对缺少关键信息的提交进行提示。\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e涉及 WhatsApp 号码的问题，使用 `/q` 提交。\u003c/li\u003e\u003cli\u003e涉及坐席账号或管理员账号的问题，使用 `/qx` 提交。\u003c/li\u003e\u003cli\u003e`/q` 和 `/qx` 必须放在消息开头。\u003c/li\u003e\u003cli\u003e普通聊天不会触发机器人记录。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、号码问题提交格式\u003c/h2\u003e\n\u003cp\u003e涉及 WhatsApp 号码的问题，请使用以下格式：\u003c/p\u003e\n\u003cp\u003e```text\u0026lt;br\u0026gt;/q 号码 截图 问题描述\u0026lt;br\u0026gt;```\u003c/p\u003e\n\u003cp\u003e提交要求：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e`/q` 不可缺少，缺少后机器人不会记录为问题。\u003c/li\u003e\u003cli\u003e`号码` 不可缺少，缺少号码时机器人会提示补充号码。\u003c/li\u003e\u003cli\u003e`截图` 需要能判断问题发生的位置，例如是哪个私聊对话、哪个群、哪个账号页面。\u003c/li\u003e\u003cli\u003e`问题描述` 需要说明异常现象和期望结果。\u003c/li\u003e\u003cli\u003e如果截图内容无法判断问题发生位置，机器人会提示补充更完整的截图。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e示例：\u003c/p\u003e\n\u003cp\u003e```text\u0026lt;br\u0026gt;/q 86135****3252 截图 发送消息失败，页面提示发送异常\u0026lt;br\u0026gt;```\u003c/p\u003e\n\u003cblockquote\u003e提示：涉及少于 5 个号码时，建议列出全部号码；涉及超过 5 个号码时，至少列出 5 个典型号码，并附对应截图。\u003c/blockquote\u003e\n\u003ch2\u003e三、坐席或管理员问题提交格式\u003c/h2\u003e\n\u003cp\u003e涉及坐席账号或管理员账号的问题，请使用以下格式：\u003c/p\u003e\n\u003cp\u003e```text\u0026lt;br\u0026gt;/qx 坐席账号或者管理员账号 截图 问题描述\u0026lt;br\u0026gt;```\u003c/p\u003e\n\u003cp\u003e提交要求：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e`/qx` 必须放在消息开头。\u003c/li\u003e\u003cli\u003e`/qx` 命令不审核内容，请自行确认账号、截图和问题描述是否完整。\u003c/li\u003e\u003cli\u003e截图需要能看出发生问题的页面位置。\u003c/li\u003e\u003cli\u003e问题描述需要说明具体操作和异常表现。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e示例：\u003c/p\u003e\n\u003cp\u003e```text\u0026lt;br\u0026gt;/qx admin001 截图 坐席列表打开后无法新增坐席\u0026lt;br\u0026gt;```\u003c/p\u003e\n\u003ch2\u003e四、截图和录屏要求\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e截图请保留网址下方的完整页面区域，不能只截局部按钮或局部提示。\u003c/li\u003e\u003cli\u003e录屏请从进入问题页面前开始，直到异常提示出现为止。\u003c/li\u003e\u003cli\u003e如果问题可以稳定复现，请优先提供录屏。\u003c/li\u003e\u003cli\u003e截图或录屏中需要能判断问题发生的账号、对话、群或页面。\u003cfigure\u003e\u003cimg src=\"./assets/images/qIqSjlcDnb-e885b51932.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e五、使用 PowerPoint 录屏\u003c/h2\u003e\n\u003cp\u003ePowerPoint 2013 及以上版本可以直接录制屏幕。\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e打开 PowerPoint。\u003c/li\u003e\u003cli\u003e点击顶部【插入】选项卡。\u003c/li\u003e\u003cli\u003e点击右侧【屏幕录制】。\u003c/li\u003e\u003cli\u003e点击【选择区域】，拖动选择需要录制的范围。\u003c/li\u003e\u003cli\u003e如需全屏录制，可按 `Windows + Shift + F`。\u003c/li\u003e\u003cli\u003e点击红色【录制】按钮，倒计时结束后开始录制。\u003c/li\u003e\u003cli\u003e操作完成后点击【停止】。\u003c/li\u003e\u003cli\u003e视频会自动插入到 PPT 页面中。\u003c/li\u003e\u003cli\u003e右键点击视频，选择【将媒体另存为】，保存为 `.mp4` 文件。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e六、使用 LICEcap 录屏\u003c/h2\u003e\n\u003cp\u003eLICEcap 适合录制较短的操作过程。\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e安装并打开 LICEcap。\u003c/li\u003e\u003cli\u003e调整透明录制框，让它覆盖需要录制的页面区域。\u003c/li\u003e\u003cli\u003e点击右下角【Record】。\u003c/li\u003e\u003cli\u003e选择保存位置和文件名。\u003c/li\u003e\u003cli\u003e开始录制后，按正常流程复现问题。\u003c/li\u003e\u003cli\u003e需要暂停时按 `Ctrl + Alt + P`。\u003c/li\u003e\u003cli\u003e录制完成后点击【Stop】保存文件。\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e提示：录屏文件较大时，请先确认能正常打开播放，再提交给处理人员。\u003c/blockquote\u003e"},{"id":"017fd6fd9859424b3e429587","title":"什么是盾牌超能力","updatedAt":"2026-05-20T22:36:54+08:00","searchText":"  本文说明盾牌超能力的含义、获取方式、查看入口，以及使用时需要注意的风险。    \u003e 注意：盾牌表示该粉丝与星辰协议账号之间已经建立过可信互动，可用于判断是否适合主动发起聊天；但不建议为了使用功能去频繁点击【加好友】。     一、什么是盾牌超能力  盾牌超能力是星辰用于识别可信粉丝的标识。账号拥有盾牌后，可以更清楚地判断哪些粉丝适合主动聊天、建群或邀请进群。  盾牌的核心作用：  1. 帮助坐席判断对方是否为可信互动对象。 2. 降低主动发消息时触发风控的概率。 3. 支持星辰协议账号之间共享可信标识。 4. 不需要先加好友，也可以基于已有对话进行后续操作。     二、盾牌如何产生  只要粉丝主动发消息，或者回复过你的消息，就会获取盾牌标识。  所有星辰协议的盾牌标识是共享的。例如账号 A 获取了粉丝 1 的盾牌，账号 B 或新注册账号 C 也可以直接向粉丝 1 发起聊天，并降低触发风控的风险。       三、如何查看是否有盾牌      方法一：通过联系人搜索查看  在联系人搜索中查看目标账号，如果该账号有盾牌标识，说明已经属于可信互动对象。        方法二：通过群组或社群成员查看  进入群组或社群成员列表，找到对应成员后点击【发信息】。进入聊天会话后，可以查看对方是否有盾牌标识。       四、不要为了盾牌去加好友  接粉收发消息本身没有风控问题，但【加好友】操作存在封号风险。根据目前统计，不管是主动添加还是被动添加好友，都可能被官方统计并触发风控。  \u003e 建议：不要点击【加好友】按钮。不加好友不影响聊天、建群、邀请进群等功能。       五、有盾牌后可以做什么  不需要将对方加为好友。只要双方已经产生对话，并且对方带有盾牌，就可以继续进行以下操作：  1. 主动发起聊天。 2. 拉对方组建群组。 3. 邀请对方进入群组。     ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明盾牌超能力的含义、获取方式、查看入口，以及使用时需要注意的风险。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：盾牌表示该粉丝与星辰协议账号之间已经建立过可信互动，可用于判断是否适合主动发起聊天；但不建议为了使用功能去频繁点击【加好友】。\u003c/blockquote\u003e\n\u003ch2\u003e一、什么是盾牌超能力\u003c/h2\u003e\n\u003cp\u003e盾牌超能力是星辰用于识别可信粉丝的标识。账号拥有盾牌后，可以更清楚地判断哪些粉丝适合主动聊天、建群或邀请进群。\u003c/p\u003e\n\u003cp\u003e盾牌的核心作用：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e帮助坐席判断对方是否为可信互动对象。\u003c/li\u003e\u003cli\u003e降低主动发消息时触发风控的概率。\u003c/li\u003e\u003cli\u003e支持星辰协议账号之间共享可信标识。\u003c/li\u003e\u003cli\u003e不需要先加好友，也可以基于已有对话进行后续操作。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、盾牌如何产生\u003c/h2\u003e\n\u003cp\u003e只要粉丝主动发消息，或者回复过你的消息，就会获取盾牌标识。\u003c/p\u003e\n\u003cp\u003e所有星辰协议的盾牌标识是共享的。例如账号 A 获取了粉丝 1 的盾牌，账号 B 或新注册账号 C 也可以直接向粉丝 1 发起聊天，并降低触发风控的风险。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/2Hxz9mvm83-c9874a0d4f.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e三、如何查看是否有盾牌\u003c/h2\u003e\n\u003ch3\u003e方法一：通过联系人搜索查看\u003c/h3\u003e\n\u003cp\u003e在联系人搜索中查看目标账号，如果该账号有盾牌标识，说明已经属于可信互动对象。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/DrNF3J4ryC-861e19482d.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch3\u003e方法二：通过群组或社群成员查看\u003c/h3\u003e\n\u003cp\u003e进入群组或社群成员列表，找到对应成员后点击【发信息】。进入聊天会话后，可以查看对方是否有盾牌标识。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/uJ5ty8kwJt-4b8d2f926e.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、不要为了盾牌去加好友\u003c/h2\u003e\n\u003cp\u003e接粉收发消息本身没有风控问题，但【加好友】操作存在封号风险。根据目前统计，不管是主动添加还是被动添加好友，都可能被官方统计并触发风控。\u003c/p\u003e\n\u003cblockquote\u003e建议：不要点击【加好友】按钮。不加好友不影响聊天、建群、邀请进群等功能。\u003c/blockquote\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/2fHd-fpX-c-c7415006a6.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e五、有盾牌后可以做什么\u003c/h2\u003e\n\u003cp\u003e不需要将对方加为好友。只要双方已经产生对话，并且对方带有盾牌，就可以继续进行以下操作：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e主动发起聊天。\u003c/li\u003e\u003cli\u003e拉对方组建群组。\u003c/li\u003e\u003cli\u003e邀请对方进入群组。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/4mfZKZNJDW-eac52f4cdb.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/1DLGvZrOGr-355cba8670.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"},{"id":"d4fe0f681bdbb9233865dd6b","title":"星辰相比江河优势在哪里","updatedAt":"2026-05-20T23:00:25+08:00","searchText":"  星辰相比江河的核心优势，是上号后可以脱离手机集中管理，并把账号、坐席、分组、IP、进粉统计等操作统一放在 Web 端完成。       一、上号后可脱离手机操作  星辰登录 WhatsApp 账号后，可以在后台直接管理账号，不需要长期依赖手机操作。  主要优势：  1. 不需要额外安装插件。 2. 不需要先创建分组激活码。 3. 可以直接在后台完成登录上号。 4. 上号后可脱离手机进行后续操作。       二、功能集中在 Web 端  星辰把常用管理操作集中在 Web 端，减少多系统、多设备来回切换。  可直接操作的能力包括：  1. 分组绑定。 2. 坐席绑定。 3. IP 购买。 4. 账号解封申请。 5. 解封后的复接登录。 6. 服务端 24 小时保持 WhatsApp 在线。     三、进粉统计更稳定  星辰进粉不依赖用户本地网络，粉丝数据更新更快，统计更稳定。  表现为：  1. 粉丝信息更准确。 2. 数据同步更快。 3. 不容易出现卡粉。 4. 进粉后可以更快用于后续业务操作。       四、坐席系统更适合集中管理  星辰提供坐席系统，操作体验接近 WhatsApp 网页端，适合团队批量集中管理账号。  坐席系统可以用于：  1. 查看账号和会话信息。 2. 操作私聊和群聊。 3. 管理群组和社群。 4. 让后台和坐席分工协作。       五、适合什么场景  如果团队需要批量管理 WhatsApp 账号、统一分配坐席、稳定统计进粉、减少手机依赖，星辰会比单纯依赖江河更适合集中化运营。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e星辰相比江河的核心优势，是上号后可以脱离手机集中管理，并把账号、坐席、分组、IP、进粉统计等操作统一放在 Web 端完成。\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e一、上号后可脱离手机操作\u003c/h2\u003e\n\u003cp\u003e星辰登录 WhatsApp 账号后，可以在后台直接管理账号，不需要长期依赖手机操作。\u003c/p\u003e\n\u003cp\u003e主要优势：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e不需要额外安装插件。\u003c/li\u003e\u003cli\u003e不需要先创建分组激活码。\u003c/li\u003e\u003cli\u003e可以直接在后台完成登录上号。\u003c/li\u003e\u003cli\u003e上号后可脱离手机进行后续操作。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/U2WCdVWw8R-eb78cb4f37.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e二、功能集中在 Web 端\u003c/h2\u003e\n\u003cp\u003e星辰把常用管理操作集中在 Web 端，减少多系统、多设备来回切换。\u003c/p\u003e\n\u003cp\u003e可直接操作的能力包括：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e分组绑定。\u003c/li\u003e\u003cli\u003e坐席绑定。\u003c/li\u003e\u003cli\u003eIP 购买。\u003c/li\u003e\u003cli\u003e账号解封申请。\u003c/li\u003e\u003cli\u003e解封后的复接登录。\u003c/li\u003e\u003cli\u003e服务端 24 小时保持 WhatsApp 在线。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、进粉统计更稳定\u003c/h2\u003e\n\u003cp\u003e星辰进粉不依赖用户本地网络，粉丝数据更新更快，统计更稳定。\u003c/p\u003e\n\u003cp\u003e表现为：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e粉丝信息更准确。\u003c/li\u003e\u003cli\u003e数据同步更快。\u003c/li\u003e\u003cli\u003e不容易出现卡粉。\u003c/li\u003e\u003cli\u003e进粉后可以更快用于后续业务操作。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/-H5WM8U_Mc-01ec03bc23.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、坐席系统更适合集中管理\u003c/h2\u003e\n\u003cp\u003e星辰提供坐席系统，操作体验接近 WhatsApp 网页端，适合团队批量集中管理账号。\u003c/p\u003e\n\u003cp\u003e坐席系统可以用于：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e查看账号和会话信息。\u003c/li\u003e\u003cli\u003e操作私聊和群聊。\u003c/li\u003e\u003cli\u003e管理群组和社群。\u003c/li\u003e\u003cli\u003e让后台和坐席分工协作。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/EYfCDIV0Vd-c82b266249.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e五、适合什么场景\u003c/h2\u003e\n\u003cp\u003e如果团队需要批量管理 WhatsApp 账号、统一分配坐席、稳定统计进粉、减少手机依赖，星辰会比单纯依赖江河更适合集中化运营。\u003c/p\u003e"},{"id":"07e22c3e84fe58064e09a284","title":"为什么不建议加好友","updatedAt":"2026-05-20T22:44:03+08:00","searchText":"  本文说明为什么不建议在星辰中频繁点击【加好友】，以及有盾牌和无盾牌账号在页面上的区别。    \u003e 注意：不加好友不影响聊天、建群、邀请进群等正常功能。为了降低账号风控风险，建议不要主动点击【加好友】。     一、为什么不建议加好友  根据当前统计，不管是主动添加好友，还是被动添加好友，都可能被官方记录并触发风控。  加好友可能带来的风险：  1. 增加账号被官方风控的概率。 2. 增加账号被限制或封禁的风险。 3. 大量、频繁点击【加好友】更容易被识别为异常操作。     二、什么情况下会显示加好友按钮  只有带有信任盾牌的账号，页面才会显示【添加好友】按钮。没有信任盾牌的账号，不会显示该按钮。  有信任盾牌时，页面会显示添加好友入口：    没有信任盾牌时，页面不会显示添加好友入口：       三、推荐怎么做  1. 不要为了使用功能去点击【加好友】。 2. 只要已经产生对话，并且对方有盾牌，就可以正常聊天。 3. 建群、邀请进群等操作不依赖加好友。 4. 如果业务必须操作，请控制频率，不要短时间大量点击。  \u003e 建议：优先通过正常聊天、群聊、邀请进群完成业务，不要把【加好友】作为常规操作。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明为什么不建议在星辰中频繁点击【加好友】，以及有盾牌和无盾牌账号在页面上的区别。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：不加好友不影响聊天、建群、邀请进群等正常功能。为了降低账号风控风险，建议不要主动点击【加好友】。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么不建议加好友\u003c/h2\u003e\n\u003cp\u003e根据当前统计，不管是主动添加好友，还是被动添加好友，都可能被官方记录并触发风控。\u003c/p\u003e\n\u003cp\u003e加好友可能带来的风险：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e增加账号被官方风控的概率。\u003c/li\u003e\u003cli\u003e增加账号被限制或封禁的风险。\u003c/li\u003e\u003cli\u003e大量、频繁点击【加好友】更容易被识别为异常操作。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、什么情况下会显示加好友按钮\u003c/h2\u003e\n\u003cp\u003e只有带有信任盾牌的账号，页面才会显示【添加好友】按钮。没有信任盾牌的账号，不会显示该按钮。\u003c/p\u003e\n\u003cp\u003e有信任盾牌时，页面会显示添加好友入口：\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/pXXBreV0yY-1030fe8236.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e没有信任盾牌时，页面不会显示添加好友入口：\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/MR0aO9KIo2-dcc96a89e8.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e三、推荐怎么做\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e不要为了使用功能去点击【加好友】。\u003c/li\u003e\u003cli\u003e只要已经产生对话，并且对方有盾牌，就可以正常聊天。\u003c/li\u003e\u003cli\u003e建群、邀请进群等操作不依赖加好友。\u003c/li\u003e\u003cli\u003e如果业务必须操作，请控制频率，不要短时间大量点击。\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e建议：优先通过正常聊天、群聊、邀请进群完成业务，不要把【加好友】作为常规操作。\u003c/blockquote\u003e"},{"id":"4f6105e4d0d02911ec7af302","title":"我在江河上接粉，在星辰上我可以主动打招呼吗","updatedAt":"2026-05-20T22:50:11+08:00","searchText":"  可以。江河上已经产生互动的粉丝，同步到星辰后会带有盾牌，星辰账号可以主动搜索并打招呼。    \u003e 提示：江河上的盾牌同步到星辰通常需要一点时间，最迟约 10 分钟。     一、可以主动打招呼的前提  需要先满足以下条件：  1. 粉丝已经在江河上给账号发送过消息，或与账号产生过互动。 2. 该粉丝的盾牌状态已经同步到星辰。 3. 在星辰中搜索该粉丝时，可以看到盾牌标识。  满足以上条件后，在星辰上主动发起聊天，通常不会因为主动打招呼触发风控。     二、江河上先产生互动  1. 新号先给江河上的账号发送消息。 2. 江河侧产生互动记录后，系统会同步盾牌状态。       三、星辰上搜索并打招呼  1. 回到星辰系统。 2. 搜索刚才在江河上产生互动的粉丝。 3. 确认该粉丝已经显示盾牌。 4. 进入会话后，可以主动发送消息。         四、注意事项  1. 如果刚在江河上接粉，星辰暂时没有显示盾牌，请等待同步完成后再操作。 2. 不建议在没有盾牌的情况下批量主动打招呼。 3. 主动打招呼不需要先加好友，只要有盾牌并产生会话即可。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e可以。江河上已经产生互动的粉丝，同步到星辰后会带有盾牌，星辰账号可以主动搜索并打招呼。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e提示：江河上的盾牌同步到星辰通常需要一点时间，最迟约 10 分钟。\u003c/blockquote\u003e\n\u003ch2\u003e一、可以主动打招呼的前提\u003c/h2\u003e\n\u003cp\u003e需要先满足以下条件：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e粉丝已经在江河上给账号发送过消息，或与账号产生过互动。\u003c/li\u003e\u003cli\u003e该粉丝的盾牌状态已经同步到星辰。\u003c/li\u003e\u003cli\u003e在星辰中搜索该粉丝时，可以看到盾牌标识。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e满足以上条件后，在星辰上主动发起聊天，通常不会因为主动打招呼触发风控。\u003c/p\u003e\n\u003ch2\u003e二、江河上先产生互动\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e新号先给江河上的账号发送消息。\u003c/li\u003e\u003cli\u003e江河侧产生互动记录后，系统会同步盾牌状态。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/GyRGxnG9ka-9276d2e040.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e三、星辰上搜索并打招呼\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e回到星辰系统。\u003c/li\u003e\u003cli\u003e搜索刚才在江河上产生互动的粉丝。\u003c/li\u003e\u003cli\u003e确认该粉丝已经显示盾牌。\u003c/li\u003e\u003cli\u003e进入会话后，可以主动发送消息。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/TEoPhE_qKt-61d8c0f356.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/P0IS5HRTm5-2d8c5db65d.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、注意事项\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e如果刚在江河上接粉，星辰暂时没有显示盾牌，请等待同步完成后再操作。\u003c/li\u003e\u003cli\u003e不建议在没有盾牌的情况下批量主动打招呼。\u003c/li\u003e\u003cli\u003e主动打招呼不需要先加好友，只要有盾牌并产生会话即可。\u003c/li\u003e\u003c/ol\u003e"},{"id":"63e2871f32f32b3994cef5d6","title":"为什么不建议通过上传通讯录加好友","updatedAt":"2026-05-20T22:56:33+08:00","searchText":"  因为盾牌超能力的原因，业务操作并不需要加好友。上传通讯录批量加好友会增加账号风控风险，不建议作为常规操作。    关于加好友风险，请先参考： 为什么不建议加好友  ./为什么不建议加好友.md      一、为什么不建议上传通讯录加好友  上传通讯录的本质是批量导入联系人并尝试建立好友关系。该操作容易被官方识别为异常加好友行为，尤其在短时间内批量处理时，风险更高。  主要风险：  1. 批量加好友容易触发官方风控。 2. 账号可能被限制、掉线或封禁。 3. 加好友并不是聊天、建群、邀请进群的必要条件。 4. 业务上已有盾牌能力时，通常可以直接聊天，不需要额外添加好友。     二、业务应该怎么做  1. 优先通过正常对话建立联系。 2. 对方有盾牌时，可以直接主动聊天。 3. 建群或邀请进群不依赖加好友。 4. 如果必须导入联系人，请先确认业务必要性，并控制数量和频率。     三、上传通讯录入口说明  系统中仍保留上传通讯录入口，但不建议将其作为常规加好友方式。  入口位置：  1. 找到在线账号。 2. 在账号列表页面点击【上传通讯录】。 3. 系统会弹出上传通讯录窗口。    通讯录模板如下：    \u003e 建议：除非明确需要导入联系人，否则不要通过上传通讯录批量加好友。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e因为盾牌超能力的原因，业务操作并不需要加好友。上传通讯录批量加好友会增加账号风控风险，不建议作为常规操作。\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e关于加好友风险，请先参考：\u003ca href=\"#07e22c3e84fe58064e09a284\"\u003e为什么不建议加好友\u003c/a\u003e\u003c/p\u003e\n\u003ch2\u003e一、为什么不建议上传通讯录加好友\u003c/h2\u003e\n\u003cp\u003e上传通讯录的本质是批量导入联系人并尝试建立好友关系。该操作容易被官方识别为异常加好友行为，尤其在短时间内批量处理时，风险更高。\u003c/p\u003e\n\u003cp\u003e主要风险：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e批量加好友容易触发官方风控。\u003c/li\u003e\u003cli\u003e账号可能被限制、掉线或封禁。\u003c/li\u003e\u003cli\u003e加好友并不是聊天、建群、邀请进群的必要条件。\u003c/li\u003e\u003cli\u003e业务上已有盾牌能力时，通常可以直接聊天，不需要额外添加好友。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、业务应该怎么做\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e优先通过正常对话建立联系。\u003c/li\u003e\u003cli\u003e对方有盾牌时，可以直接主动聊天。\u003c/li\u003e\u003cli\u003e建群或邀请进群不依赖加好友。\u003c/li\u003e\u003cli\u003e如果必须导入联系人，请先确认业务必要性，并控制数量和频率。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、上传通讯录入口说明\u003c/h2\u003e\n\u003cp\u003e系统中仍保留上传通讯录入口，但不建议将其作为常规加好友方式。\u003c/p\u003e\n\u003cp\u003e入口位置：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e找到在线账号。\u003c/li\u003e\u003cli\u003e在账号列表页面点击【上传通讯录】。\u003c/li\u003e\u003cli\u003e系统会弹出上传通讯录窗口。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/uof5OuPKAV-c73ac9b16a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e通讯录模板如下：\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/wGznuogBw1-b0b50c0bd0.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cblockquote\u003e建议：除非明确需要导入联系人，否则不要通过上传通讯录批量加好友。\u003c/blockquote\u003e"},{"id":"b72601dc3d6015a537f1e7bc","title":"为什么在线人数等状态不对","updatedAt":"2026-05-20T23:04:03+08:00","searchText":"  在线、输入中、群在线人数等状态功能已经上线。如果看到的人数或状态不一致，通常是 WhatsApp 官方显示机制导致，不代表星辰功能异常。    \u003e 结论：同一个群、同一个联系人，不同账号看到的在线状态或在线人数可能不一样，这是正常情况。     一、为什么看不到对方在线  即使双方隐私权限允许查看在线状态，也可能出现看不到对方在线的情况。  常见表现：  1. 双方已经互加通讯录。 2. 双方已经互发过消息。 3. 真机环境中仍然可能看不到对方在线。  这类情况属于 WhatsApp 官方显示机制，并不是星辰没有同步状态。       二、为什么看不到群在线人数  不管是群管理员还是普通成员，真机环境中都可能出现以下情况：  1. 有些账号能看到群在线人数。 2. 有些账号看不到群在线人数。 3. 同一时间不同账号看到的显示结果不一致。       三、为什么每个人看到的在线人数不一致  WhatsApp 官方并不会保证所有账号看到完全一致的在线人数。不同账号看到的群在线人数可能不同，这属于官方展示差异。       四、如何判断是否正常  可以按以下方式判断：  1. 如果部分账号能看到在线状态，说明功能已经生效。 2. 如果同群不同账号看到的人数不同，通常是官方显示差异。 3. 如果真机也看不到或显示不一致，说明不是星辰单独异常。  \u003e 提示：在线状态和群在线人数以 WhatsApp 官方实际返回为准。星辰只能展示官方返回的结果，不能强制让所有账号看到完全一致的状态。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e在线、输入中、群在线人数等状态功能已经上线。如果看到的人数或状态不一致，通常是 WhatsApp 官方显示机制导致，不代表星辰功能异常。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e结论：同一个群、同一个联系人，不同账号看到的在线状态或在线人数可能不一样，这是正常情况。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么看不到对方在线\u003c/h2\u003e\n\u003cp\u003e即使双方隐私权限允许查看在线状态，也可能出现看不到对方在线的情况。\u003c/p\u003e\n\u003cp\u003e常见表现：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e双方已经互加通讯录。\u003c/li\u003e\u003cli\u003e双方已经互发过消息。\u003c/li\u003e\u003cli\u003e真机环境中仍然可能看不到对方在线。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e这类情况属于 WhatsApp 官方显示机制，并不是星辰没有同步状态。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/VdR4GLiqhI-a4a20828f6.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e二、为什么看不到群在线人数\u003c/h2\u003e\n\u003cp\u003e不管是群管理员还是普通成员，真机环境中都可能出现以下情况：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e有些账号能看到群在线人数。\u003c/li\u003e\u003cli\u003e有些账号看不到群在线人数。\u003c/li\u003e\u003cli\u003e同一时间不同账号看到的显示结果不一致。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/uEMo7MQK3B-b3a99a44f4.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e三、为什么每个人看到的在线人数不一致\u003c/h2\u003e\n\u003cp\u003eWhatsApp 官方并不会保证所有账号看到完全一致的在线人数。不同账号看到的群在线人数可能不同，这属于官方展示差异。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/QHBvUoLE5S-92c71b4e29.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、如何判断是否正常\u003c/h2\u003e\n\u003cp\u003e可以按以下方式判断：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e如果部分账号能看到在线状态，说明功能已经生效。\u003c/li\u003e\u003cli\u003e如果同群不同账号看到的人数不同，通常是官方显示差异。\u003c/li\u003e\u003cli\u003e如果真机也看不到或显示不一致，说明不是星辰单独异常。\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e提示：在线状态和群在线人数以 WhatsApp 官方实际返回为准。星辰只能展示官方返回的结果，不能强制让所有账号看到完全一致的状态。\u003c/blockquote\u003e"},{"id":"4cdbbb52f226f7030f1d3595","title":"为什么我的号码解封超过1天","updatedAt":"2026-05-20T23:06:03+08:00","searchText":"  如果号码申请解封超过 1 天仍未恢复，通常说明该账号被官方判定为较高等级风控，处理时间会比普通封禁更长。    \u003e 结论：超过一天不能解封的账号，一般可能被官方判定为“欺诈”等较高封禁等级，属于永封前的高等级风控。即使一个月不能解封，也属于可能出现的情况。     一、为什么会超过 1 天还没解封  普通封禁可能较快得到结果，但高等级风控不会固定在 1 天内完成处理。  常见原因：  1. 账号被官方判定为较高风险。 2. 账号触发了更严格的审核流程。 3. 账号封禁等级接近永久封禁。 4. 官方没有明确承诺固定解封时间。     二、超过 1 天是否代表异常  不一定。超过 1 天未解封，不代表星辰没有提交申请，也不代表流程异常。解封结果和处理时长以官方审核为准。  可能出现的情况：  1. 几天后解封。 2. 长时间保持解封中。 3. 最终无法解封。 4. 被判定为永久封禁。     三、应该怎么处理  1. 按正常流程继续查看解封状态。 2. 不要频繁重复提交相同申请。 3. 如果账号长期无法恢复，按业务情况准备替代账号。 4. 如果账号最终永久封禁，可根据需要使用永封继承继续处理会话。     四、官方封禁等级参考  以下为官方封禁等级参考：   ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e如果号码申请解封超过 1 天仍未恢复，通常说明该账号被官方判定为较高等级风控，处理时间会比普通封禁更长。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e结论：超过一天不能解封的账号，一般可能被官方判定为“欺诈”等较高封禁等级，属于永封前的高等级风控。即使一个月不能解封，也属于可能出现的情况。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么会超过 1 天还没解封\u003c/h2\u003e\n\u003cp\u003e普通封禁可能较快得到结果，但高等级风控不会固定在 1 天内完成处理。\u003c/p\u003e\n\u003cp\u003e常见原因：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e账号被官方判定为较高风险。\u003c/li\u003e\u003cli\u003e账号触发了更严格的审核流程。\u003c/li\u003e\u003cli\u003e账号封禁等级接近永久封禁。\u003c/li\u003e\u003cli\u003e官方没有明确承诺固定解封时间。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、超过 1 天是否代表异常\u003c/h2\u003e\n\u003cp\u003e不一定。超过 1 天未解封，不代表星辰没有提交申请，也不代表流程异常。解封结果和处理时长以官方审核为准。\u003c/p\u003e\n\u003cp\u003e可能出现的情况：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e几天后解封。\u003c/li\u003e\u003cli\u003e长时间保持解封中。\u003c/li\u003e\u003cli\u003e最终无法解封。\u003c/li\u003e\u003cli\u003e被判定为永久封禁。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、应该怎么处理\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e按正常流程继续查看解封状态。\u003c/li\u003e\u003cli\u003e不要频繁重复提交相同申请。\u003c/li\u003e\u003cli\u003e如果账号长期无法恢复，按业务情况准备替代账号。\u003c/li\u003e\u003cli\u003e如果账号最终永久封禁，可根据需要使用永封继承继续处理会话。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e四、官方封禁等级参考\u003c/h2\u003e\n\u003cp\u003e以下为官方封禁等级参考：\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/H8_b4gVI1F-7eb85e7131.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"},{"id":"9ed854efdcee60e3469dab41","title":"为什么我的昵称别的号看到的不一样","updatedAt":"2026-05-20T23:12:29+08:00","searchText":"  不同账号看到的昵称不一致，通常是 WhatsApp 官方显示规则导致，不代表星辰同步异常。    \u003e 结论：名字显示优先级通常是【备注 \u003e 昵称 \u003e 手机号码】。如果对方给你设置了备注，对方看到的就是备注；你自己修改昵称后，对方不一定会立刻看到。     一、为什么别人看到的名字不一样  WhatsApp 的联系人名称不是所有人统一显示同一个结果。不同账号看到的名称，取决于对方本地通讯录、备注、官方同步状态等因素。  常见情况：  1. 对方给你设置了备注，对方会优先看到备注名。 2. 你修改了自己的昵称，对方只是有可能看到新昵称。 3. 如果对方暂时没有同步到你的新昵称，就仍然会看到旧名称或手机号码。 4. 很多情况下，一个账号在其他账号里显示的身份仍然是手机号码。       二、昵称修改后为什么没有立刻更新  昵称是否更新，不完全由星辰控制。即使你已经修改了昵称，对方看到的结果仍可能延迟或不变化。  可能原因：  1. 对方本地已经保存了你的备注。 2. WhatsApp 官方没有立即同步你的新昵称。 3. 对方账号当前看到的仍是号码身份。 4. 不同账号的同步时间和显示结果不一致。       三、名字显示优先级  一般情况下，显示优先级如下：  1. 备注。 2. 昵称。 3. 手机号码。  也就是说，只要对方给你设置了备注，你修改自己的昵称也不会覆盖对方本地备注。       四、如何判断是否正常  1. 如果部分账号看到新昵称、部分账号仍看到旧昵称或号码，属于正常情况。 2. 如果对方设置过备注，对方看到备注是正常情况。 3. 如果需要对方看到指定名称，需要对方本地修改备注或等待官方同步。  \u003e 提示：昵称显示以 WhatsApp 官方和对方本地通讯录规则为准，星辰不能强制所有账号立即看到同一个昵称。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e不同账号看到的昵称不一致，通常是 WhatsApp 官方显示规则导致，不代表星辰同步异常。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e结论：名字显示优先级通常是【备注 \u0026gt; 昵称 \u0026gt; 手机号码】。如果对方给你设置了备注，对方看到的就是备注；你自己修改昵称后，对方不一定会立刻看到。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么别人看到的名字不一样\u003c/h2\u003e\n\u003cp\u003eWhatsApp 的联系人名称不是所有人统一显示同一个结果。不同账号看到的名称，取决于对方本地通讯录、备注、官方同步状态等因素。\u003c/p\u003e\n\u003cp\u003e常见情况：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e对方给你设置了备注，对方会优先看到备注名。\u003c/li\u003e\u003cli\u003e你修改了自己的昵称，对方只是有可能看到新昵称。\u003c/li\u003e\u003cli\u003e如果对方暂时没有同步到你的新昵称，就仍然会看到旧名称或手机号码。\u003c/li\u003e\u003cli\u003e很多情况下，一个账号在其他账号里显示的身份仍然是手机号码。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/4SVrUYtspH-f848d9691c.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e二、昵称修改后为什么没有立刻更新\u003c/h2\u003e\n\u003cp\u003e昵称是否更新，不完全由星辰控制。即使你已经修改了昵称，对方看到的结果仍可能延迟或不变化。\u003c/p\u003e\n\u003cp\u003e可能原因：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e对方本地已经保存了你的备注。\u003c/li\u003e\u003cli\u003eWhatsApp 官方没有立即同步你的新昵称。\u003c/li\u003e\u003cli\u003e对方账号当前看到的仍是号码身份。\u003c/li\u003e\u003cli\u003e不同账号的同步时间和显示结果不一致。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/CNwjGFCnx1-f3139ccd5a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e三、名字显示优先级\u003c/h2\u003e\n\u003cp\u003e一般情况下，显示优先级如下：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e备注。\u003c/li\u003e\u003cli\u003e昵称。\u003c/li\u003e\u003cli\u003e手机号码。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e也就是说，只要对方给你设置了备注，你修改自己的昵称也不会覆盖对方本地备注。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/3wf0q_VsJ2-434cd1cc4b.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、如何判断是否正常\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e如果部分账号看到新昵称、部分账号仍看到旧昵称或号码，属于正常情况。\u003c/li\u003e\u003cli\u003e如果对方设置过备注，对方看到备注是正常情况。\u003c/li\u003e\u003cli\u003e如果需要对方看到指定名称，需要对方本地修改备注或等待官方同步。\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e提示：昵称显示以 WhatsApp 官方和对方本地通讯录规则为准，星辰不能强制所有账号立即看到同一个昵称。\u003c/blockquote\u003e"},{"id":"4dcffb42881078e696792326","title":"为什么我的头像经常“消失”","updatedAt":"2026-05-20T23:26:20+08:00","searchText":"  头像经常“消失”，通常是因为当前看到的是缓存头像或临时头像。缓存过期后，如果账号没有正式设置头像，页面就会显示为没有头像。    \u003e 建议：账号每次登录到星辰后，不管页面当前有没有显示头像，都重新设置一次头像。     一、为什么头像会消失  账号和星辰产生交互后，页面可能会显示临时头像。如果登录前该账号曾经和星辰上的账号有过互动，系统可能缓存过头像，因此登录时看起来像是已经有头像。  但这种头像不一定是账号正式设置的头像，可能只是缓存结果。缓存有有效期，过期后就会出现头像消失的情况。  常见表现：  1. 登录时看到有头像，但过一段时间头像消失。 2. 自己页面还能看到头像，其他页面或其他账号看不到。 3. 头像来自缓存，并不是账号正式上传的头像。     二、如何避免头像消失  星辰和手机端一样，账号登录后建议手动设置头像。每次登录后，即使当前页面已经显示头像，也建议重新上传并确认一次。  这样可以让头像变成账号正式设置的头像，而不是依赖临时缓存。     三、方式一：后台设置头像  1. 账号登录成功后，进入账号列表。 2. 点击【编辑头像】。 3. 上传需要使用的头像图片。 4. 点击【确认】保存。       四、方式二：坐席系统设置头像  1. 登录坐席系统。 2. 找到需要修改头像的账号。 3. 右键点击该账号，选择【修改资料】。    4. 在修改资料弹窗中点击头像按钮。 5. 选择需要上传的头像图片。 6. 保存后完成头像修改。    \u003e 提示：如果头像再次消失，请优先重新上传头像，不要只依赖页面上暂时显示的缓存头像。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e头像经常“消失”，通常是因为当前看到的是缓存头像或临时头像。缓存过期后，如果账号没有正式设置头像，页面就会显示为没有头像。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e建议：账号每次登录到星辰后，不管页面当前有没有显示头像，都重新设置一次头像。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么头像会消失\u003c/h2\u003e\n\u003cp\u003e账号和星辰产生交互后，页面可能会显示临时头像。如果登录前该账号曾经和星辰上的账号有过互动，系统可能缓存过头像，因此登录时看起来像是已经有头像。\u003c/p\u003e\n\u003cp\u003e但这种头像不一定是账号正式设置的头像，可能只是缓存结果。缓存有有效期，过期后就会出现头像消失的情况。\u003c/p\u003e\n\u003cp\u003e常见表现：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e登录时看到有头像，但过一段时间头像消失。\u003c/li\u003e\u003cli\u003e自己页面还能看到头像，其他页面或其他账号看不到。\u003c/li\u003e\u003cli\u003e头像来自缓存，并不是账号正式上传的头像。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、如何避免头像消失\u003c/h2\u003e\n\u003cp\u003e星辰和手机端一样，账号登录后建议手动设置头像。每次登录后，即使当前页面已经显示头像，也建议重新上传并确认一次。\u003c/p\u003e\n\u003cp\u003e这样可以让头像变成账号正式设置的头像，而不是依赖临时缓存。\u003c/p\u003e\n\u003ch2\u003e三、方式一：后台设置头像\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e账号登录成功后，进入账号列表。\u003c/li\u003e\u003cli\u003e点击【编辑头像】。\u003c/li\u003e\u003cli\u003e上传需要使用的头像图片。\u003c/li\u003e\u003cli\u003e点击【确认】保存。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/EFK4RD4xAv-c0d74114b0.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、方式二：坐席系统设置头像\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e登录坐席系统。\u003c/li\u003e\u003cli\u003e找到需要修改头像的账号。\u003c/li\u003e\u003cli\u003e右键点击该账号，选择【修改资料】。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/yfIaBXPHhk-a9ee5a378b.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在修改资料弹窗中点击头像按钮。\u003c/li\u003e\u003cli\u003e选择需要上传的头像图片。\u003c/li\u003e\u003cli\u003e保存后完成头像修改。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/2nr8_b1aNz-f759df22fc.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cblockquote\u003e提示：如果头像再次消失，请优先重新上传头像，不要只依赖页面上暂时显示的缓存头像。\u003c/blockquote\u003e"},{"id":"e54e9c3d3ba7b25d7e4fc735","title":"聊天记录明明存在，但是上拉没有","updatedAt":"2026-05-20T23:30:45+08:00","searchText":"  聊天记录明明存在，但上拉时加载不出来，通常是本地网络波动或浏览器临时加载异常导致。    \u003e 结论：这种情况一般不是聊天记录丢失。等待网络恢复后，刷新浏览器即可重新加载。     一、为什么会出现这种情况  聊天记录需要从服务端加载到当前浏览器页面。如果本地网络不稳定，或浏览器临时请求失败，就可能出现上拉无法加载历史记录的情况。  常见触发场景：  1. 本地网络波动。 2. 切换网络。 3. 断网后重新连接。 4. 浏览器页面长时间未刷新。     二、异常表现  网络异常时，上拉聊天窗口可能加载不出历史记录，看起来像聊天记录不存在。       三、如何处理  1. 先确认本地网络已经恢复正常。 2. 等待几分钟，让浏览器重新连接服务。 3. 刷新当前浏览器页面。 4. 重新进入会话后，再上拉查看历史聊天记录。  网络恢复并刷新浏览器后，历史记录会重新加载出来。       四、什么时候需要反馈  如果刷新后仍然无法加载，请按问题反馈模板提交：  1. 坐席账号。 2. 对应会话或群聊截图。 3. 具体操作时间。 4. 上拉加载失败的录屏。  \u003e 提示：反馈前建议先刷新浏览器并复现一次，确认不是临时网络波动。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e聊天记录明明存在，但上拉时加载不出来，通常是本地网络波动或浏览器临时加载异常导致。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e结论：这种情况一般不是聊天记录丢失。等待网络恢复后，刷新浏览器即可重新加载。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么会出现这种情况\u003c/h2\u003e\n\u003cp\u003e聊天记录需要从服务端加载到当前浏览器页面。如果本地网络不稳定，或浏览器临时请求失败，就可能出现上拉无法加载历史记录的情况。\u003c/p\u003e\n\u003cp\u003e常见触发场景：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e本地网络波动。\u003c/li\u003e\u003cli\u003e切换网络。\u003c/li\u003e\u003cli\u003e断网后重新连接。\u003c/li\u003e\u003cli\u003e浏览器页面长时间未刷新。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、异常表现\u003c/h2\u003e\n\u003cp\u003e网络异常时，上拉聊天窗口可能加载不出历史记录，看起来像聊天记录不存在。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/xeZoHIbEYD-2ed5129a11.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e三、如何处理\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e先确认本地网络已经恢复正常。\u003c/li\u003e\u003cli\u003e等待几分钟，让浏览器重新连接服务。\u003c/li\u003e\u003cli\u003e刷新当前浏览器页面。\u003c/li\u003e\u003cli\u003e重新进入会话后，再上拉查看历史聊天记录。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e网络恢复并刷新浏览器后，历史记录会重新加载出来。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/8tv7vAzFFp-33493ac2e5.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、什么时候需要反馈\u003c/h2\u003e\n\u003cp\u003e如果刷新后仍然无法加载，请按问题反馈模板提交：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e坐席账号。\u003c/li\u003e\u003cli\u003e对应会话或群聊截图。\u003c/li\u003e\u003cli\u003e具体操作时间。\u003c/li\u003e\u003cli\u003e上拉加载失败的录屏。\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e提示：反馈前建议先刷新浏览器并复现一次，确认不是临时网络波动。\u003c/blockquote\u003e"},{"id":"0060aa2996494c2ba72a6382","title":"怎么才叫养号，为什么需要养号","updatedAt":"2026-05-20T23:34:48+08:00","searchText":"  养号不是把账号登录后空挂，而是让新登录账号在合理频率下产生真实互动，让账号状态更稳定，降低登录后短期封号或掉号风险。    \u003e 注意：养号不能保证 100% 不封号，但比登录后空挂、低频挂机或集中高频操作更稳定。     一、为什么需要养号  新登录账号在 1 到 3 天内通常处于高风险期。账号刚从手机或其他环境转到星辰后，官方可能会把它识别为新的使用环境。  如果账号登录后长期空挂、没有正常聊天、没有真实群互动，或一上来就大量建群、拉人、加群，就更容易触发风控。  常见高风险行为：  1. 登录后什么都不做，只空挂。 2. 只接粉但长时间没有正常聊天。 3. 新号短时间内频繁搜索、拉人、建群。 4. 一个账号连续操作多个账号或多个群。 5. 新登录账号不绑定坐席，长期没有业务行为。     二、怎么才叫养号  养号的核心是让账号之间产生合理、分散、真实的互动。  建议动作：  1. 先确定坐席需要登录多少个号码。 2. 按正常流程登录号码，并绑定坐席。 3. 让这些号码之间按顺序互相发送消息。 4. 每次操作只处理一个目标，避免一个号连续高频操作多个目标。 5. 每隔一段时间保持正常私聊或群消息接收。  示例：如果坐席要登录 9 个号码 31 到 39，可以按业务需要建立 10 个群 32 到 41，再按分散操作方式进行内部互动。     三、内部账号互发消息  按照图中方式，让 9 个号码互相发送消息。重点是分散频率，不要让一个账号一次性连续搜索并发送给其他全部账号。  正确方式：  1. 每个号码按顺序搜索其中一个号码并发送消息。 2. 发送完成后更换下一个需要发送的号码。 3. 直到号码之间形成两两互动。  不建议方式：  1. 一个号连续搜索其他 8 个号码并发送消息。 2. 在这个阶段点击【加好友】。 3. 短时间内集中完成大量类似动作。         四、建群和拉内部成员  开始建群时，需要把建群数量平均分配到每个账号上。一个账号一次只建一个群，并拉入几个列表中的内部成员。  建议方式：  1. 按账号平均分配建群任务。 2. 每个账号一次只建一个群。 3. 建群时拉入几个内部成员。 4. 建群后保持 1 天左右的正常聊天。  不建议方式：  1. 一个账号一次性连续建多个群。 2. 内部账号通过邀请链接加群。 3. 建空群后让大量账号快速通过链接进群。  内部账号包括托号、老师号等，不管在江河还是星辰上，都建议通过主动消息和添加成员方式加入，不要通过邀请链接集中进群。  外部客户账号不属于内部养号操作范围，正常业务邀请可以按实际情况处理。         五、常见误区  1. 空挂不是养号。 2. 偶尔几个群聊几句也属于低频使用。 3. 登录 3 天内封号属于可能出现的正常风险。 4. 建空群、快速进群、接力加群都容易触发封群或封号。 5. 没有业务行为的新登录账号更容易被判断为异常。     六、风险说明  星辰的养号建议来自大量账号使用和长期测试经验，对账号稳定性有帮助，但不能保证一定不封号。  如果账号在新登录期被封，可按正常流程申请解封并复接。养号的目标是降低风险，不是完全消除官方风控。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e养号不是把账号登录后空挂，而是让新登录账号在合理频率下产生真实互动，让账号状态更稳定，降低登录后短期封号或掉号风险。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：养号不能保证 100% 不封号，但比登录后空挂、低频挂机或集中高频操作更稳定。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么需要养号\u003c/h2\u003e\n\u003cp\u003e新登录账号在 1 到 3 天内通常处于高风险期。账号刚从手机或其他环境转到星辰后，官方可能会把它识别为新的使用环境。\u003c/p\u003e\n\u003cp\u003e如果账号登录后长期空挂、没有正常聊天、没有真实群互动，或一上来就大量建群、拉人、加群，就更容易触发风控。\u003c/p\u003e\n\u003cp\u003e常见高风险行为：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e登录后什么都不做，只空挂。\u003c/li\u003e\u003cli\u003e只接粉但长时间没有正常聊天。\u003c/li\u003e\u003cli\u003e新号短时间内频繁搜索、拉人、建群。\u003c/li\u003e\u003cli\u003e一个账号连续操作多个账号或多个群。\u003c/li\u003e\u003cli\u003e新登录账号不绑定坐席，长期没有业务行为。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、怎么才叫养号\u003c/h2\u003e\n\u003cp\u003e养号的核心是让账号之间产生合理、分散、真实的互动。\u003c/p\u003e\n\u003cp\u003e建议动作：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e先确定坐席需要登录多少个号码。\u003c/li\u003e\u003cli\u003e按正常流程登录号码，并绑定坐席。\u003c/li\u003e\u003cli\u003e让这些号码之间按顺序互相发送消息。\u003c/li\u003e\u003cli\u003e每次操作只处理一个目标，避免一个号连续高频操作多个目标。\u003c/li\u003e\u003cli\u003e每隔一段时间保持正常私聊或群消息接收。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e示例：如果坐席要登录 9 个号码 31 到 39，可以按业务需要建立 10 个群 32 到 41，再按分散操作方式进行内部互动。\u003c/p\u003e\n\u003ch2\u003e三、内部账号互发消息\u003c/h2\u003e\n\u003cp\u003e按照图中方式，让 9 个号码互相发送消息。重点是分散频率，不要让一个账号一次性连续搜索并发送给其他全部账号。\u003c/p\u003e\n\u003cp\u003e正确方式：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e每个号码按顺序搜索其中一个号码并发送消息。\u003c/li\u003e\u003cli\u003e发送完成后更换下一个需要发送的号码。\u003c/li\u003e\u003cli\u003e直到号码之间形成两两互动。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e不建议方式：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e一个号连续搜索其他 8 个号码并发送消息。\u003c/li\u003e\u003cli\u003e在这个阶段点击【加好友】。\u003c/li\u003e\u003cli\u003e短时间内集中完成大量类似动作。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/W2-fV5y6Mv-ecb5faeb33.gif\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/5yfek8Rsfl-caf16493f4.gif\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、建群和拉内部成员\u003c/h2\u003e\n\u003cp\u003e开始建群时，需要把建群数量平均分配到每个账号上。一个账号一次只建一个群，并拉入几个列表中的内部成员。\u003c/p\u003e\n\u003cp\u003e建议方式：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e按账号平均分配建群任务。\u003c/li\u003e\u003cli\u003e每个账号一次只建一个群。\u003c/li\u003e\u003cli\u003e建群时拉入几个内部成员。\u003c/li\u003e\u003cli\u003e建群后保持 1 天左右的正常聊天。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e不建议方式：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e一个账号一次性连续建多个群。\u003c/li\u003e\u003cli\u003e内部账号通过邀请链接加群。\u003c/li\u003e\u003cli\u003e建空群后让大量账号快速通过链接进群。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e内部账号包括托号、老师号等，不管在江河还是星辰上，都建议通过主动消息和添加成员方式加入，不要通过邀请链接集中进群。\u003c/p\u003e\n\u003cp\u003e外部客户账号不属于内部养号操作范围，正常业务邀请可以按实际情况处理。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/U-6vNH9HaJ-5a1adc80b3.gif\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/OIKu4_8QXx-a1d4f8ae54.gif\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e五、常见误区\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e空挂不是养号。\u003c/li\u003e\u003cli\u003e偶尔几个群聊几句也属于低频使用。\u003c/li\u003e\u003cli\u003e登录 3 天内封号属于可能出现的正常风险。\u003c/li\u003e\u003cli\u003e建空群、快速进群、接力加群都容易触发封群或封号。\u003c/li\u003e\u003cli\u003e没有业务行为的新登录账号更容易被判断为异常。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e六、风险说明\u003c/h2\u003e\n\u003cp\u003e星辰的养号建议来自大量账号使用和长期测试经验，对账号稳定性有帮助，但不能保证一定不封号。\u003c/p\u003e\n\u003cp\u003e如果账号在新登录期被封，可按正常流程申请解封并复接。养号的目标是降低风险，不是完全消除官方风控。\u003c/p\u003e"},{"id":"ea107f14108e37be0264001f","title":"为什么解封后看不到消息（消息不能解密）","updatedAt":"2026-05-22T10:55:00+08:00","searchText":"  账号解封后，如果封号期间收到的离线消息无法显示，或提示消息不能解密，通常是官方端到端加密机制导致的结果。    \u003e 结论：封号期间产生的离线消息不一定都能解密，是否能恢复只以官方机制为准。包括官方 App、江河、星辰在内，都没有任何方式可以强制解密已经无法解密的离线消息。       一、为什么会出现这种情况  WhatsApp 消息采用端到端加密。账号被封期间，账号状态、设备连接、密钥同步等环节都可能受到影响。  因此，解封后可能出现以下情况：  1. 部分离线消息可以正常显示。 2. 部分离线消息无法解密。 3. 对方已经发送过消息，但当前账号看不到具体内容。 4. 页面提示消息不能解密或需要等待重新同步。  这种情况【不是星辰主动拦截消息】，也【不是通过后台操作就能恢复的内容】。     二、能不能通过技术手段解密  不能。  离线消息能否解密，取决于官方的端到端加密和密钥同步结果。只要官方没有为当前账号提供可用的解密条件，星辰也无法绕过官方机制读取消息内容。  需要注意：  1. 可以用自己的其他号码收发消息，验证当前账号的消息收发功能是否正常。 2. 对于显示消息延迟的粉丝，后续消息是否正常，要以账号解封并恢复在线后的实际收发为准。也就是说，需要引导粉丝重新发送消息，才能判断在线后是否正常。 3. 如果粉丝重新发送后仍然解密失败，但其他号码给你发消息都能正常解密，说明粉丝那边也产生了端到端加密问题，这种情况没有额外方法可以解决。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e账号解封后，如果封号期间收到的离线消息无法显示，或提示消息不能解密，通常是官方端到端加密机制导致的结果。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e结论：封号期间产生的离线消息不一定都能解密，是否能恢复只以官方机制为准。包括官方 App、江河、星辰在内，都没有任何方式可以强制解密已经无法解密的离线消息。\u003c/blockquote\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/faq-message-decrypt-425f5e764b.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e一、为什么会出现这种情况\u003c/h2\u003e\n\u003cp\u003eWhatsApp 消息采用端到端加密。账号被封期间，账号状态、设备连接、密钥同步等环节都可能受到影响。\u003c/p\u003e\n\u003cp\u003e因此，解封后可能出现以下情况：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e部分离线消息可以正常显示。\u003c/li\u003e\u003cli\u003e部分离线消息无法解密。\u003c/li\u003e\u003cli\u003e对方已经发送过消息，但当前账号看不到具体内容。\u003c/li\u003e\u003cli\u003e页面提示消息不能解密或需要等待重新同步。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e这种情况【不是星辰主动拦截消息】，也【不是通过后台操作就能恢复的内容】。\u003c/p\u003e\n\u003ch2\u003e二、能不能通过技术手段解密\u003c/h2\u003e\n\u003cp\u003e不能。\u003c/p\u003e\n\u003cp\u003e离线消息能否解密，取决于官方的端到端加密和密钥同步结果。只要官方没有为当前账号提供可用的解密条件，星辰也无法绕过官方机制读取消息内容。\u003c/p\u003e\n\u003cp\u003e需要注意：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e可以用自己的其他号码收发消息，验证当前账号的消息收发功能是否正常。\u003c/li\u003e\u003cli\u003e对于显示消息延迟的粉丝，后续消息是否正常，要以账号解封并恢复在线后的实际收发为准。也就是说，需要引导粉丝重新发送消息，才能判断在线后是否正常。\u003c/li\u003e\u003cli\u003e如果粉丝重新发送后仍然解密失败，但其他号码给你发消息都能正常解密，说明粉丝那边也产生了端到端加密问题，这种情况没有额外方法可以解决。\u003c/li\u003e\u003c/ol\u003e"}]},{"category":{"id":"99b0c70c8141a65f6608a0dd","name":"测试结果","articlesCount":1},"articles":[{"id":"4c12206ddddf3471b6e3e5c0","title":"20260515新版星辰注册/登录测试","updatedAt":"2026-05-20T23:39:49+08:00","searchText":"  本次测试结论：新版星辰注册 / 登录逻辑目前测试正常。除人为输错验证码外，注册、转移、复接失败大多来自官方限制，不是星辰流程异常。       一、测试结论  新版注册 / 登录逻辑更新后，测试结果显示：  1. 正常号码可以完成注册。 2. 正常号码可以完成登录。 3. 正常号码可以完成转移。 4. 正常号码可以完成复接。 5. 失败场景主要集中在官方限制、号码风控或验证码输入错误。     二、失败通常是什么原因  如果出现注册、登录、转移或复接失败，常见原因如下：  1. 验证码人为输入错误。 2. 官方限制当前号码继续登录。 3. 官方限制当前号码转移设备。 4. 官方限制当前号码复接。 5. 号码处于实时风控状态。  \u003e 说明：最终能否发码、登录、转移或复接，以 WhatsApp 官方实时返回为准。     三、遇到失败应该怎么处理  如果遇到失败，不建议短时间内连续重复尝试。  建议按以下间隔处理：  1. 第一次失败后，间隔半天再试。 2. 仍然失败，间隔 1 天再试。 3. 继续失败，间隔 2 天后再试。  除【代理失败，请重试】外，其他红色失败提示不要短时间多次点击重试。重复操作对发码没有帮助，反而可能加重风控。     四、测试截图参考     ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本次测试结论：新版星辰注册 / 登录逻辑目前测试正常。除人为输错验证码外，注册、转移、复接失败大多来自官方限制，不是星辰流程异常。\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e一、测试结论\u003c/h2\u003e\n\u003cp\u003e新版注册 / 登录逻辑更新后，测试结果显示：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e正常号码可以完成注册。\u003c/li\u003e\u003cli\u003e正常号码可以完成登录。\u003c/li\u003e\u003cli\u003e正常号码可以完成转移。\u003c/li\u003e\u003cli\u003e正常号码可以完成复接。\u003c/li\u003e\u003cli\u003e失败场景主要集中在官方限制、号码风控或验证码输入错误。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、失败通常是什么原因\u003c/h2\u003e\n\u003cp\u003e如果出现注册、登录、转移或复接失败，常见原因如下：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e验证码人为输入错误。\u003c/li\u003e\u003cli\u003e官方限制当前号码继续登录。\u003c/li\u003e\u003cli\u003e官方限制当前号码转移设备。\u003c/li\u003e\u003cli\u003e官方限制当前号码复接。\u003c/li\u003e\u003cli\u003e号码处于实时风控状态。\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e说明：最终能否发码、登录、转移或复接，以 WhatsApp 官方实时返回为准。\u003c/blockquote\u003e\n\u003ch2\u003e三、遇到失败应该怎么处理\u003c/h2\u003e\n\u003cp\u003e如果遇到失败，不建议短时间内连续重复尝试。\u003c/p\u003e\n\u003cp\u003e建议按以下间隔处理：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e第一次失败后，间隔半天再试。\u003c/li\u003e\u003cli\u003e仍然失败，间隔 1 天再试。\u003c/li\u003e\u003cli\u003e继续失败，间隔 2 天后再试。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e除【代理失败，请重试】外，其他红色失败提示不要短时间多次点击重试。重复操作对发码没有帮助，反而可能加重风控。\u003c/p\u003e\n\u003ch2\u003e四、测试截图参考\u003c/h2\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/Co6YOTqh94-8b15aac078.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/aPQmLbOQXF-0f8db9b040.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"}]},{"category":{"id":"73b8dad54e02a3073ff9354f","name":"封控","articlesCount":1},"articles":[{"id":"4cdbbb52f226f7030f1d3595","title":"为什么我的号码解封超过1天","updatedAt":"2026-05-14T07:37:43.075Z","searchText":"  “超过一天不能解封的账号，一般被官方判定封号等级是欺诈，属于永封前的最高等级风控，就算一个月不能解封也是正常的”    官网封禁等级表   ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e“超过一天不能解封的账号，一般被官方判定封号等级是欺诈，属于永封前的最高等级风控，就算一个月不能解封也是正常的”\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e官网封禁等级表\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/H8_b4gVI1F-7eb85e7131.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"}]},{"category":{"id":"d988a9b6a14e4c05600cb0de","name":"星辰使用建议","articlesCount":2},"articles":[{"id":"4c12206ddddf3471b6e3e5c0","title":"20260515新版星辰注册/登录测试","updatedAt":"2026-05-15T05:40:54.420Z","searchText":"星辰的注册/登录逻辑更新后统计，除了人为输错验证码，最终的注册/转移/复接都是官方限制不让的原因；故此新版的登录目前测试注册没有问题；如遇到任何注册、登录、转移、复接失败的情况，按照半天、一天、两天这种间隔去操作处理；任何红色的失败除了“代理失败，请重试”，其他的失败不要短时间多次尝试，对发码没有任何帮助     ","html":"\u003cp\u003e星辰的注册/登录逻辑更新后统计，除了人为输错验证码，最终的注册/转移/复接都是官方限制不让的原因；故此新版的登录目前测试注册没有问题；如遇到任何注册、登录、转移、复接失败的情况，按照半天、一天、两天这种间隔去操作处理；任何红色的失败除了“代理失败，请重试”，其他的失败不要短时间多次尝试，对发码没有任何帮助\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/Co6YOTqh94-8b15aac078.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/aPQmLbOQXF-0f8db9b040.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"},{"id":"0060aa2996494c2ba72a6382","title":"关于登录、登录养号、炒群前准备","updatedAt":"2026-03-23T12:26:21.348Z","searchText":"  一、登录前确定坐席要登录多少个号码，这个坐席要对所有号码按照如下操作进行登录养号，可以保证会比不做任何操作空挂，或者做自以为是的养号操作更加稳定：    1、假设坐席要登录9个号码31-39，建10个群32-41；（业务按实际调整登录号码和建群数量）按照正常流程登录号码，并绑定坐席  2、按照图1,9个号码相互发送消息，必须严格按照图中的方式：         2.1图中方式是每个号码以前通过搜索其中一个号码发消息，发完每个号码，改变需要发送的号码，直到每个号码两两互发消息         2.2不允许的操作：一个号搜索其他8个号码发消息，再操作其他号码，这个操作结果跟2.1一样，但是性质完全不同，会造成频率过快，不允许         2.3不允许的操作：不允许在这个阶段点击加好友按钮，下面注意说明会说明原因      3、开始建群，按照下图，一共需要建多少个群，平均分到每个号上，一个号一次建一个群，必须拉上几个列表中的内部成员         3.1 不允许的操作，一个号平均要建两个群，然后一次性建两个群，这个和建议操作结果一样，但是性质完全不同，会造成频率过快，不允许         3.2 不允许的操作：内部账号（托号、老师号不管是江河还是星辰上） 都不能通过邀请链接加群，只能按照图3，给内部账号发个主动消息，然后通过“添加成员”、“邀请-使用 WhatsApp 发送链接” 添加目标         3.3 外部账号（客户） 不会滥用功能，不存在快速加群导致群被封的情况，所以可以通过链接邀请对方        二、可能出现的问题说明：    1、一中的登录创号养号经验，是星辰通过超过上万个号码的使用和超过长达1年时间的测试的经验，对账号的稳定有效果，但是不是百分百保证不封号是否采纳看团队个人  2、图1、图2举例中，出现一个账号在操作中被封禁且没有其他异常，这是属于正常情况，官方对于登录的封禁一般是会持续两天，两天内任何情况下掉号都是合理的，掉号只能申请解封复接，这样循环。再次强调，建议参考星辰的操作。  3、目前已知空挂（不干任何操作）的号码，登录3天内大概率会封号，建议按照一的方式操作，并保持每隔2个小时左右在内部群发消息，让所有挂号接收到消息，增加账号健壮性  4、目前已知创建群不拉人（建空群），群加入太快都会造成封群，或者暂时无法加群，严重甚至会封号，建议操作的方式是按照一中3操作，每个管理员星辰预留一周的使用测试的适应时间、会配合查询疑问一周，一周后再有疑问星辰不予回答，也没法回答，请自行接受结果，封号的申请解封，没封号的等一天号再做同样的操作  5、以下任何操作封号都是正常情况：         5.1、登录三天内封号（任何正常操作，只要时间不超过都有可能被登录检测封号）         5.2、新登录期（3天内）长时间低频使用封号（空挂号、只接粉后长时间挂机、有加群但是群消息稀少包括但不限于任何低频使用账号）         5.3、新登录不绑定坐席（不绑坐席肯定没业务属于挂空挡） ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e一、登录前确定坐席要登录多少个号码，这个坐席要对所有号码按照如下操作进行登录养号，可以保证会比不做任何操作空挂，或者做自以为是的养号操作更加稳定：\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e1、假设坐席要登录9个号码31-39，建10个群32-41；（业务按实际调整登录号码和建群数量）按照正常流程登录号码，并绑定坐席\u003c/p\u003e\n\u003cp\u003e2、按照图1,9个号码相互发送消息，必须严格按照图中的方式：\u0026lt;br\u0026gt;        2.1图中方式是每个号码以前通过搜索其中一个号码发消息，发完每个号码，改变需要发送的号码，直到每个号码两两互发消息\u0026lt;br\u0026gt;        2.2不允许的操作：一个号搜索其他8个号码发消息，再操作其他号码，这个操作结果跟2.1一样，但是性质完全不同，会造成频率过快，不允许\u0026lt;br\u0026gt;        2.3不允许的操作：不允许在这个阶段点击加好友按钮，下面注意说明会说明原因\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/W2-fV5y6Mv-ecb5faeb33.gif\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/5yfek8Rsfl-caf16493f4.gif\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e3、开始建群，按照下图，一共需要建多少个群，平均分到每个号上，一个号一次建一个群，必须拉上几个列表中的内部成员\u0026lt;br\u0026gt;        3.1 不允许的操作，一个号平均要建两个群，然后一次性建两个群，这个和建议操作结果一样，但是性质完全不同，会造成频率过快，不允许\u0026lt;br\u0026gt;        3.2 不允许的操作：内部账号（托号、老师号不管是江河还是星辰上） 都不能通过邀请链接加群，只能按照图3，给内部账号发个主动消息，然后通过“添加成员”、“邀请-使用 WhatsApp 发送链接” 添加目标\u0026lt;br\u0026gt;        3.3 外部账号（客户） 不会滥用功能，不存在快速加群导致群被封的情况，所以可以通过链接邀请对方\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/U-6vNH9HaJ-5a1adc80b3.gif\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/OIKu4_8QXx-a1d4f8ae54.gif\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cstrong\u003e二、可能出现的问题说明：\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e1、一中的登录创号养号经验，是星辰通过超过上万个号码的使用和超过长达1年时间的测试的经验，对账号的稳定有效果，但是不是百分百保证不封号是否采纳看团队个人\u003c/p\u003e\n\u003cp\u003e2、图1、图2举例中，出现一个账号在操作中被封禁且没有其他异常，这是属于正常情况，官方对于登录的封禁一般是会持续两天，两天内任何情况下掉号都是合理的，掉号只能申请解封复接，这样循环。再次强调，建议参考星辰的操作。\u003c/p\u003e\n\u003cp\u003e3、目前已知空挂（不干任何操作）的号码，登录3天内大概率会封号，建议按照一的方式操作，并保持每隔2个小时左右在内部群发消息，让所有挂号接收到消息，增加账号健壮性\u003c/p\u003e\n\u003cp\u003e4、目前已知创建群不拉人（建空群），群加入太快都会造成封群，或者暂时无法加群，严重甚至会封号，建议操作的方式是按照一中3操作，每个管理员星辰预留一周的使用测试的适应时间、会配合查询疑问一周，一周后再有疑问星辰不予回答，也没法回答，请自行接受结果，封号的申请解封，没封号的等一天号再做同样的操作\u003c/p\u003e\n\u003cp\u003e5、以下任何操作封号都是正常情况：\u0026lt;br\u0026gt;        5.1、登录三天内封号（任何正常操作，只要时间不超过都有可能被登录检测封号）\u0026lt;br\u0026gt;        5.2、新登录期（3天内）长时间低频使用封号（空挂号、只接粉后长时间挂机、有加群但是群消息稀少包括但不限于任何低频使用账号）\u0026lt;br\u0026gt;        5.3、新登录不绑定坐席（不绑坐席肯定没业务属于挂空挡）\u003c/p\u003e"}]},{"category":{"id":"49cdf9206dcb5e7bc148aeb9","name":"星辰whatsapp协议常见问题","articlesCount":11},"articles":[{"id":"1c522ec54fecab318aa17fdc","title":"关于添加好友","updatedAt":"2026-03-12T01:06:31.590Z","searchText":"   1、有信任盾牌账号才会显示添加好友按钮，没有信任盾牌没有添加按钮     注：已知不管是主动还是被动添加好友官方都会统计触发风控，不建议点击加好友，不加好友不影响任何功能  有信任    无信任   ","html":"\u003ch2\u003e1、有信任盾牌账号才会显示添加好友按钮，没有信任盾牌没有添加按钮\u003c/h2\u003e\n\u003ch2\u003e注：已知不管是主动还是被动添加好友官方都会统计触发风控，不建议点击加好友，不加好友不影响任何功能\u003c/h2\u003e\n\u003cp\u003e有信任\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/pXXBreV0yY-1030fe8236.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e无信任\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/MR0aO9KIo2-dcc96a89e8.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"},{"id":"07e22c3e84fe58064e09a284","title":"关于验证码登录时弹窗“未知异常”","updatedAt":"2026-03-04T05:57:42.956Z","searchText":"能收到验证码，正常号码100%会成功，出现此问题，需要自行把号码登录任意手机，把号码修复到正常再转移上星辰   不管号码有没开二次验证，官方要求新登录确实要二次验证，一切以官方为准    ","html":"\u003cp\u003e能收到验证码，正常号码100%会成功，出现此问题，需要自行把号码登录任意手机，把号码修复到正常再转移上星辰\u0026lt;br\u0026gt;(不管号码有没开二次验证，官方要求新登录确实要二次验证，一切以官方为准)\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/kcFKHaDeZu-07d831c7ef.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"},{"id":"e54e9c3d3ba7b25d7e4fc735","title":"聊天记录明明存在，但是上拉没有","updatedAt":"2026-03-11T08:27:59.806Z","searchText":"原因：本地网络波动，几分钟后刷新浏览器解决  模拟切换网络、断网重连，出现加载不出记录发到情况    待网络正常，刷新浏览器后解决:   ","html":"\u003cp\u003e原因：本地网络波动，几分钟后刷新浏览器解决\u003c/p\u003e\n\u003cp\u003e模拟切换网络、断网重连，出现加载不出记录发到情况\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/xeZoHIbEYD-2ed5129a11.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e待网络正常，刷新浏览器后解决:\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/8tv7vAzFFp-33493ac2e5.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"},{"id":"130e72704a7ad203b64004ca","title":"签名的介绍","updatedAt":"2026-03-31T07:01:12.703Z","searchText":"在后管设置签名：打开WhatsApp列表，点击编辑签名，弹出弹窗，可以编辑签名，设置时间，点击确认按钮    签名设置成功，且有倒计时    在坐席设置签名：找到账号，右键点击修改资料按钮    弹出弹窗，点击设置状态按钮    输入状态，选择时间，点击保存按钮    设置成功      同个账号后管和坐席的签名状态是同步的      签名过期的含义 比如你签名设置了24小时的笑脸在线 24小时01分就是已过期 别人再看你的签名就是默认签名    放在不动有没有关系   ","html":"\u003cp\u003e在后管设置签名：打开WhatsApp列表，点击编辑签名，弹出弹窗，可以编辑签名，设置时间，点击确认按钮\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/00-Q4__ldx-c468a1edd9.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e签名设置成功，且有倒计时\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/YUjwMXQ0kY-564face54a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e在坐席设置签名：找到账号，右键点击修改资料按钮\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/CheHjt8G_D-00a8fa2357.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e弹出弹窗，点击设置状态按钮\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/jb4q3ZDS68-924d7ba60a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e输入状态，选择时间，点击保存按钮\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/CzIWTEG0g0-5ea58bcfce.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e设置成功\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/1kmhf85z3T-a475c95616.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cstrong\u003e同个账号后管和坐席的签名状态是同步的\u003c/strong\u003e\u003c/p\u003e\n\u003cp class=\"lead\"\u003e\u003cstrong\u003e签名过期的含义\u0026lt;br\u0026gt;比如你签名设置了24小时的笑脸在线 24小时01分就是已过期 别人再看你的签名就是默认签名\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e放在不动有没有关系\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/3V6pQosC5a-de3ec60d9a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"},{"id":"7d0b620f82cc816acc54d963","title":"如何重置坐席密码且登录坐席修改密码","updatedAt":"2026-03-27T09:22:50.687Z","searchText":"   如何重置坐席密码  1、打开坐席列表，找到要重置坐席密码的账号，点击重置密码    2、点击确认按钮    3、密码重置成功，需要复制，不然关闭后就看不到了       登录坐席后如何修改密码  1、登录坐席后，点开账号的下拉按钮，再点击修改密码按钮    2、输入旧密码和新密码，点击修改按钮，完成修改   ","html":"\u003ch2\u003e如何重置坐席密码\u003c/h2\u003e\n\u003cp\u003e1、打开坐席列表，找到要重置坐席密码的账号，点击重置密码\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/lm7x-0GI7i-0e031829ee.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e2、点击确认按钮\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/vkqUHMZJMj-a848c491f7.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e3、密码重置成功，需要复制，不然关闭后就看不到了\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/EhEUTQU6yf-09ef3b8056.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e登录坐席后如何修改密码\u003c/h2\u003e\n\u003cp\u003e1、登录坐席后，点开账号的下拉按钮，再点击修改密码按钮\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/1Vj9GJxSyV-9fd85f590c.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e2、输入旧密码和新密码，点击修改按钮，完成修改\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/Xwibvo6HN9-78f0c8c468.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"},{"id":"a2980b63aff5e5944f3a8147","title":"提问模板以及视频录制教程","updatedAt":"2026-03-25T09:32:47.295Z","searchText":"涉及少于5个号码号码需要全列，多于5个号码列5个，列多少个号码带多少个号码的截图，截图必须是除了网址以下的所有界面       必须按格式提交，星辰必须要复现问题，才能解决问题，减少沟通成本，快速定位和处理问题。     不涉及号码的问题，提供坐席或者管理员     有些问题需要录屏可以使用PowerPoin或者LICEcap  PowerPoint 屏幕录制详细步骤  2013及以上版本  打开工具： 打开PowerPoint，切换到【插入】选项卡，在最右侧点击【屏幕录制】。选择区域： 点击【选择区域】，使用十字光标拖动选择需要录制的屏幕范围，也可按 Windows 徽标键 + Shift + F 全屏录制。配置录制： 控制坞上默认勾选【录制音频】和【录制指针】。如需关闭，点击对应图标即可。开始录制： 点击红色【录制】按钮，倒计时结束后开始录制。录制时可点击【暂停】或【停止】。完成与保存： 录制结束后，视频会自动显示在PPT幻灯片中。另存视频： 右键点击视频框，选择【将媒体另存为...】，保存为 .mp4 格式文件。剪辑视频： 点击视频，在【播放】选项卡中选择【剪辑视频】  LICEcap 录屏详细教程 安装与启动在官网下载LICEcap后安装，双击打开程序。软件界面是一个透明的框，框内区域即为录制范围。设置与录制调整区域： 拖动透明框的边缘或角，调整大小以覆盖需要录制的内容。点击录制： 点击右下角的 \"Record\"。保存文件： 弹出的窗口中设置文件名、选择保存位置，然后点击“保存”。录制过程控制录制开始后，你可以继续操作电脑，也可以直接移动或调整LICEcap的框，调整录制范围。暂停/结束： 按下 Ctrl+Alt+P 可以暂停录制，按下 \"Stop\" 结束录制。 ","html":"\u003cp\u003e涉及少于5个号码号码需要全列，多于5个号码列5个，列多少个号码带多少个号码的截图，截图必须是除了网址以下的所有界面\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/qIqSjlcDnb-e885b51932.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e必须按格式提交，星辰必须要复现问题，才能解决问题，减少沟通成本，快速定位和处理问题。\u003c/h2\u003e\n\u003ch2\u003e不涉及号码的问题，提供坐席或者管理员\u003c/h2\u003e\n\u003ch2\u003e有些问题需要录屏可以使用PowerPoin或者LICEcap\u003c/h2\u003e\n\u003cp\u003ePowerPoint 屏幕录制详细步骤 (2013及以上版本)\u0026lt;br\u0026gt;打开工具： 打开PowerPoint，切换到【插入】选项卡，在最右侧点击【屏幕录制】。选择区域： 点击【选择区域】，使用十字光标拖动选择需要录制的屏幕范围，也可按 Windows 徽标键 + Shift + F 全屏录制。配置录制： 控制坞上默认勾选【录制音频】和【录制指针】。如需关闭，点击对应图标即可。开始录制： 点击红色【录制】按钮，倒计时结束后开始录制。录制时可点击【暂停】或【停止】。完成与保存： 录制结束后，视频会自动显示在PPT幻灯片中。另存视频： 右键点击视频框，选择【将媒体另存为...】，保存为 .mp4 格式文件。剪辑视频： 点击视频，在【播放】选项卡中选择【剪辑视频】\u003c/p\u003e\n\u003cp\u003eLICEcap 录屏详细教程\u0026lt;br\u0026gt;安装与启动在官网下载LICEcap后安装，双击打开程序。软件界面是一个透明的框，框内区域即为录制范围。设置与录制调整区域： 拖动透明框的边缘或角，调整大小以覆盖需要录制的内容。点击录制： 点击右下角的 \u0026quot;Record\u0026quot;。保存文件： 弹出的窗口中设置文件名、选择保存位置，然后点击“保存”。录制过程控制录制开始后，你可以继续操作电脑，也可以直接移动或调整LICEcap的框，调整录制范围。暂停/结束： 按下 Ctrl+Alt+P 可以暂停录制，按下 \u0026quot;Stop\u0026quot; 结束录制。\u003c/p\u003e"},{"id":"63e2871f32f32b3994cef5d6","title":"通过上传通讯录添加好友","updatedAt":"2026-03-16T09:07:16.868Z","searchText":"1、在线账号，再账号列表界面，点击上传通讯录按钮，弹出窗口 2、下载模板文件，并填写好信息，选择要上传的文件 3、点击确认按钮，就可以去坐席查看联系人列表是否有上传的好友，（如果没有显示，等待5分钟后刷新界面看看）    模板   ","html":"\u003cp\u003e1、在线账号，再账号列表界面，点击上传通讯录按钮，弹出窗口\u0026lt;br\u0026gt;2、下载模板文件，并填写好信息，选择要上传的文件\u0026lt;br\u0026gt;3、点击确认按钮，就可以去坐席查看联系人列表是否有上传的好友，（如果没有显示，等待5分钟后刷新界面看看）\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/uof5OuPKAV-c73ac9b16a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e模板\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/wGznuogBw1-b0b50c0bd0.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"},{"id":"9ed854efdcee60e3469dab41","title":"为什么我的呢称别的号看到的不一样","updatedAt":"2026-03-30T08:24:24.691Z","searchText":"对方设置了你的名字，对方就看到你的名字；你设置了自己名字，对方只是有可能看到你的名字，看不到的人就没反应，等看到才有反应，所以你们看到的其他部分号没更新最新名字，是正常结果；A号在其他号的身份99%是号码，不论A什么时候改名字，改了多少次。          名字显示优先级：备注 \u003e 昵称 \u003e 手机号码   ","html":"\u003cp\u003e对方设置了你的名字，对方就看到你的名字；你设置了自己名字，对方只是有可能看到你的名字，看不到的人就没反应，等看到才有反应，所以你们看到的其他部分号没更新最新名字，是正常结果；A号在其他号的身份99%是号码，不论A什么时候改名字，改了多少次。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/4SVrUYtspH-f848d9691c.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/CNwjGFCnx1-f3139ccd5a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/3wf0q_VsJ2-434cd1cc4b.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cstrong\u003e名字显示优先级：备注 \u0026gt; 昵称 \u0026gt; 手机号码\u003c/strong\u003e\u003c/p\u003e"},{"id":"4dcffb42881078e696792326","title":"为什么我的头像经常“消失”","updatedAt":"2026-03-29T08:44:49.898Z","searchText":"   消失的原因：  号跟星辰有交互就可能会有临时头像 ，如果是登陆前这个号跟星辰上的号有交互 缓存到他头像了 你登陆的时候看到有就没设置了 但是这种方式获取的头像是好友的头像有有效期  头像属于星辰上的共享资源 所以会实际没有 但是你还看得到头像  过期就变成消失了     怎么避免问题出现：  星辰跟手机一样每次登陆都要设置头像，每次登录后，不管有没有头像，最好重新设置一下头像  方式1、上号后，点击编辑头像，上传头像，点击确认按钮    方式2、坐席找到账号，右键点击选择修改资料    弹出修改弹窗，点击头像的按钮，选择图片，就可以修改头像   ","html":"\u003ch2\u003e消失的原因：\u003c/h2\u003e\n\u003cp\u003e号跟星辰有交互就可能会有临时头像 ，如果是登陆前这个号跟星辰上的号有交互 缓存到他头像了 你登陆的时候看到有就没设置了 但是这种方式获取的头像是好友的头像有有效期\u003c/p\u003e\n\u003cp\u003e头像属于星辰上的共享资源 所以会实际没有 但是你还看得到头像\u003c/p\u003e\n\u003cp\u003e过期就变成消失了\u003c/p\u003e\n\u003ch2\u003e怎么避免问题出现：\u003c/h2\u003e\n\u003cp\u003e星辰跟手机一样每次登陆都要设置头像，每次登录后，不管有没有头像，最好重新设置一下头像\u003c/p\u003e\n\u003cp\u003e方式1、上号后，点击编辑头像，上传头像，点击确认按钮\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/EFK4RD4xAv-c0d74114b0.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e方式2、坐席找到账号，右键点击选择修改资料\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/yfIaBXPHhk-a9ee5a378b.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e弹出修改弹窗，点击头像的按钮，选择图片，就可以修改头像\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/2nr8_b1aNz-f759df22fc.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"},{"id":"91607c6bee58eee082787eba","title":"一键已读说明文档","updatedAt":"2026-04-16T03:34:25.595Z","searchText":"  一键已读入口    账号列表右键，显示“一键已读”，效果是已读归档外的所有消息      使用建议       不要太频繁去点 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e一键已读入口\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e账号列表右键，显示“一键已读”，效果是已读归档外的所有消息\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/Xx3AATUEMB-7e6cc4ef78.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cstrong\u003e使用建议\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e不要太频繁去点\u003c/h2\u003e"},{"id":"14954024065c4b5ad2b53205","title":"账号所有状态的含义","updatedAt":"2026-03-30T08:28:26.125Z","searchText":"  登出    被官方踢出或人为转走 需要插卡复接（如下图）      离线    帐号被官方限制或者代理长时间失效下线 一般为帐号使用不当被官方限制 限制解除后任意操作会自动上线    封禁、解封中、已解封     参考解封文档  ../%E6%98%9F%E8%BE%B0Whatsapp%E4%BD%BF%E7%94%A8%E6%89%8B%E5%86%8CV2.0/%E8%B4%A6%E5%8F%B7%E8%A2%AB%E5%B0%81%EF%BC%8C%E8%A7%A3%E5%B0%81%E6%B5%81%E7%A8%8B.md     永久封禁    账号被官方永久封禁，可以通过 关联账号  ../%E6%98%9F%E8%BE%B0whatsapp%E5%8D%8F%E8%AE%AE%E4%BC%98%E5%8A%BF/%E6%98%9F%E8%BE%B0%E6%B0%B8%E4%B9%85%E5%B0%81%E5%8F%B7%EF%BC%8C%E9%A1%B6%E5%8F%B7%E5%85%B3%E8%81%94%E6%95%99%E7%A8%8B.md 转移聊天记录 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e登出\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e被官方踢出或人为转走 需要插卡复接（如下图）\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/Tmpdvn92cN-99f010990c.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cstrong\u003e离线\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e帐号被官方限制或者代理长时间失效下线 一般为帐号使用不当被官方限制 限制解除后任意操作会自动上线\u003c/p\u003e\n\u003cp class=\"lead\"\u003e\u003cstrong\u003e封禁、解封中、已解封\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#d4b3c2a02ced51eec27b6ad2\"\u003e参考解封文档\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"lead\"\u003e\u003cstrong\u003e永久封禁\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e账号被官方永久封禁，可以通过\u003ca href=\"#1bb06441c03c0b4cf92ddb34\"\u003e关联账号\u003c/a\u003e转移聊天记录\u003c/p\u003e"}]},{"category":{"id":"2d12c83ae45ca29774f16302","name":"星辰whatsapp协议优势","articlesCount":4},"articles":[{"id":"4f6105e4d0d02911ec7af302","title":"共享江河粉丝，增加主动打招呼能力","updatedAt":"2026-03-12T10:00:27.914Z","searchText":"新号给江河上的号发消息，星辰上主动搜索聊这个新号是有盾牌的且主动打招呼不封号  （江河上同步盾牌到星辰上最迟10分钟）  1、新号给江河上的号发消息    2、星辰上主动搜索聊这个新号是有盾牌，且聊天不封号     ","html":"\u003cp\u003e新号给江河上的号发消息，星辰上主动搜索聊这个新号是有盾牌的且主动打招呼不封号\u003c/p\u003e\n\u003cp\u003e（江河上同步盾牌到星辰上最迟10分钟）\u003c/p\u003e\n\u003cp\u003e1、新号给江河上的号发消息\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/GyRGxnG9ka-9276d2e040.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e2、星辰上主动搜索聊这个新号是有盾牌，且聊天不封号\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/TEoPhE_qKt-61d8c0f356.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/P0IS5HRTm5-2d8c5db65d.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"},{"id":"017fd6fd9859424b3e429587","title":"关于信任盾牌标识","updatedAt":"2026-03-20T08:39:08.828Z","searchText":"   1、为什么做信任盾牌标识：  有信任盾牌账号发信息不会触发风控，方便用户辨别对方账号是否可以主动发信息 只要粉丝主动发消息或者回复你的消息，就会获取盾牌标识  所有星辰协议的盾牌标识是共享的，假设账号A取得粉丝1的信任盾牌标识，那么账号B或者新注册的账号C一样可以直接向粉丝1发聊天并不会触发风控       2、查看联系搜索账号是否为信任账号       3、通过群组和社群，群成员列表，查看成员，点击发信息按钮，到聊天会话可以看到是否信任      接粉收发消息本身没有风控，加好友这个我们统计到这个版本会有封号风险，不加好友不影响任何功能和风控，星辰建议不要点击加好友按钮         4、不需要加对方为好友，只要产生对话，且有盾牌就可以拉对方组建群组和邀请进群     ","html":"\u003ch2\u003e1、为什么做信任盾牌标识：\u003c/h2\u003e\n\u003cp\u003e有信任盾牌账号发信息不会触发风控，方便用户辨别对方账号是否可以主动发信息\u0026lt;br\u0026gt;只要粉丝主动发消息或者回复你的消息，就会获取盾牌标识\u003c/p\u003e\n\u003cp\u003e所有星辰协议的盾牌标识是共享的，假设账号A取得粉丝1的信任盾牌标识，那么账号B或者新注册的账号C一样可以直接向粉丝1发聊天并不会触发风控\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/2Hxz9mvm83-c9874a0d4f.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e2、查看联系搜索账号是否为信任账号\u003c/h2\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/DrNF3J4ryC-861e19482d.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e3、通过群组和社群，群成员列表，查看成员，点击发信息按钮，到聊天会话可以看到是否信任\u003c/h2\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/uJ5ty8kwJt-4b8d2f926e.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cstrong\u003e接粉收发消息本身没有风控，加好友这个我们统计到这个版本会有封号风险，不加好友不影响任何功能和风控，星辰建议不要点击加好友按钮\u003c/strong\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/2fHd-fpX-c-c7415006a6.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e4、不需要加对方为好友，只要产生对话，且有盾牌就可以拉对方组建群组和邀请进群\u003c/h2\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/4mfZKZNJDW-eac52f4cdb.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/1DLGvZrOGr-355cba8670.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"},{"id":"d4fe0f681bdbb9233865dd6b","title":"可脱离手机操作账号和综合性强等优势","updatedAt":"2026-03-09T08:25:18.123Z","searchText":"  一、登录上号后，可脱离手机操作账号    不需要安装插件，不需要先创建分组激活码，直接后台登录上号，上号后可脱离手机操作      二、综合性强，所有功能都可以在web端直接操作    分组绑定、坐席绑定、ip购买、无需要挂机，服务端24小时whatsapp在线、账号解封申请和复接。    三、进粉不依赖用户网络，0卡粉，秒统计    进粉的粉丝信息更准确，数据更新更快，不会出现卡粉      四、新增坐席系统    坐席系统的操作跟WhatsApp网页端一致 方便批量集中管理平台账号、后管进入坐席系统，除了可以查看信息，还可以操作好友聊天、群组和社群等。   ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e一、登录上号后，可脱离手机操作账号\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e不需要安装插件，不需要先创建分组激活码，直接后台登录上号，上号后可脱离手机操作\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/U2WCdVWw8R-eb78cb4f37.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cstrong\u003e二、综合性强，所有功能都可以在web端直接操作\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e分组绑定、坐席绑定、ip购买、无需要挂机，服务端24小时whatsapp在线、账号解封申请和复接。\u003c/p\u003e\n\u003cp class=\"lead\"\u003e\u003cstrong\u003e三、进粉不依赖用户网络，0卡粉，秒统计\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e进粉的粉丝信息更准确，数据更新更快，不会出现卡粉\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/-H5WM8U_Mc-01ec03bc23.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cstrong\u003e四、新增坐席系统\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e坐席系统的操作跟WhatsApp网页端一致\u0026lt;br\u0026gt;方便批量集中管理平台账号、后管进入坐席系统，除了可以查看信息，还可以操作好友聊天、群组和社群等。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/EYfCDIV0Vd-c82b266249.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"},{"id":"1bb06441c03c0b4cf92ddb34","title":"星辰永久封号，顶号关联教程","updatedAt":"2026-04-02T06:10:42.170Z","searchText":"功能描述：将永久封禁的账号会话记录关联到新的账号，且一个“永久封禁”账号只能关联到一个新的账号下。  注：1、如果关联错了，解除关联在重新关联（解除关联操作在后面）2、如果没权限，找风控  关联条件： 1、有“永久封禁”状态下的账号，且有会话记录；  2、新号要绑定坐席才会出现有继承永封的功能  3、新的账号需要“在线”状态下，才可以操作顶号关联     操作流程    一、顶号关联    1、筛选“永久封禁”状态的账号，并复制需要关联的账号    2、筛选“在线”状态的账号，点击“新增关联”按钮，选择顶号关联账号（可以粘贴账号选择），点击确认。注：账号后面蓝色数字是指相同粉丝数    3、进入坐席查看关联后的数据，以下是关联前后会话列表对比  关联后（如下图）    关联前（如下图）      二、解除顶号关联    1、找出要解除顶号关联的账号，点击关联账号数下的数字，跳转到关联列表    2、在关联列表下，找要解除关联的账号，点击删除按钮，就可以解除关联   ","html":"\u003cp\u003e功能描述：将永久封禁的账号会话记录关联到新的账号，且一个“永久封禁”账号只能关联到一个新的账号下。\u003c/p\u003e\n\u003cp\u003e注：1、如果关联错了，解除关联在重新关联（解除关联操作在后面）2、如果没权限，找风控\u003c/p\u003e\n\u003cp\u003e关联条件：\u0026lt;br\u0026gt;1、有“永久封禁”状态下的账号，且有会话记录；\u003c/p\u003e\n\u003cp\u003e2、新号要绑定坐席才会出现有继承永封的功能\u003c/p\u003e\n\u003cp\u003e3、新的账号需要“在线”状态下，才可以操作顶号关联\u003c/p\u003e\n\u003ch2\u003e操作流程\u003c/h2\u003e\n\u003cp class=\"lead\"\u003e\u003cstrong\u003e一、顶号关联\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e1、筛选“永久封禁”状态的账号，并复制需要关联的账号\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/bk3FCbvQzK-e8d80987c4.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e2、筛选“在线”状态的账号，点击“新增关联”按钮，选择顶号关联账号（可以粘贴账号选择），点击确认。注：账号后面蓝色数字是指相同粉丝数\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/mpjTzb3Rle-53b82f0b5f.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e3、进入坐席查看关联后的数据，以下是关联前后会话列表对比\u003c/p\u003e\n\u003cp\u003e关联后（如下图）\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/q6XC1bLRoU-2e2b226d4d.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e关联前（如下图）\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/tIo89HPd6l-7cc9a151ea.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cstrong\u003e二、解除顶号关联\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e1、找出要解除顶号关联的账号，点击关联账号数下的数字，跳转到关联列表\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/4aZ_GyevcT-95035b1565.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e2、在关联列表下，找要解除关联的账号，点击删除按钮，就可以解除关联\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/53jFq1LrGp-6a5549252e.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"}]}]</script>
