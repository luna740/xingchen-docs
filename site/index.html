  <script id="docs-data" type="application/json">[{"category":{"id":"69a7cd855ad59c1cafe7de82","name":"星辰Whatsapp使用手册V2.0","slug":"星辰whatsapp使用手册v20","updatedAt":"2026-05-12T01:28:39.054Z","articlesCount":17},"articles":[{"id":"69a7d0daa889b919f4222ff9","slug":"星辰whatsapp使用手册v12","title":"如何在星辰登录whatsapp账号","subtitle":"","updatedAt":"2026-05-12T01:28:39.054Z","searchText":"预计要登录多少个号，找阿宝开通试用端口，一个管理员最多可以使用100个端口一个月（登录100个试用号） 购买IP： 点击左侧菜单【IP列表】，进入IP列表，IP列表可查看当前账号拥有的IP情况\n点击右侧的【购买IP】按钮，触发【购买IP】弹窗  ①下拉可选择要购买哪个国家的IP\n②选择购买的IP数量（目前IP仅支持单次购买30天）\n③选择'支付方式'（建议使用余额支付，方便后续自动续费）\n④选择'自动续费'（为避免因过期影响账号的正常使用，建议勾选并保持账号余额充足）\n⑤勾选同意《服务协议》并点击【前往支付】按钮，触发【确认订单】弹窗\n⑥确认订单无误后，点击【确认支付】按钮\n⑦弹出【支付成功】弹窗即购买端口成功\n注意：IP购买需要一定的时间发货/到账，为保证正常使用，建议提前购买IP。    将whats app账号登录到管理员账号下： ※绑定操作前建议先购买IP 1、点击扫码登录按钮，弹出登录弹窗  2、添加好正确登录信息，点击确认按钮，弹出输入验证码弹窗，输入收到的验证码，点击确认按钮   3、【WhatsApp账号】成功加入到【星辰客服系统】中，支持绑定坐席进行操作 参考文档绑定坐席 ","html":"\u003cp class=\"lead\"\u003e\u003cb\u003e预计要登录多少个号，找阿宝开通试用端口，一个管理员最多可以使用100个端口一个月（登录100个试用号）\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003ch2\u003e\u003cb\u003e购买IP：\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cp\u003e点击左侧菜单【IP列表】，进入IP列表，IP列表可查看当前账号拥有的IP情况\u003cbr /\u003e点击右侧的【购买IP】按钮，触发【购买IP】弹窗\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/zukmwa7IZW-ac64f475bc.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ezukmwa7IZW-ac64f475bc.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e①下拉可选择要购买哪个国家的IP\u003cbr /\u003e②选择购买的IP数量（目前IP仅支持单次购买30天）\u003cbr /\u003e③选择'支付方式'（建议使用余额支付，方便后续自动续费）\u003cbr /\u003e④选择'自动续费'（为避免因过期影响账号的正常使用，建议勾选并保持账号余额充足）\u003cbr /\u003e⑤勾选同意《服务协议》并点击【前往支付】按钮，触发【确认订单】弹窗\u003cbr /\u003e⑥确认订单无误后，点击【确认支付】按钮\u003cbr /\u003e⑦弹出【支付成功】弹窗即购买端口成功\u003cbr /\u003e注意：IP购买需要一定的时间发货/到账，为保证正常使用，建议提前购买IP。\u003cbr /\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/ht7o55Co4x-7f8b61a70d.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eht7o55Co4x-7f8b61a70d.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/jXLbKgRBEt-982b576941.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ejXLbKgRBEt-982b576941.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/9OKAADOYLf-be6448c8b0.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e9OKAADOYLf-be6448c8b0.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003ch2\u003e\u003cb\u003e将whats app账号登录到管理员账号下：\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cb\u003e※绑定操作前建议先购买IP\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e1、点击扫码登录按钮，弹出登录弹窗\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/8BrgAWN41H-aec3eeffd6.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e8BrgAWN41H-aec3eeffd6.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e2、添加好正确登录信息，点击确认按钮，弹出输入验证码弹窗，输入收到的验证码，点击确认按钮\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/8_tBTq4P4H-024a697adc.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e8_tBTq4P4H-024a697adc.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/u8Phpw7b7j-2ae6016992.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eu8Phpw7b7j-2ae6016992.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e3、【WhatsApp账号】成功加入到【星辰客服系统】中，支持绑定坐席进行操作\u003cbr /\u003e\u003c/p\u003e\n\u003ch2\u003e\u003cb\u003e \u003ca href=\"#69ae8108a889b919f4226b1a\" target=\"_blank\"\u003e参考文档绑定坐席\u003c/a\u003e\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e"},{"id":"69ae7df42070051cb1bb5dd5","slug":"如何将whatsapp账号与分组（工单）进行绑定：","title":"如何将whatsapp账号与分组（工单）进行绑定：","subtitle":"","updatedAt":"2026-04-02T06:13:23.150Z","searchText":"1、接粉工单号找阿宝提供，要改动工单找阿宝 2、点击左侧菜单账号管理的【WhatsApp 】按钮，进入\"WhatsApp账号列表“  3、勾选\"未绑定分组\"的WhatsApp账号后，点击【绑定分组】，触发【选择分组】弹窗   输入分配的工单号后，点击【确定】按钮，提示\"绑定成功\"即账号与分组成功绑定 ","html":"\u003cp\u003e\u003cb\u003e1、接粉工单号找阿宝提供，要改动工单找阿宝\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e2、点击左侧菜单账号管理的【WhatsApp 】按钮，进入\"WhatsApp账号列表“\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/6IOfECSlVp-12276427d4.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e6IOfECSlVp-12276427d4.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e3、勾选\"未绑定分组\"的WhatsApp账号后，点击【绑定分组】，触发【选择分组】弹窗\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/5CBwQsueXG-63264a9f6e.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e5CBwQsueXG-63264a9f6e.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/dNJVCmvQl3-a6ba1128eb.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003edNJVCmvQl3-a6ba1128eb.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cb\u003e输入分配的工单号后\u003c/b\u003e，点击【确定】按钮，提示\"绑定成功\"即账号与分组成功绑定\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/YdnKhgfMuD-c15bb87bfc.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eYdnKhgfMuD-c15bb87bfc.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69ae8108a889b919f4226b1a","slug":"如何将whatsapp账号与坐席进行绑定","title":"如何将WhatsApp账号与坐席进行绑定","subtitle":"","updatedAt":"2026-04-02T06:12:42.355Z","searchText":"“如果要更改坐席找风控” 新建座席账号 展开左侧菜单的【客服坐席】并点击【座席列表】按钮  进入【座席列表】后，点击【新增】按钮，触发【新增座席账号】弹窗   正确填写各项内容后，点击【确定】按钮，即可成功新建坐席账号  将WhatsApp账号绑定到座席 点击座席账号旁的【编辑】按钮触发编辑弹窗  点击【WhatsApp账号】旁的文本框，触发弹窗选择要绑定的WhatsApp账号  勾选要与\"座席账号\"绑定的\"WhatsApp账号\"后，点击【确定】按钮  再次点击【确定】应用\"绑定关系  提示\"编辑成功\"且\"绑定账号数\"发生变化即绑定WhatsApp账号成功。通过【坐席系统】登录后，即可操作该WhatsApp账号  坐席功能权限介绍 1、好友权限，选中好友权限后，坐席系统就可以开启查找联系人功能，不选中这个权限，就没有查找联系人这个功能。   2、群组/社群权限，选中权限后，坐席系统就可以使用创建群组和创建社群功能。不选中这个权限，就没有这个功能   3、聊天权限，选中权限后，坐席系统就可以进行私聊和群聊的聊天功能。不选中这个权限，就没有这个功能   ","html":"\u003cp\u003e\u003cp\u003e\u003cb\u003e“如果要更改坐席找风控”\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\u003c/p\u003e\n\u003ch2\u003e\u003cb\u003e新建座席账号\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cp\u003e展开左侧菜单的【客服坐席】并点击【座席列表】按钮\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/hDQb6UAHeJ-fc6d2060be.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ehDQb6UAHeJ-fc6d2060be.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e进入【座席列表】后，点击【新增】按钮，触发【新增座席账号】弹窗\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/ivDF8Eek4O-7c164b9b23.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eivDF8Eek4O-7c164b9b23.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/cunM36JQn7-b76b9026ba.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ecunM36JQn7-b76b9026ba.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e正确填写各项内容后，点击【确定】按钮，即可成功新建坐席账号\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/GsAG5kF1D7-9348d11869.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eGsAG5kF1D7-9348d11869.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003ch2\u003e\u003cb\u003e将WhatsApp账号绑定到座席\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cp\u003e点击座席账号旁的【编辑】按钮触发编辑弹窗\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/edmLwJPj8j-9b5275d1a0.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eedmLwJPj8j-9b5275d1a0.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e点击【WhatsApp账号】旁的文本框，触发弹窗选择要绑定的WhatsApp账号\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/e-N43l7OJa-5faf0eec6d.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ee-N43l7OJa-5faf0eec6d.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e勾选要与\"座席账号\"绑定的\"WhatsApp账号\"后，点击【确定】按钮\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/GqDGLUdIRf-eb927d61e8.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eGqDGLUdIRf-eb927d61e8.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e再次点击【确定】应用\"绑定关系\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/EC-WAwgfI1-9860e0f427.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eEC-WAwgfI1-9860e0f427.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e提示\"编辑成功\"且\"绑定账号数\"发生变化即绑定WhatsApp账号成功。通过【坐席系统】登录后，即可操作该WhatsApp账号\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/qTN1gsZA6V-e655212994.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eqTN1gsZA6V-e655212994.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003ch2\u003e\u003cp\u003e\u003cb\u003e坐席功能权限介绍\u003c/b\u003e\u003c/p\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cp\u003e1、\u003cb\u003e好友权限\u003c/b\u003e，选中好友权限后，坐席系统就可以开启查找联系人功能，不选中这个权限，就没有查找联系人这个功能。\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/FokS5hW5ip-1a38caa1c7.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eFokS5hW5ip-1a38caa1c7.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/hUT11-PWuR-4d72132ee5.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ehUT11-PWuR-4d72132ee5.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e2、\u003cb\u003e群组/社群权限\u003c/b\u003e，选中权限后，坐席系统就可以使用创建群组和创建社群功能。不选中这个权限，就没有这个功能\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/qU8ni7gCru-57529cdf9f.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eqU8ni7gCru-57529cdf9f.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/cT6DG-S15r-665d0450a2.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ecT6DG-S15r-665d0450a2.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e3、\u003cb\u003e聊天权限，\u003c/b\u003e选中权限后，坐席系统就可以进行私聊和群聊的聊天功能。不选中这个权限，就没有这个功能\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/NomAZA1Yav-24192bcf3d.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eNomAZA1Yav-24192bcf3d.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/f8SwCB7Szj-07e2032b10.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ef8SwCB7Szj-07e2032b10.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69ae81ee1a9d311cb29a3818","slug":"如何使用坐席怎么进行聊天","title":"如何使用坐席怎么进行聊天","subtitle":"","updatedAt":"2026-03-09T08:16:54.384Z","searchText":"注：在后台点击进入坐席只能查看，不能聊天 登录座席WhatsApp账号 访问链接：星辰坐席系统  输入正确的账号、密码、验证码后，点击【确定】按钮  登录成功后进入坐席系统主页面(操作跟WhatsApp网页端一致的) ","html":"\u003cp\u003e\u003cb\u003e注：在后台点击进入坐席只能查看，不能聊天\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp class=\"lead\"\u003e\u003cb\u003e登录座席WhatsApp账号\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e访问链接：\u003cu\u003e\u003ca href=\"https://www.xckfkf.com/#/login\" target=\"_blank\"\u003e星辰坐席系统\u003c/a\u003e\u003c/u\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/wdFQn6PTKs-31120cf441.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ewdFQn6PTKs-31120cf441.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e输入正确的账号、密码、验证码后，点击【确定】按钮\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/ndI9Xsp4R6-4781beeb5c.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003endI9Xsp4R6-4781beeb5c.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e登录成功后进入坐席系统主页面(操作跟WhatsApp网页端一致的)\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/OhMkAUis8s-44e403bb1a.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eOhMkAUis8s-44e403bb1a.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69b0160da889b919f4227d7b","slug":"账号被封，解封流程","title":"账号被封，解封流程","subtitle":"","updatedAt":"2026-03-16T09:09:44.158Z","searchText":"解封申请和查询解封状态有有效期，起码保持一天查看一次状态，以免过期 怎么判断是被封号了 当坐席账号头像出现红点，鼠标移动到红点上，有浮标提示“封禁”，且账号无法正常使用私聊和群里，这时候号就被封禁了。  封号了如何申请解封 1、到账号列表界面，状态选择封禁，点击搜索按钮 2、找到要申请解封的账号，点击“申请解封”按钮，弹出申请解封弹窗 3、解封理由那里可以不填，点击确认按钮就可以提交申请  4、提交申请后，进入解封中状态，可以点击“查看解封状态”按钮，实时查看是否解封  已解封如何重新上号 注：需要手机插卡复接登录 1、账号列表，通过筛选找到已解封的账号，点击登录按钮，弹出登录弹窗 2、查看登录信息是否正确（如果释放了ip需要重新选择ip），点击确认按钮。  ","html":"\u003ch2\u003e\u003cp\u003e\u003cb\u003e解封申请和查询解封状态有有效期，起码保持一天查看一次状态，以免过期\u003c/b\u003e\u003c/p\u003e\u003c/h2\u003e\n\u003ch2\u003e\u003cb\u003e怎么判断是被封号了\u003c/b\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cp\u003e当坐席账号头像出现红点，鼠标移动到红点上，有浮标提示“封禁”，且账号无法正常使用私聊和群里，这时候号就被封禁了。\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/XnZfQLX0rG-be1025b1e1.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eXnZfQLX0rG-be1025b1e1.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003ch2\u003e\u003cb\u003e封号了如何申请解封\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cp\u003e1、到账号列表界面，状态选择封禁，点击搜索按钮\u003c/p\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e2、找到要申请解封的账号，点击“申请解封”按钮，弹出申请解封弹窗\u003c/p\u003e\u003c/p\u003e\n\u003cp\u003e3、\u003cb\u003e解封理由那里可以不填\u003c/b\u003e，点击确认按钮就可以提交申请\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/h0uXb-AiAq-5599b899c9.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eh0uXb-AiAq-5599b899c9.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e 4、提交申请后，进入解封中状态，可以点击“查看解封状态”按钮，实时查看是否解封\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/E1XwzD8RG--200d95a916.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eE1XwzD8RG--200d95a916.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003ch2\u003e\u003cp\u003e\u003cb\u003e 已解封如何重新上号\u003c/b\u003e\u003c/p\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cb\u003e注：需要手机插卡复接登录\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e1、账号列表，通过筛选找到已解封的账号，点击登录按钮，弹出登录弹窗\u003c/p\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e2、查看登录信息是否正确（\u003cb\u003e如果释放了ip需要重新选择ip）\u003c/b\u003e，点击确认按钮。\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/Bt0cKbErjH-c31d9af7ed.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eBt0cKbErjH-c31d9af7ed.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69b27021562b381caf720fb7","slug":"如何使用批量加群","title":"如何使用批量加群","subtitle":"","updatedAt":"2026-03-12T09:29:46.000Z","searchText":"一般不会触发风控，如果你不确定适合的频率，不要改变默认的间隔配置 1、点击坐席右边最下面的“批量加群/退群”按钮 2、粘贴要添加的群链接，设置等待时间，点击“批量加群”，就开始批量加群了  3、开始加群后，每加一个群，成功失败都会有提示，也会显示加群记录  4、注：在批量加群中不能刷新浏览器，刷新会自动停止批量加群，同时也不能开启批量退群，也会停止批量加群，因为加群和退群操作只能一项进行，不能同时进行。 ","html":"\u003ch2\u003e\u003cb\u003e一般不会触发风控，如果你不确定适合的频率，不要改变默认的间隔配置\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cp\u003e1、点击坐席右边最下面的“批量加群/退群”按钮\u003c/p\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e2、粘贴要添加的群链接，设置等待时间，点击“批量加群”，就开始批量加群了\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/jrCia-Wub_-52d4e3bbb6.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ejrCia-Wub_-52d4e3bbb6.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e3、开始加群后，每加一个群，成功失败都会有提示，也会显示加群记录\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/DFt1oCiy7F-ee0d234743.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eDFt1oCiy7F-ee0d234743.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003ch2\u003e\u003cp\u003e\u003cb\u003e4、注：在批量加群中不能刷新浏览器，刷新会自动停止批量加群，同时也不能开启批量退群，也会\u003c/b\u003e\u003cb\u003e停止批量加群，因为加群和退群操作只能一项进行，不能同时进行。\u003c/b\u003e\u003c/p\u003e\u003cbr /\u003e\u003c/h2\u003e"},{"id":"69b27309b1652e1cb132db5e","slug":"如何使用批量退群","title":"如何使用批量退群","subtitle":"","updatedAt":"2026-03-12T09:29:17.301Z","searchText":"一般不会触发风控，如果你不确定适合的频率，不要改变默认的间隔配置 1、点击坐席右边最下面的“批量加群/退群”按钮 2、切换到批量退群页面，勾选要退出群聊，设置等待时间，点击批量退群，就开始退群操作了  3、开始退群后，每退出一个群，成功失败都会有提示，也会显示退群记录，可以“点击停止”，停止退群操作  4、注：在批量退群中不能刷新浏览器，刷新会自动停止批量退群，同时也不能开启批量加群，也会停止批量退群，因为加群和退群操作只能一项进行，不能同时进行","html":"\u003ch2\u003e\u003cb\u003e一般不会触发风控，如果你不确定适合的频率，不要改变默认的间隔配置\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cp\u003e1、点击坐席右边最下面的“批量加群/退群”按钮\u003c/p\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e2、切换到批量退群页面，勾选要退出群聊，设置等待时间，点击批量退群，就开始退群操作了\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/Dmot_oBNYi-b8c09ce333.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eDmot_oBNYi-b8c09ce333.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e3、开始退群后，每退出一个群，成功失败都会有提示，也会显示退群记录，可以“点击停止”，停止退群操作\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/DxQFspICid-f6d2d45bb6.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eDxQFspICid-f6d2d45bb6.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003ch2\u003e\u003cp\u003e\u003cb\u003e4、注：在批量退群中不能刷新浏览器，刷新会自动停止批量退群，同时也不能开启批量加群，也会\u003c/b\u003e\u003cb\u003e停止批量退群，因为加群和退群操作只能一项进行，不能同时进行\u003c/b\u003e\u003c/p\u003e\u003c/h2\u003e"},{"id":"69b274ffb1652e1cb132db90","slug":"全局翻译修改","title":"全局翻译修改","subtitle":"","updatedAt":"2026-03-12T09:28:41.423Z","searchText":"点击账号名称右边的展开按钮，再点击翻译设置，弹出设置界面  根据自己要求修改设置：翻译引擎、API_KEY、消息翻译、发送翻译、群聊翻译，然后点击提交按钮就设置成功了  进入坐席界面，翻译设置勾选”启用默认配置“，就会使用全局配置了  ","html":"\u003cp\u003e\u003cp\u003e点击账号名称右边的展开按钮，再点击翻译设置，弹出设置界面\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/sD-7tntSBR-21afd2e5ab.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003esD-7tntSBR-21afd2e5ab.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e根据自己要求修改设置：翻译引擎、API_KEY、消息翻译、发送翻译、群聊翻译，然后点击提交按钮就设置成功了\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/LOlfoQjoju-530a310b95.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eLOlfoQjoju-530a310b95.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e进入坐席界面，翻译设置勾选”启用默认配置“，就会使用全局配置了\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/xAzyp4jnDI-642c9ebf27.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003exAzyp4jnDI-642c9ebf27.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69b27774b1652e1cb132dbba","slug":"如何静音通知","title":"如何静音通知","subtitle":"","updatedAt":"2026-03-12T08:21:18.243Z","searchText":"找到要静音的联系人或者群组，右键点击静音通知  会话显示静音标识，右键可以取消静音通知 ","html":"\u003cp\u003e\u003cp\u003e找到要静音的联系人或者群组，右键点击静音通知\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/a8YPoudx4u-cf0b61f250.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ea8YPoudx4u-cf0b61f250.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e会话显示静音标识，右键可以取消静音通知\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/MAJROIjXKb-704c810788.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eMAJROIjXKb-704c810788.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69b278438159371cb5710042","slug":"对话列表超长可以调节","title":"对话列表超长可以调节","subtitle":"","updatedAt":"2026-03-12T08:24:49.744Z","searchText":"联系人、群组和社群会话列表可调节设置 ","html":"\u003cp\u003e\u003cp\u003e联系人、群组和社群会话列表可调节设置\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/v5kPUngj5a-ff09b70c92.gif\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ev5kPUngj5a-ff09b70c92.gif\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69b64c82209f341cb02e7be8","slug":"如何在群聊中快速查看资料","title":"如何在群聊中快速查看资料","subtitle":"","updatedAt":"2026-03-16T02:59:43.623Z","searchText":"点击群聊成员的头像就可以快速查看资料  ","html":"\u003cp\u003e\u003cp\u003e点击群聊成员的头像就可以快速查看资料\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/IoRWoX95e0-52199ce356.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eIoRWoX95e0-52199ce356.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/T9sTiUIRAA-eddf602889.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eT9sTiUIRAA-eddf602889.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69b6acb48159371cb571207a","slug":"解封复接帐号如何更换ip","title":"解封复接帐号如何更换ip","subtitle":"","updatedAt":"2026-03-16T09:11:13.111Z","searchText":"换ip再上线 在线不允许更换ip 1、筛选\"已解封\"状态的账号，点击释放ip按钮，弹出确认弹窗，点击确认按钮ip释放成功   2、点击登录按钮，弹窗登录弹窗，可以重新选择ip  ","html":"\u003ch2\u003e\u003cb\u003e换ip再上线 在线不允许更换ip\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cp\u003e1、筛选\"已解封\"状态的账号，点击释放ip按钮，弹出确认弹窗，点击确认按钮ip释放成功\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/-Y_6CeAotV-e605ac09b6.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e-Y_6CeAotV-e605ac09b6.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/NUuWyc74AI-55691541ea.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eNUuWyc74AI-55691541ea.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e2、点击登录按钮，弹窗登录弹窗，可以重新选择ip\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/Xme1t3SQSz-aa4e723e4e.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eXme1t3SQSz-aa4e723e4e.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69bd044c45c23b1cb45e7ca1","slug":"坐席好友如何和统计到好友对应","title":"坐席好友如何和统计到好友对应","subtitle":"","updatedAt":"2026-03-20T08:32:38.412Z","searchText":"坐席查看好友详情时，查看到的ID，就是唯一标识  后台进入粉丝列表查看到的ID，与坐席是对应的 ","html":"\u003cp\u003e\u003cp\u003e坐席查看好友详情时，查看到的ID，就是唯一标识\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/oZ6MEuPHyD-f9284f4557.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eoZ6MEuPHyD-f9284f4557.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e后台进入粉丝列表查看到的ID，与坐席是对应的\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/8YCX6LgDxr-28a87afee4.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e8YCX6LgDxr-28a87afee4.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69c0fe19a889b919f42326f8","slug":"在线、输入中状态上线和说明","title":"在线、输入中状态上线和说明","subtitle":"","updatedAt":"2026-03-23T08:49:04.770Z","searchText":"在线、输入中所有情况均已完备上线 1、官方中存在bug,看不看到对方在线; 在隐私有权限的情况下，还是看官方心情的如图，互加通讯录且互发过消息，真机环境存在看不到对方在线也存在看不到对方在线  2、官方中存在bug,看不到群在线人数; 不管是管理员还是普通成员，真机环境存在看不到群在线的情况，也存在能看到群在线的情况  3、官方中存在bug,每个人看到的群在线人数不一致  4、结论，这个功能是上线了，看不到，同一个群不同人看到的数目和显示不对都是正常情况，官方让每个人看的就是不一样的  ","html":"\u003cp\u003e在线、输入中所有情况均已完备上线\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cb\u003e1、官方中存在bug,看不看到对方在线;\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cb\u003e在隐私有权限的情况下，还是看官方心情的如图，互加通讯录且互发过消息，真机环境存在看不到对方在线也存在看不到对方在线\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/VdR4GLiqhI-a4a20828f6.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eVdR4GLiqhI-a4a20828f6.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cb\u003e2、官方中存在bug,看不到群在线人数;\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cb\u003e不管是管理员还是普通成员，真机环境存在看不到群在线的情况，也存在能看到群在线的情况\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/uEMo7MQK3B-b3a99a44f4.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003euEMo7MQK3B-b3a99a44f4.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cb\u003e3、官方中存在bug,每个人看到的群在线人数不一致\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/QHBvUoLE5S-92c71b4e29.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eQHBvUoLE5S-92c71b4e29.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e4、结论，这个功能是上线了，\u003cb\u003e看不到，同一个群不同人看到的数目和显示不对都是正常情况，官方让每个人看的就是不一样的\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e"},{"id":"69c519d68159371cb571aff6","slug":"如何续费ip和开启自动续费","title":"如何续费IP和开启自动续费","subtitle":"","updatedAt":"2026-03-26T11:34:55.313Z","searchText":"如何续费IP 续费入口1： 1、在WhatsAppapp列表，选中要续费ip的账号，点击续费ip按钮，  2、弹出支付界面，点击前往支付。  3、点击确认支付，支付成功就可以续费了，正常都是续费一个月  续费入口2： 1、点击ip列表，选中要续费的ip，点击续费ip按钮  2、弹出支付界面，点击前往支付  3、点击确认支付，支付成功就可以续费了，正常都是续费一个月  开启自动续费 开启自动续费入口1： 1、打开WhatsApp，滑动下方的滚动条到看到自动续费ip那一列，点击开启按钮。  2、弹出确认弹窗，点击确认按钮，就开启自动续费了  开启自动续费入口2： 1、打开ip列表，滑动下方的滚动条到看到自动续费ip那一列，点击开启按钮。  2、弹出确认弹窗，点击确认按钮，就开启自动续费了 ","html":"\u003ch2\u003e\u003cp\u003e\u003cb\u003e如何续费IP\u003c/b\u003e\u003c/p\u003e\u003c/h2\u003e\n\u003cp class=\"lead\"\u003e\u003cp\u003e\u003cb\u003e续费入口1：\u003c/b\u003e\u003c/p\u003e\u003c/p\u003e\n\u003cp\u003e1、在WhatsAppapp列表，选中要续费ip的账号，点击续费ip按钮，\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/qFYQzFYBFL-2caa139900.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eqFYQzFYBFL-2caa139900.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e2、弹出支付界面，点击前往支付。\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/KEvJDkphFz-b93540fdfe.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eKEvJDkphFz-b93540fdfe.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e3、点击确认支付，支付成功就可以续费了，正常都是续费一个月\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/A304mMnhPJ-500b3916b1.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eA304mMnhPJ-500b3916b1.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cb\u003e续费入口2：\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e1、点击ip列表，选中要续费的ip，点击续费ip按钮\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/o0pJbSQVh5-5d652caf35.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eo0pJbSQVh5-5d652caf35.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e2、弹出支付界面，点击前往支付\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/gmYqZorK6Y-53d5a4039b.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003egmYqZorK6Y-53d5a4039b.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e3、点击确认支付，支付成功就可以续费了，正常都是续费一个月\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/bbsNeTWB3k-7d5e7d091a.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ebbsNeTWB3k-7d5e7d091a.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003ch2\u003e\u003cp\u003e\u003cb\u003e开启自动续费\u003c/b\u003e\u003c/p\u003e\u003c/h2\u003e\n\u003cp class=\"lead\"\u003e\u003cb\u003e开启自动续费入口1：\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e1、打开WhatsApp，滑动下方的滚动条到看到自动续费ip那一列，点击开启按钮。\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/Jmj1Jpzroj-7c27950e73.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eJmj1Jpzroj-7c27950e73.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e2、弹出确认弹窗，点击确认按钮，就开启自动续费了\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/qbevVaOvxa-c8d818ab83.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eqbevVaOvxa-c8d818ab83.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cb\u003e开启自动续费入口2：\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e1、打开ip列表，滑动下方的滚动条到看到自动续费ip那一列，点击开启按钮。\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/HBYtsBEJfw-1e55e21413.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eHBYtsBEJfw-1e55e21413.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e2、弹出确认弹窗，点击确认按钮，就开启自动续费了\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/INqavEyJEE-ca0173e11a.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eINqavEyJEE-ca0173e11a.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69ce514a5c185b1cad237237","slug":"自定义分组使用文档","title":"自定义分组使用文档","subtitle":"","updatedAt":"2026-04-02T13:11:21.502Z","searchText":"一，创建分组 1、点击管理分组按钮，  2、点击“+”按钮  3、弹出创建界面后，填写分组名，勾选会话，点击“创建”按钮  4、提示创建分组成功，  二、分组操作 修改分组名称 1、点击更改分组名称按钮  2、弹出弹窗后，填写新名称，点击确认按钮  添加聊天 1、点击添加聊天按钮  2、勾选聊天会话，点击添加按钮  3、添加成功，分组下看到勾选的聊天会话  删除聊天 1、点击移除聊天按钮  2、弹出弹窗后，勾选想移除的聊天，点击移除按钮  3、移除成功，聊天会话回到默认分组，个人回联系人、群组聊天回群组，社群聊天回社群  删除分组 1、点击删除分组按钮  2、弹出确认删除界面，点击删除按钮（界面提示：此分组中的所有聊天将自动移至默认分组。）  三、分组转移 在新分组里面添加聊天选择要转移的会话，就可以转移到新分组 ","html":"\u003cp class=\"lead\"\u003e\u003cp\u003e\u003cb\u003e一，创建分组\u003c/b\u003e\u003c/p\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e1、点击管理分组按钮，\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/1WEoTQdxtu-a2bd8d2f0e.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e1WEoTQdxtu-a2bd8d2f0e.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e2、点击“+”按钮\u003c/p\u00 :"","updatedAt":"2026-03-25T09:32:47.295Z","searchText":"涉及少于5个号码号码需要全列，多于5个号码列5个，列多少个号码带多少个号码的截图，截图必须是除了网址以下的所有界面  必须按格式提交，星辰必须要复现问题，才能解决问题，减少沟通成本，快速定位和处理问题。 不涉及号码的问题，提供坐席或者管理员  有些问题需要录屏可以使用PowerPoin或者LICEcap PowerPoint 屏幕录制详细步骤 (2013及以上版本)\n打开工具： 打开PowerPoint，切换到【插入】选项卡，在最右侧点击【屏幕录制】。选择区域： 点击【选择区域】，使用十字光标拖动选择需要录制的屏幕范围，也可按 Windows 徽标键 + Shift + F 全屏录制。配置录制： 控制坞上默认勾选【录制音频】和【录制指针】。如需关闭，点击对应图标即可。开始录制： 点击红色【录制】按钮，倒计时结束后开始录制。录制时可点击【暂停】或【停止】。完成与保存： 录制结束后，视频会自动显示在PPT幻灯片中。另存视频： 右键点击视频框，选择【将媒体另存为...】，保存为 .mp4 格式文件。剪辑视频： 点击视频，在【播放】选项卡中选择【剪辑视频】 LICEcap 录屏详细教程\n安装与启动在官网下载LICEcap后安装，双击打开程序。软件界面是一个透明的框，框内区域即为录制范围。设置与录制调整区域： 拖动透明框的边缘或角，调整大小以覆盖需要录制的内容。点击录制： 点击右下角的 \"Record\"。保存文件： 弹出的窗口中设置文件名、选择保存位置，然后点击“保存”。录制过程控制录制开始后，你可以继续操作电脑，也可以直接移动或调整LICEcap的框，调整录制范围。暂停/结束： 按下 Ctrl+Alt+P 可以暂停录制，按下 \"Stop\" 结束录制。","html":"\u003cp\u003e涉及少于\u003cb\u003e5个\u003c/b\u003e号码号码需要全列，多于\u003cb\u003e5个\u003c/b\u003e号码列5个，列多少个号码带多少个号码的截图，截图必须是\u003cb\u003e除了网址以下的所有界面\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/qIqSjlcDnb-e885b51932.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eqIqSjlcDnb-e885b51932.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003ch2\u003e\u003cb\u003e必须按格式提交，星辰必须要复现问题，才能解决问题，减少沟通成本，快速定位和处理问题。\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003ch2\u003e\u003cb\u003e不涉及号码的问题，提供坐席或者管理员\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003ch2\u003e\u003cp\u003e\u003cb\u003e有些问题需要录屏可以使用PowerPoin或者LICEcap\u003c/b\u003e\u003c/p\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cb\u003ePowerPoint 屏幕录制详细步骤 (2013及以上版本)\u003c/b\u003e\u003cbr /\u003e\u003col\u003e\u003cli\u003e\u003cb\u003e打开工具：\u003c/b\u003e 打开PowerPoint，切换到【插入】选项卡，在最右侧点击【屏幕录制】。\u003c/li\u003e\u003cli\u003e\u003cb\u003e选择区域：\u003c/b\u003e 点击【选择区域】，使用十字光标拖动选择需要录制的屏幕范围，也可按 Windows 徽标键 + Shift + F 全屏录制。\u003c/li\u003e\u003cli\u003e\u003cb\u003e配置录制：\u003c/b\u003e 控制坞上默认勾选【录制音频】和【录制指针】。如需关闭，点击对应图标即可。\u003c/li\u003e\u003cli\u003e\u003cb\u003e开始录制：\u003c/b\u003e 点击红色【录制】按钮，倒计时结束后开始录制。录制时可点击【暂停】或【停止】。\u003c/li\u003e\u003cli\u003e\u003cb\u003e完成与保存：\u003c/b\u003e 录制结束后，视频会自动显示在PPT幻灯片中。\u003cul\u003e\u003cli\u003e\u003cb\u003e另存视频：\u003c/b\u003e 右键点击视频框，选择【将媒体另存为...】，保存为 .mp4 格式文件。\u003c/li\u003e\u003cli\u003e\u003cb\u003e剪辑视频：\u003c/b\u003e 点击视频，在【播放】选项卡中选择【剪辑视频】\u003c/li\u003e\u003c/ul\u003e\u003cul\u003e\u003c/ul\u003e\u003cul\u003e\u003c/ul\u003e\u003c/li\u003e\u003c/ol\u003e\u003c/p\u003e\n\u003cp\u003e\u003col\u003e\u003cb\u003eLICEcap 录屏详细教程\u003c/b\u003e\u003cbr /\u003e\u003col\u003e\u003cli\u003e\u003cb\u003e安装与启动\u003c/b\u003e\u003cul\u003e\u003cli\u003e在官网下载LICEcap后安装，双击打开程序。\u003c/li\u003e\u003cli\u003e软件界面是一个透明的框，框内区域即为录制范围。\u003c/li\u003e\u003c/ul\u003e\u003c/li\u003e\u003cli\u003e\u003cb\u003e设置与录制\u003c/b\u003e\u003cul\u003e\u003cli\u003e\u003cb\u003e调整区域：\u003c/b\u003e 拖动透明框的边缘或角，调整大小以覆盖需要录制的内容。\u003c/li\u003e\u003cli\u003e\u003cb\u003e点击录制：\u003c/b\u003e 点击右下角的 \u003cb\u003e\"Record\"\u003c/b\u003e。\u003c/li\u003e\u003cli\u003e\u003cb\u003e保存文件：\u003c/b\u003e 弹出的窗口中设置文件名、选择保存位置，然后点击“保存”。\u003c/li\u003e\u003c/ul\u003e\u003c/li\u003e\u003cli\u003e\u003cb\u003e录制过程控制\u003c/b\u003e\u003cul\u003e\u003cli\u003e录制开始后，你可以继续操作电脑，也可以直接移动或调整LICEcap的框，调整录制范围。\u003c/li\u003e\u003cli\u003e\u003cb\u003e暂停/结束：\u003c/b\u003e 按下 Ctrl+Alt+P 可以暂停录制，按下 \u003cb\u003e\"Stop\"\u003c/b\u003e 结束录制。\u003c/li\u003e\u003c/ul\u003e\u003c/li\u003e\u003c/ol\u003e\u003c/ol\u003e\u003cbr /\u003e\u003cbr /\u003e\u003c/p\u003e"},{"id":"69a7c68b5ad59c1cafe7de09","slug":"关于江河（手机）已注册，为什么登录星辰还要收验证码","title":"关于江河（手机）已注册，为什么登录星辰还要收验证码","subtitle":"","updatedAt":"2026-03-04T05:56:51.489Z","searchText":"原因：whatsapp官方是否要求短信登录看官方心情，星辰出现短信验证码等待就是官方要求要短信，一切已官方为准 ","html":"\u003cp\u003e\u003cp\u003e原因：whatsapp官方是否要求短信登录看官方心情，星辰出现短信验证码等待就是官方要求要短信，一切已官方为准\u003c/p\u003e\u003c/p\u003e"},{"id":"69a7c98b728d821caca05947","slug":"关于验证码登录时弹窗“未知异常”","title":"关于验证码登录时弹窗“未知异常”","subtitle":"","updatedAt":"2026-03-04T05:57:42.956Z","searchText":"能收到验证码，正常号码100%会成功，出现此问题，需要自行把号码登录任意手机，把号码 n\u003euof5OuPKAV-c73ac9b16a.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e模板\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/wGznuogBw1-b0b50c0bd0.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ewGznuogBw1-b0b50c0bd0.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69b12773a889b919f4228bfd","slug":"聊天记录明明存在，但是上拉没有","title":"聊天记录明明存在，但是上拉没有","subtitle":"","updatedAt":"2026-03-11T08:27:59.806Z","searchText":"原因：本地网络波动，几分钟后刷新浏览器解决 模拟切换网络、断网重连，出现加载不出记录发到情况  待网络正常，刷新浏览器后解决:  ","html":"\u003cp\u003e原因：\u003cb\u003e本地网络波动\u003c/b\u003e，几分钟后刷新浏览器解决\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e模拟切换网络、断网重连，出现加载不出记录发到情况\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/xeZoHIbEYD-2ed5129a11.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003exeZoHIbEYD-2ed5129a11.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e待网络正常，刷新浏览器后解决:\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/8tv7vAzFFp-33493ac2e5.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e8tv7vAzFFp-33493ac2e5.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69c64c3a3df8041caf9663d7","slug":"如何重置坐席密码且登录坐席修改密码","title":"如何重置坐席密码且登录坐席修改密码","subtitle":"","updatedAt":"2026-03-27T09:22:50.687Z","searchText":"如何重置坐席密码 1、打开坐席列表，找到要重置坐席密码的账号，点击重置密码  2、点击确认按钮  3、密码重置成功，需要复制，不然关闭后就看不到了  登录坐席后如何修改密码 1、登录坐席后，点开账号的下拉按钮，再点击修改密码按钮  2、输入旧密码和新密码，点击修改按钮，完成修改 ","html":"\u003ch2\u003e\u003cp\u003e\u003cb\u003e如何重置坐席密码\u003c/b\u003e\u003c/p\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cp\u003e1、打开坐席列表，找到要重置坐席密码的账号，点击重置密码\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/lm7x-0GI7i-0e031829ee.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003elm7x-0GI7i-0e031829ee.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e2、点击确认按钮\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/vkqUHMZJMj-a848c491f7.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003evkqUHMZJMj-a848c491f7.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e3、密码重置成功，需要复制，不然关闭后就看不到了\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/EhEUTQU6yf-09ef3b8056.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eEhEUTQU6yf-09ef3b8056.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003ch2\u003e\u003cp\u003e\u003cb\u003e登录坐席后如何修改密码\u003c/b\u003e\u003c/p\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cp\u003e1、登录坐席后，点开账号的下拉按钮，再点击修改密码按钮\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/1Vj9GJxSyV-9fd85f590c.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e1Vj9GJxSyV-9fd85f590c.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e2、输入旧密码和新密码，点击修改按钮，完成修改\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/Xwibvo6HN9-78f0c8c468.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eXwibvo6HN9-78f0c8c468.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69c8deeea889b919f423730b","slug":"所有状态的含义","title":"为什么我的头像经常“消失”","subtitle":"","updatedAt":"2026-03-29T08:44:49.898Z","searchText":"消失的原因： 号跟星辰有交互就可能会有临时头像 ，如果是登陆前这个号跟星辰上的号有交互 缓存到他头像了 你登陆的时候看到有就没设置了 但是这种方式获取的头像是好友的头像有有效期 头像属于星辰上的共享资源 所以会实际没有 但是你还看得到头像 过期就变成消失了 怎么避免问题出现： 星辰跟手机一样每次登陆都要设置头像，每次登录后，不管有没有头像，最好重新设置一下头像 方式1、上号后，点击编辑头像，上传头像，点击确认按钮  方式2、坐席找到账号，右键点击选择修改资料  弹出修改弹窗，点击头像的按钮，选择图片，就可以修改头像  ","html":"\u003ch2\u003e\u003cp\u003e\u003cb\u003e消失的原因：\u003c/b\u003e\u003c/p\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cp\u003e号跟星辰有交互就可能会有临时头像 ，如果是登陆前这个号跟星辰上的号有交互 缓存到他头像了 你登陆的时候看到有就没设置了 但是这种方式获取的头像是好友的头像有有效期\u003c/p\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e\u003cb\u003e头像属于星辰上的共享资源 所以会实际没有 但是你还看得到头像\u003c/b\u003e\u003c/p\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e\u003cb\u003e过期就变成消失了\u003c/b\u003e\u003c/p\u003e\u003c/p\u003e\n\u003ch2\u003e\u003cp\u003e\u003cb\u003e怎么避免问题出现：\u003c/b\u003e\u003c/p\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cp\u003e星辰跟手机一样每次登陆都要设置头像，每次登录后，不管有没有头像，最好重新设置一下头像\u003c/p\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e方式1、上号后，点击编辑头像，上传头像，点击确认按钮\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/EFK4RD4xAv-c0d74114b0.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eEFK4RD4xAv-c0d74114b0.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e方式2、坐席找到账号，右键点击选择修改资料\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/yfIaBXPHhk-a9ee5a378b.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eyfIaBXPHhk-a9ee5a378b.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e弹出修改弹窗，点击头像的按钮，选择图片，就可以修改头像\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/2nr8_b1aNz-f759df22fc.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e2nr8_b1aNz-f759df22fc.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69c8e8523df8041caf967382","slug":"所有状态的含义是","title":"账号所有状态的含义","subtitle":"","updatedAt":"2026-03-30T08:28:26.125Z","searchText":"登出 被官方踢出或人为转走 需要插卡复接（如下图）  离线 帐号被官方限制或者代理长时间失效下线 一般为帐号使用不当被官方限制 限制解除后任意操作会自动上线 封禁、解封中、已解封 参考解封文档 永久封禁 账号被官方永久封禁，可以通过关联账号转移聊天记录 ","html":"\u003cp class=\"lead\"\u003e\u003cb\u003e登出 \u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e被官方踢出或人为转走 需要插卡复接（如下图）\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/Tmpdvn92cN-99f010990c.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eTmpdvn92cN-99f010990c.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cb\u003e离线\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e帐号被官方限制或者代理长时间失效下线 一般为帐号使用不当被官方限制 限制解除后任意操作会自动上线\u003cbr /\u003e\u003c/p\u003e\n\u003cp class=\"lead\"\u003e\u003cp\u003e\u003cb\u003e封禁、解封中、已解封\u003c/b\u003e\u003c/p\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e\u003ca href=\"#69b0160da889b919f4227d7b\" target=\"_blank\"\u003e参考解封文档\u003c/a\u003e\u003c/p\u003e\u003c/p\u003e\n\u003cp class=\"lead\"\u003e\u003cp\u003e\u003cb\u003e永久封禁\u003c/b\u003e\u003c/p\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e账号被官方永久封禁，可以通过\u003ca href=\"#69a7dcc5728d821caca059c2\" target=\"_blank\"\u003e关联账号\u003c/a\u003e转移聊天记录\u003c/p\u003e\u003c/p\u003e"},{"id":"69ca30d18159371cb571d225","slug":"为什么我的呢称别的号看到的不一样","title":"为什么我的呢称别的号看到的不一样","subtitle":"","updatedAt":"2026-03-30T08:24:24.691Z","searchText":"对方设置了你的名字，对方就看到你的名字；你设置了自己名字，对方只是有可能看到你的名字，看不到的人就没反应，等看到才有反应，所以你们看到的其他部分号没更新最新名字，是正常结果；A号在其他号的身份99%是号码，不论A什么时候改名字，改了多少次。    名字显示优先级：备注 \u003e 昵称 \u003e 手机号码 ","html":"\u003cp\u003e\u003cb\u003e对方设置了你的名字，对方就看到你的名字；你设置了自己名字，对方只是有可能看到你的名字，看不到的人就没反应，等看到才有反应，所以你们看到的其他部分号没更新最新名字，是正常结果；A号在其他号的身份99%是号码，不论A什么时候改名字，改了多少次。\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/4SVrUYtspH-f848d9691c.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e4SVrUYtspH-f848d9691c.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/CNwjGFCnx1-f3139ccd5a.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eCNwjGFCnx1-f3139ccd5a.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/3wf0q_VsJ2-434cd1cc4b.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e3wf0q_VsJ2-434cd1cc4b.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cp\u003e\u003cb\u003e名字显示优先级：\u003c/b\u003e\u003cb\u003e备注 \u0026gt; 昵称 \u0026gt; 手机号码\u003c/b\u003e\u003c/p\u003e\u003c/p\u003e"},{"id":"69cb226ea889b919f4238870","slug":"签名","title":"签名的介绍","subtitle":"","updatedAt":"2026-03-31T07:01:12.703Z","searchText":"在后管设置签名：打开WhatsApp列表，点击编辑签名，弹出弹窗，可以编辑签名，设置时间，点击确认按钮  签名设置成功，且有倒计时  在坐席设置签名：找到账号，右键点击修改资料按钮  弹出弹窗，点击设置状态按钮  输入状态，选择时间，点击保存按钮  设置成功  同个账号后管和坐席的签名状态是同步的 签名过期的含义\n比如你签名设置了24小时的笑脸在线 24小时01分就是已过期 别人再看你的签名就是默认签名 放在不动有没有关系  ","html":"\u003cp\u003e\u003cp\u003e\u003cb\u003e在后管设置签名：\u003c/b\u003e打开WhatsApp列表，点击编辑签名，弹出弹窗，可以编辑签名，设置时间，点击确认按钮\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/00-Q4__ldx-c468a1edd9.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e00-Q4__ldx-c468a1edd9.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e签名设置成功，且有倒计时\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/YUjwMXQ0kY-564face54a.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eYUjwMXQ0kY-564face54a.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e\u003cb\u003e在坐席设置签名：\u003c/b\u003e找到账号，右键点击修改资料按钮\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/CheHjt8G_D-00a8fa2357.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eCheHjt8G_D-00a8fa2357.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e弹出弹窗，点击设置状态按钮\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/jb4q3ZDS68-924d7ba60a.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ejb4q3ZDS68-924d7ba60a.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e输入状态，选择时间，点击保存按钮\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/CzIWTEG0g0-5ea58bcfce.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eCzIWTEG0g0-5ea58bcfce.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e设置成功\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/1kmhf85z3T-a475c95616.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e1kmhf85z3T-a475c95616.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cp\u003e\u003cb\u003e同个账号后管和坐席的签名状态是同步的\u003c/b\u003e\u003c/p\u003e\u003c/p\u003e\n\u003cp class=\"lead\"\u003e\u003cp\u003e\u003cb\u003e签名过期的含义\u003c/b\u003e\u003c/p\u003e\u003cp\u003e比如你签名设置了24小时的笑脸在线 24小时01分就是已过期 别人再看你的签名就是默认签名\u003c/p\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e\u003cb\u003e放在不动有没有关系\u003c/b\u003e\u003c/p 003cb\u003e二、综合性强，所有功能都可以在web端直接操作\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e分组绑定、坐席绑定、ip购买、无需要挂机，服务端24小时whatsapp在线、账号解封申请和复接。\u003cbr /\u003e\u003c/p\u003e\n\u003cp class=\"lead\"\u003e\u003cb\u003e三、进粉\u003c/b\u003e\u003cb\u003e不依赖用户网络，0卡粉，秒统计\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e进粉的粉丝信息更准确，数据更新更快，不会出现卡粉\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/-H5WM8U_Mc-01ec03bc23.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e-H5WM8U_Mc-01ec03bc23.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cb\u003e四、\u003c/b\u003e\u003cb\u003e新增坐席系统\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e坐席系统的操作跟WhatsApp网页端一致\u003cbr /\u003e方便批量集中管理平台账号、后管进入坐席系统，除了可以查看信息，还可以操作好友聊天、群组和社群等。\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/EYfCDIV0Vd-c82b266249.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eEYfCDIV0Vd-c82b266249.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69a7dcc5728d821caca059c2","slug":"星辰永久封号，顶号关联教程","title":"星辰永久封号，顶号关联教程","subtitle":"","updatedAt":"2026-04-02T06:10:42.170Z","searchText":"功能描述：将永久封禁的账号会话记录关联到新的账号，且一个“永久封禁”账号只能关联到一个新的账号下。 注：1、如果关联错了，解除关联在重新关联（解除关联操作在后面）2、如果没权限，找风控 关联条件：\n1、有“永久封禁”状态下的账号，且有会话记录； 2、新号要绑定坐席才会出现有继承永封的功能 3、新的账号需要“在线”状态下，才可以操作顶号关联 操作流程 一、顶号关联 1、筛选“永久封禁”状态的账号，并复制需要关联的账号  2、筛选“在线”状态的账号，点击“新增关联”按钮，选择顶号关联账号（可以粘贴账号选择），点击确认。注：账号后面蓝色数字是指相同粉丝数  3、进入坐席查看关联后的数据，以下是关联前后会话列表对比 关联后（如下图）  关联前（如下图）  二、解除顶号关联 1、找出要解除顶号关联的账号，点击关联账号数下的数字，跳转到关联列表  2、在关联列表下，找要解除关联的账号，点击删除按钮，就可以解除关联  ","html":"\u003cp\u003e\u003cb\u003e功能描述：将永久封禁的账号会话记录关联到新的账号，且一个“永久封禁”账号只能关联到一个新的账号下。\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e\u003cb\u003e注：1、如果关联错了，解除关联在重新关联（解除关联操作在后面）2、如果\u003c/b\u003e\u003cb\u003e没权限，找风控\u003c/b\u003e\u003c/p\u003e\u003c/p\u003e\n\u003cp\u003e\u003cb\u003e关联条件：\u003cbr /\u003e\u003c/b\u003e\u003cb\u003e1、有“永久封禁”状态下的账号，且有会话记录；\u003c/b\u003e\u003c/p\u003e\n\u003cp\u003e\u003cb\u003e2、新号要绑定坐席才会出现有继承永封的功能\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e\u003cb\u003e3、新的账号需要“在线”状态下，才可以操作顶号关联\u003c/b\u003e\u003c/p\u003e\u003c/p\u003e\n\u003ch2\u003e\u003cb\u003e操作流程\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cp class=\"lead\"\u003e\u003cb\u003e一、顶号关联\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e1、筛选“永久封禁”状态的账号，并复制需要关联的账号\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/bk3FCbvQzK-e8d80987c4.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ebk3FCbvQzK-e8d80987c4.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e2、筛选“在线”状态的账号，点击“新增关联”按钮，选择顶号关联账号（可以粘贴账号选择），点击确认。\u003cb\u003e注：账号后面蓝色数字是指相同粉丝数\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/mpjTzb3Rle-53b82f0b5f.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003empjTzb3Rle-53b82f0b5f.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e3、进入坐席查看关联后的数据，以下是关联前后会话列表对比\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e关联后（如下图）\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/q6XC1bLRoU-2e2b226d4d.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eq6XC1bLRoU-2e2b226d4d.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e关联前（如下图）\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/tIo89HPd6l-7cc9a151ea.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003etIo89HPd6l-7cc9a151ea.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cb\u003e二、解除顶号关联\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e1、找出要解除顶号关联的账号，点击关联账号数下的数字，跳转到关联列表\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/4aZ_GyevcT-95035b1565.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e4aZ_GyevcT-95035b1565.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e2、在关联列表下，找要解除关联的账号，点击删除按钮，就可以解除关联\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/53jFq1LrGp-6a5549252e.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e53jFq1LrGp-6a5549252e.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69a7cacea889b919f4222fb2","slug":"关于信任盾牌标识","title":"关于信任盾牌标识","subtitle":"","updatedAt":"2026-03-20T08:39:08.828Z","searchText":"1、为什么做信任盾牌标识： 有信任盾牌账号发信息不会触发风控，方便用户辨别对方账号是否可以主动发信息\n只要粉丝主动发消息或者回复你的消息，就会获取盾牌标识 所有星辰协议的盾牌标识是共享的，假设账号A取得粉丝1的信任盾牌标识，那么账号B或者新注册的账号C一样可以直接向粉丝1发聊天并不会触发风控  2、查看联系搜索账号是否为信任账号  3、通过群组和社群，群成员列表，查看成员，点击发信息按钮，到聊天会话可以看到是否信任  接粉收发消息本身没有风控，加好友这个我们统计到这个版本会有封号风险，不加好友不影响任何功能和风控，星辰建议不要点击加好友按钮  4、不需要加对方为好友，只要产生对话，且有盾牌就可以拉对方组建群组和邀请进群  ","html":"\u003ch2\u003e\u003cb\u003e1、为什么做信任盾牌标识：\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cp\u003e有信任盾牌账号发信息不会触发风控，方便用户辨别对方账号是否可以主动发信息\u003cbr /\u003e只要粉丝主动发消息或者回复你的消息，就会获取盾牌标识\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cb\u003e所有星辰协议的盾牌标识是共享的，假设账号A取得粉丝1的信任盾牌标识，那么账号B或者新注册的账号C一样可以直接向粉丝1发聊天并不会触发风控\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/2Hxz9mvm83-c9874a0d4f.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e2Hxz9mvm83-c9874a0d4f.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003ch2\u003e\u003cb\u003e2、查看联系搜索账号是否为信任账号\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/DrNF3J4ryC-861e19482d.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eDrNF3J4ryC-861e19482d.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003ch2\u003e\u003cb\u003e3、通过群组和社群，群成员列表，查看成员，点击发信息按钮，到聊天会话可以看到是否信任\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/uJ5ty8kwJt-4b8d2f926e.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003euJ5ty8kwJt-4b8d2f926e.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cb\u003e接粉收发消息本身没有风控，加好友这个我们统计到这个版本会有封号风险，不加好友不影响任何功能和风控，星辰建议不要点击加好友按钮\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/2fHd-fpX-c-c7415006a6.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e2fHd-fpX-c-c7415006a6.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003ch2\u003e\u003cp\u003e\u003cb\u003e4、不需要加对方为好友，只要产生对话，且有盾牌就可以拉对方组建群组和邀请进群\u003c/b\u003e\u003c/p\u003e\u003c/h2\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/4mfZKZNJDW-eac52f4cdb.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e4mfZKZNJDW-eac52f4cdb.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/1DLGvZrOGr-355cba8670.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e1DLGvZrOGr-355cba8670.png\u003c/figcaption\u003e\u003c/figure\u003e"},{"id":"69b28980b1652e1cb132dcad","slug":"共享江河粉丝，增加主动打招呼能力","title":"共享江河粉丝，增加主动打招呼能力","subtitle":"","updatedAt":"2026-03-12T10:00:27.914Z","searchText":"新号给江河上的号发消息，星辰上主动搜索聊这个新号是有盾牌的且主动打招呼不封号 （江河上同步盾牌到星辰上最迟10分钟） 1、新号给江河上的号发消息  2、星辰上主动搜索聊这个新号是有盾牌，且聊天不封号  ","html":"\u003cp\u003e新号给江河上的号发消息，星辰上主动搜索聊这个新号是有盾牌的且主动打招呼不封号\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cb\u003e（江河上同步盾牌到星辰上最迟10分钟）\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e1、新号给江河上的号发消息\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/GyRGxnG9ka-9276d2e040.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eGyRGxnG9ka-9276d2e040.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e2、星辰上主动搜索聊这个新号是有盾牌，且聊天不封号\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/TEoPhE_qKt-61d8c0f356.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eTEoPhE_qKt-61d8c0f356.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/P0IS5HRTm5-2d8c5db65d.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eP0IS5HRTm5-2d8c5db65d.png\u003c/figcaption\u003e\u003c/figure\u003e"}]},{"category":{"id":"69bd0108a889b919f4230a32","name":"星辰使用建议","slug":"星辰使用建议","updatedAt":"2026-05-15T05:40:54.420Z","articlesCount":5},"articles":[{"id":"69bd01e245c23b1cb45e7c91","slug":"2026-03-20星辰近期使用建议","title":"2026-03-20星辰近期使用建议","subtitle":"","updatedAt":"2026-03-20T08:21:11.353Z","searchText":"1、关于登录的问题： 1.1 星辰上每天自己内部测试的登录数量就是200以上，总用户登录数量超过500/天\n    1.2 所以星辰的结果，默认就是真机的结果\n    1.3 无论是出现“xx秒再试”、”无法登录“、”非官方“、”异常联系管理员“，的任何成功外的错误，其实都是不同程度的号码风控，只是这个号码当前不行了\n    1.4 出现“xx秒再试”，大概率是号码低级风控，隔天或者隔几天试一次一般能成功发出验证码（90%的概率）\n    1.5 “无法登录”，一般是单个地区，多号都是这个返回，这种情况代表这个地区的号码，被扫光了，官方拉黑了地区，只能每天试一下等出现1.4或者直接能发\n    1.6 ”非官方“ 同1.5\n    1.7 ”异常联系管理员“ 这个是官方的一般风控，没有设置2次验证，官方要求强制2次验证，按1.4执行处理\n    1.8 所有星辰上的登录失败，都是单个号码论的，不管： “我试了十几个号码都是无法登录”、 “解封了，复接试了很多次都是这样”这些都是官方的实时返回，星辰改变不了，手机号号就是当前不能用，只有结论，用真机也是这样的结果\n    1.9 对于不行的号码，只能“隔天试” 2、针对新登录挂机掉号问题： 官方对于新登录（星辰相当于新的手机，从任何地方转移到星辰、星辰上解封账号再登录）会认定账号是新号，会有一个1-3天的高风险期，期间建议的操作是正常的私聊+群消息接收 3、对于群聊、建群、拉人等问题： 3.1、在星辰上建议不要拉空群，否则群容易被封禁或限制\n    3.2、内部组群，大部人用户的方式是先建空群，然后生成群链接让每个托号自己加入，这是一个不安全的建群方式，极其容易导致群或者托号的号被封禁\n    3.3、更加建议的内部组群方式是，群主托号直接拉有盾牌的托号5-10个建群，建群后产生1天的随意聊天，再让其他号通过邀请或者链接进群\n    3.4、加群有限制速度，如果不清楚，用我们的批量工具加群（不要改动间隔时间），一旦触发官方限制，会导致明明确定能加的群会加群失败，更严重直接封号 4、我们业务需要“加好友”： 4.1、这个功能星辰是不建议点击的，因为大量的数据证明，这个确实会触发官方的监控，不是一定会封号，但是封号的又刚好只有“加好友”的情况不是小数\n    4.2、如果一定要点击盾牌下的这个“加好友”，请跟业务员强调，不要一次点太多，做业务间隔慢慢点了就好","html":"\u003ch2\u003e\u003cb\u003e1、关于登录的问题：\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cp\u003e    1.1 星辰上每天自己内部测试的登录数量就是200以上，总用户登录数量超过500/天\u003c/p\u003e    1.2 所以星辰的结果，默认就是真机的结果\u003cbr /\u003e    1.3 无论是出现“xx秒再试”、”无法登录“、”非官方“、”异常联系管理员“，的任何成功外的错误，其实都是不同程度的号码风控，只是这个号码当前不行了\u003cbr /\u003e    1.4 出现“xx秒再试”，大概率是号码低级风控，隔天或者隔几天试一次一般能成功发出验证码（90%的概率）\u003cbr /\u003e    1.5 “无法登录”，一般是单个地区，多号都是这个返回，这种情况代表这个地区的号码，被扫光了，官方拉黑了地区，只能每天试一下等出现1.4或者直接能发\u003cbr /\u003e    1.6 ”非官方“ 同1.5\u003cbr /\u003e    1.7 ”异常联系管理员“ 这个是官方的一般风控，没有设置2次验证，官方要求强制2次验证，按1.4执行处理\u003cbr /\u003e    1.8 所有星辰上的登录失败，都是单个号码论的，不管： “我试了十几个号码都是无法登录”、 “解封了，复接试了很多次都是这样”这些都是官方的实时返回，星辰改变不了，手机号号就是当前不能用，只有结论，用真机也是这样的结果\u003cbr /\u003e    1.9 对于不行的号码，只能“隔天试”\u003cbr /\u003e\u003c/p\u003e\n\u003ch2\u003e\u003cb\u003e2、针对新登录挂机掉号问题：\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cp\u003e     官方对于新登录（星辰相当于新的手机，从任何地方转移到星辰、星辰上解封账号再登录）会认定账号是新号，会有一个1-3天的高风险期，期间建议的操作是正常的私聊+群消息接收\u003cbr /\u003e\u003c/p\u003e\n\u003ch2\u003e\u003cb\u003e3、对于群聊、建群、拉人等问题：\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cp\u003e    3.1、在星辰上建议不要拉空群，否则群容易被封禁或限制\u003cbr /\u003e    3.2、内部组群，大部人用户的方式是先建空群，然后生成群链接让每个托号自己加入，这是一个不安全的建群方式，极其容易导致群或者托号的号被封禁\u003cbr /\u003e    3.3、更加建议的内部组群方式是，群主托号直接拉有盾牌的托号5-10个建群，建群后产生1天的随意聊天，再让其他号通过邀请或者链接进群\u003cbr /\u003e    3.4、加群有限制速度，如果不清楚，用我们的批量工具加群（不要改动间隔时间），一旦触发官方限制，会导致明明确定能加的群会加群失败，更严重直接封号\u003cbr /\u003e\u003c/p\u003e\n\u003ch2\u003e\u003cb\u003e4、我们业务需要“加好友”：\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cp\u003e    4.1、这个功能星辰是不建议点击的，因为大量的数据证明，这个确实会触发官方的监控，不是一定会封号，但是封号的又刚好只有“加好友”的情况不是小数\u003cbr /\u003e    4.2、如果一定要点击盾牌下的这个“加好友”，请跟业务员强调，不要一次点太多，做业务间隔慢慢点了就好\u003cbr /\u003e\u003cbr /\u003e\u003c/p\u003e"},{"id":"69c121cf3df8041caf96332e","slug":"关于登录、登录养号、炒群前准备","title":"关于登录、登录养号、炒群前准备","subtitle":"","updatedAt":"2026-03-23T12:26:21.348Z","searchText":"一、登录前确定坐席要登录多少个号码，这个坐席要对所有号码按照如下操作进行登录养号，可以保证会比不做任何操作空挂，或者做自以为是的养号操作更加稳定： 1、假设坐席要登录9个号码31-39，建10个群32-41；（业务按实际调整登录号码和建群数量）按照正常流程登录号码，并绑定坐席 2、按照图1,9个号码相互发送消息，必须严格按照图中的方式：\n        2.1图中方式是每个号码以前通过搜索其中一个号码发消息，发完每个号码，改变需要发送的号码，直到每个号码两两互发消息\n        2.2不允许的操作：一个号搜索其他8个号码发消息，再操作其他号码，这个操作结果跟2.1一样，但是性质完全不同，会造成频率过快，不允许\n        2.3不允许的操作：不允许在这个阶段点击加好友按钮，下面注意说明会说明原因   3、开始建群，按照下图，一共需要建多少个群，平均分到每个号上，一个号一次建一个群，必须拉上几个列表中的内部成员\n        3.1 不允许的操作，一个号平均要建两个群，然后一次性建两个群，这个和建议操作结果一样，但是性质完全不同，会造成频率过快，不允许\n        3.2 不允许的操作：内部账号（托号、老师号不管是江河还是星辰上） 都不能通过邀请链接加群，只能按照图3，给内部账号发个主动消息，然后通过“添加成员”、“邀请-使用 WhatsApp 发送链接” 添加目标\n        3.3 外部账号（客户） 不会滥用功能，不存在快速加群导致群被封的情况，所以可以通过链接邀请对方   二、可能出现的问题说明： 1、一中的登录创号养号经验，是星辰通过超过上万个号码的使用和超过长达1年时间的测试的经验，对账号的稳定有效果，但是不是百分百保证不封号是否采纳看团队个人 2、图1、图2举例中，出现一个账号在操作中被封禁且没有其他异常，这是属于正常情况，官方对于登录的封禁一般是会持续两天，两天内任何情况下掉号都是合理的，掉号只能申请解封复接，这样循环。再次强调，建议参考星辰的操作。 3、目前已知空挂（不干任何操作）的号码，登录3天内大概率会封号，建议按照一的方式操作，并保持每隔2个小时左右在内部群发消息，让所有挂号接收到消息，增加账号健壮性 4、目前已知创建群不拉人（建空群），群加入太快都会造成封群，或者暂时无法加群，严重甚至会封号，建议操作的方式是按照一中3操作，每个管理员星辰预留一周的使用测试的适应时间、会配合查询疑问一周，一周后再有疑问星辰不予回答，也没法回答，请自行接受结果，封号的申请解封，没封号的等一天号再做同样的操作 5、以下任何操作封号都是正常情况：\n        5.1、登录三天内封号（任何正常操作，只要时间不超过都有可能被登录检测封号）\n        5.2、新登录期（3天内）长时间低频使用封号（空挂号、只接粉后长时间挂机、有加群但是群消息稀少包括但不限于任何低频使用账号）\n        5.3、新登录不绑定坐席（不绑坐席肯定没业务属于挂空挡） ","html":"\u003cp class=\"lead\"\u003e\u003cb\u003e一、登录前确定坐席要登录多少个号码，这个坐席要对所有号码按照如下操作进行登录养号，可以保证会比不做任何操作空挂，或者做自以为是的养号操作更加稳定：\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e1、假设坐席要登录9个号码31-39，建10个群32-41；（业务按实际调整登录号码和建群数量）按照正常流程登录号码，并绑定坐席\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e2、按照图\u003cb\u003e1,9个号码相互发送消息，必须严格按照图中的方式\u003c/b\u003e：\u003cbr /\u003e        2.1图中方式是每个号码以前通过搜索其中一个号码发消息，发完每个号码，改变需要发送的号码，直到每个号码两两互发消息\u003cbr /\u003e        2.2不允许的操作：\u003cb\u003e一个号搜索其他8个号码发消息，再操作其他号码\u003c/b\u003e，这个操作结果跟2.1一样，但是性质完全不同，会造成频率过快，不允许\u003cbr /\u003e        2.3不允许的操作：\u003cb\u003e不允许在这个阶段点击加好友按钮\u003c/b\u003e，下面注意说明会说明原因\u003cbr /\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/W2-fV5y6Mv-ecb5faeb33.gif\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eW2-fV5y6Mv-ecb5faeb33.gif\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/5yfek8Rsfl-caf16493f4.gif\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003e5yfek8Rsfl-caf16493f4.gif\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e3、开始建群，按照下图，一共需要建多少个群，平均分到每个号上，一个号一次建一个群，必须拉上几个列表中的内部成员\u003cbr /\u003e        3.1 不允许的操作，\u003cb\u003e一个号平均要建两个群，然后一次性建两个群\u003c/b\u003e，这个和建议操作结果一样，但是性质完全不同，会造成频率过快，不允许\u003cbr /\u003e        3.2 不允许的操作：\u003cb\u003e内部账号（托号、老师号不管是江河还是星辰上） 都不能通过邀请链接加群，只能按照图3，给内部账号发个主动消息，然后通过“添加成员”、“邀请-使用 WhatsApp 发送链接” 添加目标\u003c/b\u003e\u003cbr /\u003e        3.3 外部账号（客户） 不会滥用功能，不存在快速加群导致群被封的情况，所以可以通过链接邀请对方\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/U-6vNH9HaJ-5a1adc80b3.gif\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eU-6vNH9HaJ-5a1adc80b3.gif\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/OIKu4_8QXx-a1d4f8ae54.gif\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eOIKu4_8QXx-a1d4f8ae54.gif\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp class=\"lead\"\u003e\u003cb\u003e二、可能出现的问题说明：\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e1、\u003cb\u003e一中的登录创号养号经验，是星辰通过超过上万个号码的使用和超过长达1年时间的测试的经验，对账号的稳定有效果\u003c/b\u003e，但是不是百分百保证不封号是否采纳看团队个人\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e2、\u003cb\u003e图1、图2举例中，出现一个账号在操作中被封禁且没有其他异常，这是属于正常情况\u003c/b\u003e，官方对于登录的封禁一般是会持续两天，两天内任何情况下掉号都是合理的，掉号只能申请解封复接，这样循环。再次强调，建议参考星辰的操作。\u003c/p\u003e\u003c/p\u003e\n\u003cp\u003e3、\u003cb\u003e目前已知空挂（不干任何操作）的号码，登录3天内大概率会封号，建议按照一的方式操作，\u003c/b\u003e并保持每隔2个小时左右在内部群发消息，让所有挂号接收到消息，增加账号健壮性\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e4、\u003cb\u003e目前已知创建群不拉人（建空群），群加入太快都会造成封群，或者暂时无法加群，严重甚至会封号\u003c/b\u003e，建议操作的方式是按照一中3操作，每个管理员星辰预留一周的使用测试的适应时间、会配合查询疑问一周，一周后再有疑问星辰不予回答，也没法回答，请自行接受结果，封号的申请解封，没封号的等一天号再做同样的操作\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e5、以下任何操作封号都是正常情况：\u003cbr /\u003e        5.1、\u003cb\u003e登录三天内封号\u003c/b\u003e（任何正常操作，只要时间不超过都有可能被登录检测封号）\u003cbr /\u003e        5.2、\u003cb\u003e新登录期（3天内）长时间低频使用封号\u003c/b\u003e（空挂号、只接粉后长时间挂机、有加群但是群消息稀少包括但不限于任何低频使用账号）\u003cbr /\u003e        5.3、\u003cb\u003e新登录不绑定坐席\u003c/b\u003e（不绑坐席肯定没业务属于挂空挡）\u003cbr /\u003e\u003cbr /\u003e\u003c/p\u003e"},{"id":"69c4a0d23df8041caf9653fb","slug":"星辰封号自助查询机器人上线及说明","title":"星辰封号自助查询机器人上线及说明","subtitle":"","updatedAt":"2026-03-26T03:57:40.232Z","searchText":"1、封号原因95%以上属于登录后不正常养号，如果自己确认没有养号或者没有参考星辰建议登录后的账号维护工作，那不用查原因都是因为不正常使用导致登录风控触发。 2、低频挂机（我有自己跟自己的号聊天，几个群偶尔聊聊等都属于低频），正常的使用频率是接粉且炒群 需要查询某个号的封号分析情况，如：34632622527\n在ant所在的群输入 \"/fenghaofenxi 34632622527\"\n发送后机器人分析完回自动回复到群里   注意：私聊机器人不会有任何回复 自己的号有没养号，是否正常使用自己清楚，此功能禁止滥用，只是用于二次确认问题或者查询正常使用还被封号分析原因  需要批量导出分析结果群内联系 @朋 （没有养号或者正常使用，不提供服务）\n\n正常使用是指养号后正常业务工作，不是登录后随意操作或者登录后低频使用挂机 ","html":"\u003cp\u003e1、封号原因95%以上属于登录后不正常养号，如果自己确认没有养号或者没有参考星辰建议登录后的账号维护工作，那不用查原因都是因为不正常使用导致登录风控触发。\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e2、低频挂机（我有自己跟自己的号聊天，几个群偶尔聊聊等都属于低频），正常的使用频率是接粉且炒群\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cb\u003e需要查询某个号的封号分析情况\u003c/b\u003e，如：34632622527\u003cbr /\u003e\u003cb\u003e在ant所在的群输入 \"/fenghaofenxi 34632622527\"\u003c/b\u003e\u003cbr /\u003e发送后机器人分析完回自动回复到群里\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/Z1Zk7V6Tc3-5d3655fdfa.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eZ1Zk7V6Tc3-5d3655fdfa.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/kZUFV6kBF4-f4f030bbb7.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003ekZUFV6kBF4-f4f030bbb7.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003ch2\u003e\u003cb\u003e注意：私聊机器人不会有任何回复\u003c/b\u003e\u003cbr /\u003e\u003c/h2\u003e\n\u003cp\u003e\u003cb\u003e自己的号有没养号，是否正常使用自己清楚，此功能禁止滥用，只是用于二次确认问题或者查询正常使用还被封号分析原因  需要批量导出分析结果群内联系 @朋 （没有养号或者正常使用，不提供服务）\u003c/b\u003e\u003cbr /\u003e\u003cb\u003e\u003cbr /\u003e\u003c/b\u003e\u003cp\u003e\u003cb\u003e正常使用是指养号后正常业务工作，不是登录后随意操作或者登录后低频使用挂机\u003c/b\u003e\u003c/p\u003e\u003cbr /\u003e\u003c/p\u003e"},{"id":"69df7642a889b919f424471b","slug":"端对端加密消息收发功能更新通知","title":"端对端加密消息收发功能更新通知","subtitle":"","updatedAt":"2026-04-15T12:01:58.592Z","searchText":"一、本次更新修复的问题 本次更新修复以下问题：\n \n  1. 星辰发送消息延迟解密问题\n  客户端接收星辰发送的消息时，出现延迟且无法解密\n  2. 星辰接收消息延迟解密问题\n  星辰接收消息时，显示延迟且无法解密\n  3. 群发消息状态不一致问题\n  频繁群发时偶现发送失败提示，但对方实际已成功接收消息\n  4. 频繁群发触发官方限制\n  群发操作过于频繁导致账号被官方限制或封禁\n  5. 挂机Key不同步导致封号问题\n  长期挂机接收消息时，Key不同步导致发送消息时加解密失败，触发大量重试操作，进而导致官方限制或封号 二、更新后注意事项 2.1 首次群发同步机制\n \n  - 现象说明： 更新后，每个账号在每个群的首次群发时，可能需要进行消息同步（取决于官方判定的账号状态）\n  - 表现特征： 如需同步，第一条群发消息的发送速度会明显较慢（见图1）(其他号去接收查看会看到明显一条条消息慢慢发送的过程这是在自动修复不同步的问题)\n  - 后续表现： 首次群发成功后，再次群发将恢复至正常速度  2.2 群发过程中的操作限制 ⚠️\n \n  - 重要提示： 群发进行中时，请勿对该账号进行任何其他操作\n  - 系统限制： 江河系统已实现群发未完成前的账号操作限制\n  - 界面更新： 图2所示的界面操作限制功能预计于本周五上线  2.3 更新后可能出现的封号情况\n \n  - 原因分析： 由于长期挂机导致的严重Key不同步问题，更新后部分账号被封属于预期情况\n  - 处理方式： 如账号被封，按正常流程申请解封后继续使用即可，无需询问封号原因 2.4 问题反馈机制\n \n  - 反馈条件： 如更新后仍出现第一部分中列出的任何问题\n  - 反馈方式： 在Ant群中 @朋，并提供以下信息：\n    - 问题账号\n    - 具体问题描述","html":"\u003cp class=\"lead\"\u003e\u003cb\u003e一、本次更新修复的问题\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e本次更新修复以下问题：\u003cbr /\u003e \u003cbr /\u003e  1. 星辰发送消息延迟解密问题\u003cbr /\u003e  客户端接收星辰发送的消息时，出现延迟且无法解密\u003cbr /\u003e  2. 星辰接收消息延迟解密问题\u003cbr /\u003e  星辰接收消息时，显示延迟且无法解密\u003cbr /\u003e  3. 群发消息状态不一致问题\u003cbr /\u003e  频繁群发时偶现发送失败提示，但对方实际已成功接收消息\u003cbr /\u003e  4. 频繁群发触发官方限制\u003cbr /\u003e  群发操作过于频繁导致账号被官方限制或封禁\u003cbr /\u003e  5. 挂机Key不同步导致封号问题\u003cbr /\u003e  长期挂机接收消息时，Key不同步导致发送消息时加解密失败，触发大量重试操作，进而导致官方限制或封号\u003cbr /\u003e\u003c/p\u003e\n\u003cp class=\"lead\"\u003e\u003cb\u003e二、更新后注意事项\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cb\u003e2.1 首次群发同步机制\u003c/b\u003e\u003cbr /\u003e \u003cbr /\u003e  - 现象说明： 更新后，每个账号在每个群的首次群发时，可能需要进行消息同步（取决于官方判定的账号状态）\u003cbr /\u003e  - 表现特征： 如需同步，第一条群发消息的发送速度会明显较慢（见图1）(其他号去接收查看会看到明显一条条消息慢慢发送的过程这是在自动修复不同步的问题)\u003cbr /\u003e  - 后续表现： 首次群发成功后，再次群发将恢复至正常速度\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/oPu-9UMqXB-c1ed0b6e0c.gif\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eoPu-9UMqXB-c1ed0b6e0c.gif\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cp\u003e\u003cbr /\u003e\u003c/p\u003e\u003cp\u003e\u003cb\u003e \u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cb\u003e2.2 群发过程中的操作限制 ⚠️\u003c/b\u003e\u003c/p\u003e \u003cbr /\u003e  - 重要提示： 群发进行中时，请勿对该账号进行任何其他操作\u003cbr /\u003e  - 系统限制： 江河系统已实现群发未完成前的账号操作限制\u003cbr /\u003e  - 界面更新： 图2所示的界面操作限制功能预计于本周五上线\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/uFXL8mKV7I-f9a0a3c95f.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003euFXL8mKV7I-f9a0a3c95f.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cp\u003e\u003cb\u003e2.3 更新后可能出现的封号情况\u003c/b\u003e\u003cbr /\u003e \u003cbr /\u003e  - 原因分析： 由于长期挂机导致的严重Key不同步问题，更新后部分账号被封属于预期情况\u003cbr /\u003e  - 处理方式： 如账号被封，按正常流程申请解封后继续使用即可，无需询问封号原因\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cb\u003e2.4 问题反馈机制\u003c/b\u003e\u003cbr /\u003e \u003cbr /\u003e  - 反馈条件： 如更新后仍出现第一部分中列出的任何问题\u003cbr /\u003e  - 反馈方式： 在Ant群中 @朋，并提供以下信息：\u003cbr /\u003e    - 问题账号\u003cbr /\u003e    - 具体问题描述\u003cbr /\u003e\u003cbr /\u003e\u003c/p\u003e"},{"id":"6a06b1e50b021a1cacd64224","slug":"20260515新版星辰注册登录测试","title":"20260515新版星辰注册/登录测试","subtitle":"","updatedAt":"2026-05-15T05:40:54.420Z","searchText":"星辰的注册/登录逻辑更新后统计，除了人为输错验证码，最终的注册/转移/复接都是官方限制不让的原因；故此新版的登录目前测试注册没有问题；如遇到任何注册、登录、转移、复接失败的情况，按照半天、一天、两天这种间隔去操作处理；任何红色的失败除了“代理失败，请重试”，其他的失败不要短时间多次尝试，对发码没有任何帮助  ","html":"\u003cp\u003e星辰的注册/登录逻辑更新后统计，除了人为输错验证码，最终的注册/转移/复接都是官方限制不让的原因；故此新版的登录目前测试注册没有问题；如遇到任何注册、登录、转移、复接失败的情况，按照半天、一天、两天这种间隔去操作处理；任何红色的失败除了“代理失败，请重试”，其他的失败不要短时间多次尝试，对发码没有任何帮助\u003cbr /\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/Co6YOTqh94-8b15aac078.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eCo6YOTqh94-8b15aac078.png\u003c/figcaption\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/aPQmLbOQXF-0f8db9b040.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eaPQmLbOQXF-0f8db9b040.png\u003c/figcaption\u003e\u003c/figure\u003e"}]},{"category":{"id":"69ca377ca889b919f4237d13","name":"封控","slug":"封控","updatedAt":"2026-05-14T07:37:43.075Z","articlesCount":1},"articles":[{"id":"6a057bc6ba51b81cad7d6e46","slug":"为什么我的号码解封超过1天","title":"为什么我的号码解封超过1天","subtitle":"","updatedAt":"2026-05-14T07:37:43.075Z","searchText":"“超过一天不能解封的账号，一般被官方判定封号等级是欺诈，属于永封前的最高等级风控，就算一个月不能解封也是正常的” 官网封禁等级表  ","html":"\u003cp class=\"lead\"\u003e\u003cb\u003e“超过一天不能解封的账号，一般被官方判定封号等级是欺诈，属于永封前的最高等级风控，就算一个月不能解封也是正常的”\u003c/b\u003e\u003cbr /\u003e\u003c/p\u003e\n\u003cp\u003e\u003cp\u003e官网封禁等级表\u003c/p\u003e\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/H8_b4gVI1F-7eb85e7131.png\" alt=\"\" loading=\"lazy\"\u003e\u003cfigcaption\u003eH8_b4
