【加好友】。\u003c/li\u003e\u003cli\u003e只要已经产生对话，并且对方有盾牌，就可以正常聊天。\u003c/li\u003e\u003cli\u003e建群、邀请进群等操作不依赖加好友。\u003c/li\u003e\u003cli\u003e如果业务必须操作，请控制频率，不要短时间大量点击。\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e建议：优先通过正常聊天、群聊、邀请进群完成业务，不要把【加好友】作为常规操作。\u003c/blockquote\u003e"},{"id":"4f6105e4d0d02911ec7af302","title":"我在江河上接粉，在星辰上我可以主动打招呼吗","updatedAt":"2026-05-20T22:50:11+08:00","searchText":"  可以。江河上已经产生互动的粉丝，同步到星辰后会带有盾牌，星辰账号可以主动搜索并打招呼。    \u003e 提示：江河上的盾牌同步到星辰通常需要一点时间，最迟约 10 分钟。     一、可以主动打招呼的前提  需要先满足以下条件：  1. 粉丝已经在江河上给账号发送过消息，或与账号产生过互动。 2. 该粉丝的盾牌状态已经同步到星辰。 3. 在星辰中搜索该粉丝时，可以看到盾牌标识。  满足以上条件后，在星辰上主动发起聊天，通常不会因为主动打招呼触发风控。     二、江河上先产生互动  1. 新号先给江河上的账号发送消息。 2. 江河侧产生互动记录后，系统会同步盾牌状态。       三、星辰上搜索并打招呼  1. 回到星辰系统。 2. 搜索刚才在江河上产生互动的粉丝。 3. 确认该粉丝已经显示盾牌。 4. 进入会话后，可以主动发送消息。         四、注意事项  1. 如果刚在江河上接粉，星辰暂时没有显示盾牌，请等待同步完成后再操作。 2. 不建议在没有盾牌的情况下批量主动打招呼。 3. 主动打招呼不需要先加好友，只要有盾牌并产生会话即可。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e可以。江河上已经产生互动的粉丝，同步到星辰后会带有盾牌，星辰账号可以主动搜索并打招呼。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e提示：江河上的盾牌同步到星辰通常需要一点时间，最迟约 10 分钟。\u003c/blockquote\u003e\n\u003ch2\u003e一、可以主动打招呼的前提\u003c/h2\u003e\n\u003cp\u003e需要先满足以下条件：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e粉丝已经在江河上给账号发送过消息，或与账号产生过互动。\u003c/li\u003e\u003cli\u003e该粉丝的盾牌状态已经同步到星辰。\u003c/li\u003e\u003cli\u003e在星辰中搜索该粉丝时，可以看到盾牌标识。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e满足以上条件后，在星辰上主动发起聊天，通常不会因为主动打招呼触发风控。\u003c/p\u003e\n\u003ch2\u003e二、江河上先产生互动\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e新号先给江河上的账号发送消息。\u003c/li\u003e\u003cli\u003e江河侧产生互动记录后，系统会同步盾牌状态。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/GyRGxnG9ka-9276d2e040.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e三、星辰上搜索并打招呼\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e回到星辰系统。\u003c/li\u003e\u003cli\u003e搜索刚才在江河上产生互动的粉丝。\u003c/li\u003e\u003cli\u003e确认该粉丝已经显示盾牌。\u003c/li\u003e\u003cli\u003e进入会话后，可以主动发送消息。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/TEoPhE_qKt-61d8c0f356.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/P0IS5HRTm5-2d8c5db65d.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、注意事项\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e如果刚在江河上接粉，星辰暂时没有显示盾牌，请等待同步完成后再操作。\u003c/li\u003e\u003cli\u003e不建议在没有盾牌的情况下批量主动打招呼。\u003c/li\u003e\u003cli\u003e主动打招呼不需要先加好友，只要有盾牌并产生会话即可。\u003c/li\u003e\u003c/ol\u003e"},{"id":"63e2871f32f32b3994cef5d6","title":"为什么不建议通过上传通讯录加好友","updatedAt":"2026-05-20T22:56:33+08:00","searchText":"  因为盾牌超能力的原因，业务操作并不需要加好友。上传通讯录批量加好友会增加账号风控风险，不建议作为常规操作。    关于加好友风险，请先参考： 为什么不建议加好友  ./为什么不建议加好友.md      一、为什么不建议上传通讯录加好友  上传通讯录的本质是批量导入联系人并尝试建立好友关系。该操作容易被官方识别为异常加好友行为，尤其在短时间内批量处理时，风险更高。  主要风险：  1. 批量加好友容易触发官方风控。 2. 账号可能被限制、掉线或封禁。 3. 加好友并不是聊天、建群、邀请进群的必要条件。 4. 业务上已有盾牌能力时，通常可以直接聊天，不需要额外添加好友。     二、业务应该怎么做  1. 优先通过正常对话建立联系。 2. 对方有盾牌时，可以直接主动聊天。 3. 建群或邀请进群不依赖加好友。 4. 如果必须导入联系人，请先确认业务必要性，并控制数量和频率。     三、上传通讯录入口说明  系统中仍保留上传通讯录入口，但不建议将其作为常规加好友方式。  入口位置：  1. 找到在线账号。 2. 在账号列表页面点击【上传通讯录】。 3. 系统会弹出上传通讯录窗口。    通讯录模板如下：    \u003e 建议：除非明确需要导入联系人，否则不要通过上传通讯录批量加好友。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e因为盾牌超能力的原因，业务操作并不需要加好友。上传通讯录批量加好友会增加账号风控风险，不建议作为常规操作。\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e关于加好友风险，请先参考：\u003ca href=\"#07e22c3e84fe58064e09a284\"\u003e为什么不建议加好友\u003c/a\u003e\u003c/p\u003e\n\u003ch2\u003e一、为什么不建议上传通讯录加好友\u003c/h2\u003e\n\u003cp\u003e上传通讯录的本质是批量导入联系人并尝试建立好友关系。该操作容易被官方识别为异常加好友行为，尤其在短时间内批量处理时，风险更高。\u003c/p\u003e\n\u003cp\u003e主要风险：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e批量加好友容易触发官方风控。\u003c/li\u003e\u003cli\u003e账号可能被限制、掉线或封禁。\u003c/li\u003e\u003cli\u003e加好友并不是聊天、建群、邀请进群的必要条件。\u003c/li\u003e\u003cli\u003e业务上已有盾牌能力时，通常可以直接聊天，不需要额外添加好友。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、业务应该怎么做\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e优先通过正常对话建立联系。\u003c/li\u003e\u003cli\u003e对方有盾牌时，可以直接主动聊天。\u003c/li\u003e\u003cli\u003e建群或邀请进群不依赖加好友。\u003c/li\u003e\u003cli\u003e如果必须导入联系人，请先确认业务必要性，并控制数量和频率。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、上传通讯录入口说明\u003c/h2\u003e\n\u003cp\u003e系统中仍保留上传通讯录入口，但不建议将其作为常规加好友方式。\u003c/p\u003e\n\u003cp\u003e入口位置：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e找到在线账号。\u003c/li\u003e\u003cli\u003e在账号列表页面点击【上传通讯录】。\u003c/li\u003e\u003cli\u003e系统会弹出上传通讯录窗口。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/uof5OuPKAV-c73ac9b16a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e通讯录模板如下：\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/wGznuogBw1-b0b50c0bd0.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cblockquote\u003e建议：除非明确需要导入联系人，否则不要通过上传通讯录批量加好友。\u003c/blockquote\u003e"},{"id":"b72601dc3d6015a537f1e7bc","title":"为什么在线人数等状态不对","updatedAt":"2026-05-20T23:04:03+08:00","searchText":"  在线、输入中、群在线人数等状态功能已经上线。如果看到的人数或状态不一致，通常是 WhatsApp 官方显示机制导致，不代表星辰功能异常。    \u003e 结论：同一个群、同一个联系人，不同账号看到的在线状态或在线人数可能不一样，这是正常情况。     一、为什么看不到对方在线  即使双方隐私权限允许查看在线状态，也可能出现看不到对方在线的情况。  常见表现：  1. 双方已经互加通讯录。 2. 双方已经互发过消息。 3. 真机环境中仍然可能看不到对方在线。  这类情况属于 WhatsApp 官方显示机制，并不是星辰没有同步状态。       二、为什么看不到群在线人数  不管是群管理员还是普通成员，真机环境中都可能出现以下情况：  1. 有些账号能看到群在线人数。 2. 有些账号看不到群在线人数。 3. 同一时间不同账号看到的显示结果不一致。       三、为什么每个人看到的在线人数不一致  WhatsApp 官方并不会保证所有账号看到完全一致的在线人数。不同账号看到的群在线人数可能不同，这属于官方展示差异。       四、如何判断是否正常  可以按以下方式判断：  1. 如果部分账号能看到在线状态，说明功能已经生效。 2. 如果同群不同账号看到的人数不同，通常是官方显示差异。 3. 如果真机也看不到或显示不一致，说明不是星辰单独异常。  \u003e 提示：在线状态和群在线人数以 WhatsApp 官方实际返回为准。星辰只能展示官方返回的结果，不能强制让所有账号看到完全一致的状态。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e在线、输入中、群在线人数等状态功能已经上线。如果看到的人数或状态不一致，通常是 WhatsApp 官方显示机制导致，不代表星辰功能异常。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e结论：同一个群、同一个联系人，不同账号看到的在线状态或在线人数可能不一样，这是正常情况。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么看不到对方在线\u003c/h2\u003e\n\u003cp\u003e即使双方隐私权限允许查看在线状态，也可能出现看不到对方在线的情况。\u003c/p\u003e\n\u003cp\u003e常见表现：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e双方已经互加通讯录。\u003c/li\u003e\u003cli\u003e双方已经互发过消息。\u003c/li\u003e\u003cli\u003e真机环境中仍然可能看不到对方在线。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e这类情况属于 WhatsApp 官方显示机制，并不是星辰没有同步状态。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/VdR4GLiqhI-a4a20828f6.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e二、为什么看不到群在线人数\u003c/h2\u003e\n\u003cp\u003e不管是群管理员还是普通成员，真机环境中都可能出现以下情况：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e有些账号能看到群在线人数。\u003c/li\u003e\u003cli\u003e有些账号看不到群在线人数。\u003c/li\u003e\u003cli\u003e同一时间不同账号看到的显示结果不一致。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/uEMo7MQK3B-b3a99a44f4.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e三、为什么每个人看到的在线人数不一致\u003c/h2\u003e\n\u003cp\u003eWhatsApp 官方并不会保证所有账号看到完全一致的在线人数。不同账号看到的群在线人数可能不同，这属于官方展示差异。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/QHBvUoLE5S-92c71b4e29.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、如何判断是否正常\u003c/h2\u003e\n\u003cp\u003e可以按以下方式判断：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e如果部分账号能看到在线状态，说明功能已经生效。\u003c/li\u003e\u003cli\u003e如果同群不同账号看到的人数不同，通常是官方显示差异。\u003c/li\u003e\u003cli\u003e如果真机也看不到或显示不一致，说明不是星辰单独异常。\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e提示：在线状态和群在线人数以 WhatsApp 官方实际返回为准。星辰只能展示官方返回的结果，不能强制让所有账号看到完全一致的状态。\u003c/blockquote\u003e"},{"id":"4cdbbb52f226f7030f1d3595","title":"为什么我的号码解封超过1天","updatedAt":"2026-05-20T23:06:03+08:00","searchText":"  如果号码申请解封超过 1 天仍未恢复，通常说明该账号被官方判定为较高等级风控，处理时间会比普通封禁更长。    \u003e 结论：超过一天不能解封的账号，一般可能被官方判定为“欺诈”等较高封禁等级，属于永封前的高等级风控。即使一个月不能解封，也属于可能出现的情况。     一、为什么会超过 1 天还没解封  普通封禁可能较快得到结果，但高等级风控不会固定在 1 天内完成处理。  常见原因：  1. 账号被官方判定为较高风险。 2. 账号触发了更严格的审核流程。 3. 账号封禁等级接近永久封禁。 4. 官方没有明确承诺固定解封时间。     二、超过 1 天是否代表异常  不一定。超过 1 天未解封，不代表星辰没有提交申请，也不代表流程异常。解封结果和处理时长以官方审核为准。  可能出现的情况：  1. 几天后解封。 2. 长时间保持解封中。 3. 最终无法解封。 4. 被判定为永久封禁。     三、应该怎么处理  1. 按正常流程继续查看解封状态。 2. 不要频繁重复提交相同申请。 3. 如果账号长期无法恢复，按业务情况准备替代账号。 4. 如果账号最终永久封禁，可根据需要使用永封继承继续处理会话。     四、官方封禁等级参考  以下为官方封禁等级参考：   ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e如果号码申请解封超过 1 天仍未恢复，通常说明该账号被官方判定为较高等级风控，处理时间会比普通封禁更长。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e结论：超过一天不能解封的账号，一般可能被官方判定为“欺诈”等较高封禁等级，属于永封前的高等级风控。即使一个月不能解封，也属于可能出现的情况。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么会超过 1 天还没解封\u003c/h2\u003e\n\u003cp\u003e普通封禁可能较快得到结果，但高等级风控不会固定在 1 天内完成处理。\u003c/p\u003e\n\u003cp\u003e常见原因：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e账号被官方判定为较高风险。\u003c/li\u003e\u003cli\u003e账号触发了更严格的审核流程。\u003c/li\u003e\u003cli\u003e账号封禁等级接近永久封禁。\u003c/li\u003e\u003cli\u003e官方没有明确承诺固定解封时间。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、超过 1 天是否代表异常\u003c/h2\u003e\n\u003cp\u003e不一定。超过 1 天未解封，不代表星辰没有提交申请，也不代表流程异常。解封结果和处理时长以官方审核为准。\u003c/p\u003e\n\u003cp\u003e可能出现的情况：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e几天后解封。\u003c/li\u003e\u003cli\u003e长时间保持解封中。\u003c/li\u003e\u003cli\u003e最终无法解封。\u003c/li\u003e\u003cli\u003e被判定为永久封禁。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、应该怎么处理\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e按正常流程继续查看解封状态。\u003c/li\u003e\u003cli\u003e不要频繁重复提交相同申请。\u003c/li\u003e\u003cli\u003e如果账号长期无法恢复，按业务情况准备替代账号。\u003c/li\u003e\u003cli\u003e如果账号最终永久封禁，可根据需要使用永封继承继续处理会话。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e四、官方封禁等级参考\u003c/h2\u003e\n\u003cp\u003e以下为官方封禁等级参考：\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/H8_b4gVI1F-7eb85e7131.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"},{"id":"9ed854efdcee60e3469dab41","title":"为什么我的昵称别的号看到的不一样","updatedAt":"2026-05-20T23:12:29+08:00","searchText":"  不同账号看到的昵称不一致，通常是 WhatsApp 官方显示规则导致，不代表星辰同步异常。    \u003e 结论：名字显示优先级通常是【备注 \u003e 昵称 \u003e 手机号码】。如果对方给你设置了备注，对方看到的就是备注；你自己修改昵称后，对方不一定会立刻看到。     一、为什么别人看到的名字不一样  WhatsApp 的联系人名称不是所有人统一显示同一个结果。不同账号看到的名称，取决于对方本地通讯录、备注、官方同步状态等因素。  常见情况：  1. 对方给你设置了备注，对方会优先看到备注名。 2. 你修改了自己的昵称，对方只是有可能看到新昵称。 3. 如果对方暂时没有同步到你的新昵称，就仍然会看到旧名称或手机号码。 4. 很多情况下，一个账号在其他账号里显示的身份仍然是手机号码。       二、昵称修改后为什么没有立刻更新  昵称是否更新，不完全由星辰控制。即使你已经修改了昵称，对方看到的结果仍可能延迟或不变化。  可能原因：  1. 对方本地已经保存了你的备注。 2. WhatsApp 官方没有立即同步你的新昵称。 3. 对方账号当前看到的仍是号码身份。 4. 不同账号的同步时间和显示结果不一致。       三、名字显示优先级  一般情况下，显示优先级如下：  1. 备注。 2. 昵称。 3. 手机号码。  也就是说，只要对方给你设置了备注，你修改自己的昵称也不会覆盖对方本地备注。       四、如何判断是否正常  1. 如果部分账号看到新昵称、部分账号仍看到旧昵称或号码，属于正常情况。 2. 如果对方设置过备注，对方看到备注是正常情况。 3. 如果需要对方看到指定名称，需要对方本地修改备注或等待官方同步。  \u003e 提示：昵称显示以 WhatsApp 官方和对方本地通讯录规则为准，星辰不能强制所有账号立即看到同一个昵称。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e不同账号看到的昵称不一致，通常是 WhatsApp 官方显示规则导致，不代表星辰同步异常。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e结论：名字显示优先级通常是【备注 \u0026gt; 昵称 \u0026gt; 手机号码】。如果对方给你设置了备注，对方看到的就是备注；你自己修改昵称后，对方不一定会立刻看到。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么别人看到的名字不一样\u003c/h2\u003e\n\u003cp\u003eWhatsApp 的联系人名称不是所有人统一显示同一个结果。不同账号看到的名称，取决于对方本地通讯录、备注、官方同步状态等因素。\u003c/p\u003e\n\u003cp\u003e常见情况：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e对方给你设置了备注，对方会优先看到备注名。\u003c/li\u003e\u003cli\u003e你修改了自己的昵称，对方只是有可能看到新昵称。\u003c/li\u003e\u003cli\u003e如果对方暂时没有同步到你的新昵称，就仍然会看到旧名称或手机号码。\u003c/li\u003e\u003cli\u003e很多情况下，一个账号在其他账号里显示的身份仍然是手机号码。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/4SVrUYtspH-f848d9691c.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e二、昵称修改后为什么没有立刻更新\u003c/h2\u003e\n\u003cp\u003e昵称是否更新，不完全由星辰控制。即使你已经修改了昵称，对方看到的结果仍可能延迟或不变化。\u003c/p\u003e\n\u003cp\u003e可能原因：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e对方本地已经保存了你的备注。\u003c/li\u003e\u003cli\u003eWhatsApp 官方没有立即同步你的新昵称。\u003c/li\u003e\u003cli\u003e对方账号当前看到的仍是号码身份。\u003c/li\u003e\u003cli\u003e不同账号的同步时间和显示结果不一致。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/CNwjGFCnx1-f3139ccd5a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e三、名字显示优先级\u003c/h2\u003e\n\u003cp\u003e一般情况下，显示优先级如下：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e备注。\u003c/li\u003e\u003cli\u003e昵称。\u003c/li\u003e\u003cli\u003e手机号码。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e也就是说，只要对方给你设置了备注，你修改自己的昵称也不会覆盖对方本地备注。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/3wf0q_VsJ2-434cd1cc4b.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、如何判断是否正常\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e如果部分账号看到新昵称、部分账号仍看到旧昵称或号码，属于正常情况。\u003c/li\u003e\u003cli\u003e如果对方设置过备注，对方看到备注是正常情况。\u003c/li\u003e\u003cli\u003e如果需要对方看到指定名称，需要对方本地修改备注或等待官方同步。\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e提示：昵称显示以 WhatsApp 官方和对方本地通讯录规则为准，星辰不能强制所有账号立即看到同一个昵称。\u003c/blockquote\u003e"},{"id":"4dcffb42881078e696792326","title":"为什么我的头像经常“消失”","updatedAt":"2026-05-20T23:26:20+08:00","searchText":"  头像经常“消失”，通常是因为当前看到的是缓存头像或临时头像。缓存过期后，如果账号没有正式设置头像，页面就会显示为没有头像。    \u003e 建议：账号每次登录到星辰后，不管页面当前有没有显示头像，都重新设置一次头像。     一、为什么头像会消失  账号和星辰产生交互后，页面可能会显示临时头像。如果登录前该账号曾经和星辰上的账号有过互动，系统可能缓存过头像，因此登录时看起来像是已经有头像。  但这种头像不一定是账号正式设置的头像，可能只是缓存结果。缓存有有效期，过期后就会出现头像消失的情况。  常见表现：  1. 登录时看到有头像，但过一段时间头像消失。 2. 自己页面还能看到头像，其他页面或其他账号看不到。 3. 头像来自缓存，并不是账号正式上传的头像。     二、如何避免头像消失  星辰和手机端一样，账号登录后建议手动设置头像。每次登录后，即使当前页面已经显示头像，也建议重新上传并确认一次。  这样可以让头像变成账号正式设置的头像，而不是依赖临时缓存。     三、方式一：后台设置头像  1. 账号登录成功后，进入账号列表。 2. 点击【编辑头像】。 3. 上传需要使用的头像图片。 4. 点击【确认】保存。       四、方式二：坐席系统设置头像  1. 登录坐席系统。 2. 找到需要修改头像的账号。 3. 右键点击该账号，选择【修改资料】。    4. 在修改资料弹窗中点击头像按钮。 5. 选择需要上传的头像图片。 6. 保存后完成头像修改。    \u003e 提示：如果头像再次消失，请优先重新上传头像，不要只依赖页面上暂时显示的缓存头像。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e头像经常“消失”，通常是因为当前看到的是缓存头像或临时头像。缓存过期后，如果账号没有正式设置头像，页面就会显示为没有头像。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e建议：账号每次登录到星辰后，不管页面当前有没有显示头像，都重新设置一次头像。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么头像会消失\u003c/h2\u003e\n\u003cp\u003e账号和星辰产生交互后，页面可能会显示临时头像。如果登录前该账号曾经和星辰上的账号有过互动，系统可能缓存过头像，因此登录时看起来像是已经有头像。\u003c/p\u003e\n\u003cp\u003e但这种头像不一定是账号正式设置的头像，可能只是缓存结果。缓存有有效期，过期后就会出现头像消失的情况。\u003c/p\u003e\n\u003cp\u003e常见表现：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e登录时看到有头像，但过一段时间头像消失。\u003c/li\u003e\u003cli\u003e自己页面还能看到头像，其他页面或其他账号看不到。\u003c/li\u003e\u003cli\u003e头像来自缓存，并不是账号正式上传的头像。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、如何避免头像消失\u003c/h2\u003e\n\u003cp\u003e星辰和手机端一样，账号登录后建议手动设置头像。每次登录后，即使当前页面已经显示头像，也建议重新上传并确认一次。\u003c/p\u003e\n\u003cp\u003e这样可以让头像变成账号正式设置的头像，而不是依赖临时缓存。\u003c/p\u003e\n\u003ch2\u003e三、方式一：后台设置头像\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e账号登录成功后，进入账号列表。\u003c/li\u003e\u003cli\u003e点击【编辑头像】。\u003c/li\u003e\u003cli\u003e上传需要使用的头像图片。\u003c/li\u003e\u003cli\u003e点击【确认】保存。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/EFK4RD4xAv-c0d74114b0.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、方式二：坐席系统设置头像\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e登录坐席系统。\u003c/li\u003e\u003cli\u003e找到需要修改头像的账号。\u003c/li\u003e\u003cli\u003e右键点击该账号，选择【修改资料】。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/yfIaBXPHhk-a9ee5a378b.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在修改资料弹窗中点击头像按钮。\u003c/li\u003e\u003cli\u003e选择需要上传的头像图片。\u003c/li\u003e\u003cli\u003e保存后完成头像修改。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/2nr8_b1aNz-f759df22fc.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cblockquote\u003e提示：如果头像再次消失，请优先重新上传头像，不要只依赖页面上暂时显示的缓存头像。\u003c/blockquote\u003e"},{"id":"e54e9c3d3ba7b25d7e4fc735","title":"聊天记录明明存在，但是上拉没有","updatedAt":"2026-05-20T23:30:45+08:00","searchText":"  聊天记录明明存在，但上拉时加载不出来，通常是本地网络波动或浏览器临时加载异常导致。    \u003e 结论：这种情况一般不是聊天记录丢失。等待网络恢复后，刷新浏览器即可重新加载。     一、为什么会出现这种情况  聊天记录需要从服务端加载到当前浏览器页面。如果本地网络不稳定，或浏览器临时请求失败，就可能出现上拉无法加载历史记录的情况。  常见触发场景：  1. 本地网络波动。 2. 切换网络。 3. 断网后重新连接。 4. 浏览器页面长时间未刷新。     二、异常表现  网络异常时，上拉聊天窗口可能加载不出历史记录，看起来像聊天记录不存在。       三、如何处理  1. 先确认本地网络已经恢复正常。 2. 等待几分钟，让浏览器重新连接服务。 3. 刷新当前浏览器页面。 4. 重新进入会话后，再上拉查看历史聊天记录。  网络恢复并刷新浏览器后，历史记录会重新加载出来。       四、什么时候需要反馈  如果刷新后仍然无法加载，请按问题反馈模板提交：  1. 坐席账号。 2. 对应会话或群聊截图。 3. 具体操作时间。 4. 上拉加载失败的录屏。  \u003e 提示：反馈前建议先刷新浏览器并复现一次，确认不是临时网络波动。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e聊天记录明明存在，但上拉时加载不出来，通常是本地网络波动或浏览器临时加载异常导致。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e结论：这种情况一般不是聊天记录丢失。等待网络恢复后，刷新浏览器即可重新加载。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么会出现这种情况\u003c/h2\u003e\n\u003cp\u003e聊天记录需要从服务端加载到当前浏览器页面。如果本地网络不稳定，或浏览器临时请求失败，就可能出现上拉无法加载历史记录的情况。\u003c/p\u003e\n\u003cp\u003e常见触发场景：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e本地网络波动。\u003c/li\u003e\u003cli\u003e切换网络。\u003c/li\u003e\u003cli\u003e断网后重新连接。\u003c/li\u003e\u003cli\u003e浏览器页面长时间未刷新。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、异常表现\u003c/h2\u003e\n\u003cp\u003e网络异常时，上拉聊天窗口可能加载不出历史记录，看起来像聊天记录不存在。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/xeZoHIbEYD-2ed5129a11.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e三、如何处理\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e先确认本地网络已经恢复正常。\u003c/li\u003e\u003cli\u003e等待几分钟，让浏览器重新连接服务。\u003c/li\u003e\u003cli\u003e刷新当前浏览器页面。\u003c/li\u003e\u003cli\u003e重新进入会话后，再上拉查看历史聊天记录。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e网络恢复并刷新浏览器后，历史记录会重新加载出来。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/8tv7vAzFFp-33493ac2e5.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、什么时候需要反馈\u003c/h2\u003e\n\u003cp\u003e如果刷新后仍然无法加载，请按问题反馈模板提交：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e坐席账号。\u003c/li\u003e\u003cli\u003e对应会话或群聊截图。\u003c/li\u003e\u003cli\u003e具体操作时间。\u003c/li\u003e\u003cli\u003e上拉加载失败的录屏。\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e提示：反馈前建议先刷新浏览器并复现一次，确认不是临时网络波动。\u003c/blockquote\u003e"},{"id":"0060aa2996494c2ba72a6382","title":"怎么才叫养号，为什么需要养号","updatedAt":"2026-05-20T23:34:48+08:00","searchText":"  养号不是把账号登录后空挂，而是让新登录账号在合理频率下产生真实互动，让账号状态更稳定，降低登录后短期封号或掉号风险。    \u003e 注意：养号不能保证 100% 不封号，但比登录后空挂、低频挂机或集中高频操作更稳定。     一、为什么需要养号  新登录账号在 1 到 3 天内通常处于高风险期。账号刚从手机或其他环境转到星辰后，官方可能会把它识别为新的使用环境。  如果账号登录后长期空挂、没有正常聊天、没有真实群互动，或一上来就大量建群、拉人、加群，就更容易触发风控。  常见高风险行为：  1. 登录后什么都不做，只空挂。 2. 只接粉但长时间没有正常聊天。 3. 新号短时间内频繁搜索、拉人、建群。 4. 一个账号连续操作多个账号或多个群。 5. 新登录账号不绑定坐席，长期没有业务行为。     二、怎么才叫养号  养号的核心是让账号之间产生合理、分散、真实的互动。  建议动作：  1. 先确定坐席需要登录多少个号码。 2. 按正常流程登录号码，并绑定坐席。 3. 让这些号码之间按顺序互相发送消息。 4. 每次操作只处理一个目标，避免一个号连续高频操作多个目标。 5. 每隔一段时间保持正常私聊或群消息接收。  示例：如果坐席要登录 9 个号码 31 到 39，可以按业务需要建立 10 个群 32 到 41，再按分散操作方式进行内部互动。     三、内部账号互发消息  按照图中方式，让 9 个号码互相发送消息。重点是分散频率，不要让一个账号一次性连续搜索并发送给其他全部账号。  正确方式：  1. 每个号码按顺序搜索其中一个号码并发送消息。 2. 发送完成后更换下一个需要发送的号码。 3. 直到号码之间形成两两互动。  不建议方式：  1. 一个号连续搜索其他 8 个号码并发送消息。 2. 在这个阶段点击【加好友】。 3. 短时间内集中完成大量类似动作。         四、建群和拉内部成员  开始建群时，需要把建群数量平均分配到每个账号上。一个账号一次只建一个群，并拉入几个列表中的内部成员。  建议方式：  1. 按账号平均分配建群任务。 2. 每个账号一次只建一个群。 3. 建群时拉入几个内部成员。 4. 建群后保持 1 天左右的正常聊天。  不建议方式：  1. 一个账号一次性连续建多个群。 2. 内部账号通过邀请链接加群。 3. 建空群后让大量账号快速通过链接进群。  内部账号包括托号、老师号等，不管在江河还是星辰上，都建议通过主动消息和添加成员方式加入，不要通过邀请链接集中进群。  外部客户账号不属于内部养号操作范围，正常业务邀请可以按实际情况处理。         五、常见误区  1. 空挂不是养号。 2. 偶尔几个群聊几句也属于低频使用。 3. 登录 3 天内封号属于可能出现的正常风险。 4. 建空群、快速进群、接力加群都容易触发封群或封号。 5. 没有业务行为的新登录账号更容易被判断为异常。     六、风险说明  星辰的养号建议来自大量账号使用和长期测试经验，对账号稳定性有帮助，但不能保证一定不封号。  如果账号在新登录期被封，可按正常流程申请解封并复接。养号的目标是降低风险，不是完全消除官方风控。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e养号不是把账号登录后空挂，而是让新登录账号在合理频率下产生真实互动，让账号状态更稳定，降低登录后短期封号或掉号风险。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：养号不能保证 100% 不封号，但比登录后空挂、低频挂机或集中高频操作更稳定。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么需要养号\u003c/h2\u003e\n\u003cp\u003e新登录账号在 1 到 3 天内通常处于高风险期。账号刚从手机或其他环境转到星辰后，官方可能会把它识别为新的使用环境。\u003c/p\u003e\n\u003cp\u003e如果账号登录后长期空挂、没有正常聊天、没有真实群互动，或一上来就大量建群、拉人、加群，就更容易触发风控。\u003c/p\u003e\n\u003cp\u003e常见高风险行为：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e登录后什么都不做，只空挂。\u003c/li\u003e\u003cli\u003e只接粉但长时间没有正常聊天。\u003c/li\u003e\u003cli\u003e新号短时间内频繁搜索、拉人、建群。\u003c/li\u003e\u003cli\u003e一个账号连续操作多个账号或多个群。\u003c/li\u003e\u003cli\u003e新登录账号不绑定坐席，长期没有业务行为。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、怎么才叫养号\u003c/h2\u003e\n\u003cp\u003e养号的核心是让账号之间产生合理、分散、真实的互动。\u003c/p\u003e\n\u003cp\u003e建议动作：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e先确定坐席需要登录多少个号码。\u003c/li\u003e\u003cli\u003e按正常流程登录号码，并绑定坐席。\u003c/li\u003e\u003cli\u003e让这些号码之间按顺序互相发送消息。\u003c/li\u003e\u003cli\u003e每次操作只处理一个目标，避免一个号连续高频操作多个目标。\u003c/li\u003e\u003cli\u003e每隔一段时间保持正常私聊或群消息接收。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e示例：如果坐席要登录 9 个号码 31 到 39，可以按业务需要建立 10 个群 32 到 41，再按分散操作方式进行内部互动。\u003c/p\u003e\n\u003ch2\u003e三、内部账号互发消息\u003c/h2\u003e\n\u003cp\u003e按照图中方式，让 9 个号码互相发送消息。重点是分散频率，不要让一个账号一次性连续搜索并发送给其他全部账号。\u003c/p\u003e\n\u003cp\u003e正确方式：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e每个号码按顺序搜索其中一个号码并发送消息。\u003c/li\u003e\u003cli\u003e发送完成后更换下一个需要发送的号码。\u003c/li\u003e\u003cli\u003e直到号码之间形成两两互动。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e不建议方式：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e一个号连续搜索其他 8 个号码并发送消息。\u003c/li\u003e\u003cli\u003e在这个阶段点击【加好友】。\u003c/li\u003e\u003cli\u003e短时间内集中完成大量类似动作。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/W2-fV5y6Mv-ecb5faeb33.gif\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/5yfek8Rsfl-caf16493f4.gif\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、建群和拉内部成员\u003c/h2\u003e\n\u003cp\u003e开始建群时，需要把建群数量平均分配到每个账号上。一个账号一次只建一个群，并拉入几个列表中的内部成员。\u003c/p\u003e\n\u003cp\u003e建议方式：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e按账号平均分配建群任务。\u003c/li\u003e\u003cli\u003e每个账号一次只建一个群。\u003c/li\u003e\u003cli\u003e建群时拉入几个内部成员。\u003c/li\u003e\u003cli\u003e建群后保持 1 天左右的正常聊天。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e不建议方式：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e一个账号一次性连续建多个群。\u003c/li\u003e\u003cli\u003e内部账号通过邀请链接加群。\u003c/li\u003e\u003cli\u003e建空群后让大量账号快速通过链接进群。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e内部账号包括托号、老师号等，不管在江河还是星辰上，都建议通过主动消息和添加成员方式加入，不要通过邀请链接集中进群。\u003c/p\u003e\n\u003cp\u003e外部客户账号不属于内部养号操作范围，正常业务邀请可以按实际情况处理。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/U-6vNH9HaJ-5a1adc80b3.gif\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/OIKu4_8QXx-a1d4f8ae54.gif\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e五、常见误区\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e空挂不是养号。\u003c/li\u003e\u003cli\u003e偶尔几个群聊几句也属于低频使用。\u003c/li\u003e\u003cli\u003e登录 3 天内封号属于可能出现的正常风险。\u003c/li\u003e\u003cli\u003e建空群、快速进群、接力加群都容易触发封群或封号。\u003c/li\u003e\u003cli\u003e没有业务行为的新登录账号更容易被判断为异常。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e六、风险说明\u003c/h2\u003e\n\u003cp\u003e星辰的养号建议来自大量账号使用和长期测试经验，对账号稳定性有帮助，但不能保证一定不封号。\u003c/p\u003e\n\u003cp\u003e如果账号在新登录期被封，可按正常流程申请解封并复接。养号的目标是降低风险，不是完全消除官方风控。\u003c/p\u003e"},{"id":"8f0b2a5d9c1e4f637a92d0bc","title":"江河的号码转到星辰上如何同步江河上的粉丝","updatedAt":"2026-05-29T00:00:00+08:00","searchText":"  江河的号码转到星辰后，如需同步江河上的粉丝，请找【F-对接群】处理。       问题  江河的号码转到星辰上，如何同步江河上的粉丝？     处理方式  找【F-对接群】处理。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e江河的号码转到星辰后，如需同步江河上的粉丝，请找【F-对接群】处理。\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e问题\u003c/h2\u003e\n\u003cp\u003e江河的号码转到星辰上，如何同步江河上的粉丝？\u003c/p\u003e\n\u003ch2\u003e处理方式\u003c/h2\u003e\n\u003cp\u003e找【F-对接群】处理。\u003c/p\u003e"},{"id":"ea107f14108e37be0264001f","title":"为什么解封后看不到消息（消息不能解密）","updatedAt":"2026-05-22T10:55:00+08:00","searchText":"  账号解封后，如果封号期间收到的离线消息无法显示，或提示消息不能解密，通常是官方端到端加密机制导致的结果。    \u003e 结论：封号期间产生的离线消息不一定都能解密，是否能恢复只以官方机制为准。包括官方 App、江河、星辰在内，都没有任何方式可以强制解密已经无法解密的离线消息。       一、为什么会出现这种情况  WhatsApp 消息采用端到端加密。账号被封期间，账号状态、设备连接、密钥同步等环节都可能受到影响。  因此，解封后可能出现以下情况：  1. 部分离线消息可以正常显示。 2. 部分离线消息无法解密。 3. 对方已经发送过消息，但当前账号看不到具体内容。 4. 页面提示消息不能解密或需要等待重新同步。  这种情况【不是星辰主动拦截消息】，也【不是通过后台操作就能恢复的内容】。     二、能不能通过技术手段解密  不能。  离线消息能否解密，取决于官方的端到端加密和密钥同步结果。只要官方没有为当前账号提供可用的解密条件，星辰也无法绕过官方机制读取消息内容。  需要注意：  1. 可以用自己的其他号码收发消息，验证当前账号的消息收发功能是否正常。 2. 对于显示消息延迟的粉丝，后续消息是否正常，要以账号解封并恢复在线后的实际收发为准。也就是说，需要引导粉丝重新发送消息，才能判断在线后是否正常。 3. 如果粉丝重新发送后仍然解密失败，但其他号码给你发消息都能正常解密，说明粉丝那边也产生了端到端加密问题，这种情况没有额外方法可以解决。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e账号解封后，如果封号期间收到的离线消息无法显示，或提示消息不能解密，通常是官方端到端加密机制导致的结果。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e结论：封号期间产生的离线消息不一定都能解密，是否能恢复只以官方机制为准。包括官方 App、江河、星辰在内，都没有任何方式可以强制解密已经无法解密的离线消息。\u003c/blockquote\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/faq-message-decrypt-425f5e764b.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e一、为什么会出现这种情况\u003c/h2\u003e\n\u003cp\u003eWhatsApp 消息采用端到端加密。账号被封期间，账号状态、设备连接、密钥同步等环节都可能受到影响。\u003c/p\u003e\n\u003cp\u003e因此，解封后可能出现以下情况：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e部分离线消息可以正常显示。\u003c/li\u003e\u003cli\u003e部分离线消息无法解密。\u003c/li\u003e\u003cli\u003e对方已经发送过消息，但当前账号看不到具体内容。\u003c/li\u003e\u003cli\u003e页面提示消息不能解密或需要等待重新同步。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e这种情况【不是星辰主动拦截消息】，也【不是通过后台操作就能恢复的内容】。\u003c/p\u003e\n\u003ch2\u003e二、能不能通过技术手段解密\u003c/h2\u003e\n\u003cp\u003e不能。\u003c/p\u003e\n\u003cp\u003e离线消息能否解密，取决于官方的端到端加密和密钥同步结果。只要官方没有为当前账号提供可用的解密条件，星辰也无法绕过官方机制读取消息内容。\u003c/p\u003e\n\u003cp\u003e需要注意：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e可以用自己的其他号码收发消息，验证当前账号的消息收发功能是否正常。\u003c/li\u003e\u003cli\u003e对于显示消息延迟的粉丝，后续消息是否正常，要以账号解封并恢复在线后的实际收发为准。也就是说，需要引导粉丝重新发送消息，才能判断在线后是否正常。\u003c/li\u003e\u003cli\u003e如果粉丝重新发送后仍然解密失败，但其他号码给你发消息都能正常解密，说明粉丝那边也产生了端到端加密问题，这种情况没有额外方法可以解决。\u003c/li\u003e\u003c/ol\u003e"},{"id":"afd12137d94e3ac50845c5e8","title":"为什么看到“正在等待此消息，这可能需要一段时间”","updatedAt":"2026-05-23T00:00:00+08:00","searchText":"  看到“正在等待此消息，这可能需要一段时间”，通常表示当前设备还没有拿到这条消息的可用解密内容。    \u003e 结论：这是 WhatsApp 官方端到端加密和多设备同步机制导致的提示，参考 WhatsApp 官方说明： 关于“正在等待此消息。这可能需要一段时间。”  https://faq.whatsapp.com/3398056720476987/  和  看到“正在等待此消息。请查看手机。”  https://faq.whatsapp.com/835452491239734/ 。托号一般没有问题，大部分情况是粉丝侧多设备登录、设备同步或密钥同步异常导致。     一、这是什么意思  WhatsApp 消息采用端到端加密。消息发送后，不同设备需要完成密钥和消息内容同步，当前设备才能正常显示消息内容。  如果同步没有完成，就可能看到：  \u003e 正在等待此消息，这可能需要一段时间  这不代表星辰拦截了消息，也不代表托号一定异常，而是当前设备暂时无法解密这条消息。     二、常见原因  常见原因包括：  1. 粉丝使用了多设备登录。 2. 粉丝设备刚上线、刚换设备或网络不稳定。 3. 粉丝侧消息密钥还没有同步完成。 4. 粉丝发送消息时，当前设备没有及时拿到可用的解密信息（例如托号封号中，粉丝发送了离线消息）。 5. 群聊中不同成员设备状态不同，导致部分人看到的消息状态不一致。  多数情况下，问题不在托号，而在粉丝侧设备或官方同步机制。     三、私聊应该怎么判断  私聊里如果粉丝消息显示“正在等待此消息”，无法直接验证粉丝当前设备状态。此时不要只凭这一个粉丝的表现判断托号异常，需要用另外的号和托号进行收发消息测试。  判断方式：  1. 准备另外一个正常账号，给托号发送消息。 2. 再用托号回复该账号，确认双方是否能正常收发和查看消息。 3. 如果托号和另外的号收发也异常，说明托号可能存在问题。 4. 如果托号和另外的号收发正常，只有该粉丝显示等待，通常就是粉丝侧多设备、设备同步或密钥同步问题。     四、群聊应该怎么判断  群聊里也要按对比验证判断，不要只看星辰页面上的托号表现。  判断方式：  1. 使用真机上的其他账号进入同一个群聊。 2. 让群里产生同一类消息，观察真机上的其他账号是否能正常接收和查看。 3. 如果真机上的其他号接收没有问题，说明星辰上的托号一般没有问题，更多是粉丝侧或官方同步机制导致。 4. 如果真机上的其他号接收也异常，或者只有星辰上的托号持续异常，再按托号问题继续反馈。     五、能不能人工解密  不能。  这类提示属于 WhatsApp 官方端到端加密机制下的显示结果。没有人工操作、后台操作或强制刷新方式可以直接把不能解密的消息解出来。     六、建议处理方式  1. 先区分是私聊问题还是群聊问题。 2. 私聊问题用另外的号和托号收发消息验证。 3. 群聊问题用真机上的其他号进群验证。 4. 验证后确认是托号异常，再按提问格式提交托号、粉丝、群聊和完整截图。 5. 如果验证结果显示托号正常，则通常是粉丝侧多设备、设备同步或官方密钥同步问题。  \u003e 参考：WhatsApp 官方说明中也将该提示归因于端到端加密、多设备同步和消息等待解密流程。实际能否恢复显示，只以官方同步结果为准。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e看到“正在等待此消息，这可能需要一段时间”，通常表示当前设备还没有拿到这条消息的可用解密内容。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e结论：这是 WhatsApp 官方端到端加密和多设备同步机制导致的提示，参考 WhatsApp 官方说明：\u003ca href=\"https://faq.whatsapp.com/3398056720476987/\"\u003e关于“正在等待此消息。这可能需要一段时间。”\u003c/a\u003e 和 \u003ca href=\"https://faq.whatsapp.com/835452491239734/\"\u003e看到“正在等待此消息。请查看手机。”\u003c/a\u003e。托号一般没有问题，大部分情况是粉丝侧多设备登录、设备同步或密钥同步异常导致。\u003c/blockquote\u003e\n\u003ch2\u003e一、这是什么意思\u003c/h2\u003e\n\u003cp\u003eWhatsApp 消息采用端到端加密。消息发送后，不同设备需要完成密钥和消息内容同步，当前设备才能正常显示消息内容。\u003c/p\u003e\n\u003cp\u003e如果同步没有完成，就可能看到：\u003c/p\u003e\n\u003cblockquote\u003e正在等待此消息，这可能需要一段时间\u003c/blockquote\u003e\n\u003cp\u003e这不代表星辰拦截了消息，也不代表托号一定异常，而是当前设备暂时无法解密这条消息。\u003c/p\u003e\n\u003ch2\u003e二、常见原因\u003c/h2\u003e\n\u003cp\u003e常见原因包括：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e粉丝使用了多设备登录。\u003c/li\u003e\u003cli\u003e粉丝设备刚上线、刚换设备或网络不稳定。\u003c/li\u003e\u003cli\u003e粉丝侧消息密钥还没有同步完成。\u003c/li\u003e\u003cli\u003e粉丝发送消息时，当前设备没有及时拿到可用的解密信息（例如托号封号中，粉丝发送了离线消息）。\u003c/li\u003e\u003cli\u003e群聊中不同成员设备状态不同，导致部分人看到的消息状态不一致。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e多数情况下，问题不在托号，而在粉丝侧设备或官方同步机制。\u003c/p\u003e\n\u003ch2\u003e三、私聊应该怎么判断\u003c/h2\u003e\n\u003cp\u003e私聊里如果粉丝消息显示“正在等待此消息”，无法直接验证粉丝当前设备状态。此时不要只凭这一个粉丝的表现判断托号异常，需要用另外的号和托号进行收发消息测试。\u003c/p\u003e\n\u003cp\u003e判断方式：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e准备另外一个正常账号，给托号发送消息。\u003c/li\u003e\u003cli\u003e再用托号回复该账号，确认双方是否能正常收发和查看消息。\u003c/li\u003e\u003cli\u003e如果托号和另外的号收发也异常，说明托号可能存在问题。\u003c/li\u003e\u003cli\u003e如果托号和另外的号收发正常，只有该粉丝显示等待，通常就是粉丝侧多设备、设备同步或密钥同步问题。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e四、群聊应该怎么判断\u003c/h2\u003e\n\u003cp\u003e群聊里也要按对比验证判断，不要只看星辰页面上的托号表现。\u003c/p\u003e\n\u003cp\u003e判断方式：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e使用真机上的其他账号进入同一个群聊。\u003c/li\u003e\u003cli\u003e让群里产生同一类消息，观察真机上的其他账号是否能正常接收和查看。\u003c/li\u003e\u003cli\u003e如果真机上的其他号接收没有问题，说明星辰上的托号一般没有问题，更多是粉丝侧或官方同步机制导致。\u003c/li\u003e\u003cli\u003e如果真机上的其他号接收也异常，或者只有星辰上的托号持续异常，再按托号问题继续反馈。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e五、能不能人工解密\u003c/h2\u003e\n\u003cp\u003e不能。\u003c/p\u003e\n\u003cp\u003e这类提示属于 WhatsApp 官方端到端加密机制下的显示结果。没有人工操作、后台操作或强制刷新方式可以直接把不能解密的消息解出来。\u003c/p\u003e\n\u003ch2\u003e六、建议处理方式\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e先区分是私聊问题还是群聊问题。\u003c/li\u003e\u003cli\u003e私聊问题用另外的号和托号收发消息验证。\u003c/li\u003e\u003cli\u003e群聊问题用真机上的其他号进群验证。\u003c/li\u003e\u003cli\u003e验证后确认是托号异常，再按提问格式提交托号、粉丝、群聊和完整截图。\u003c/li\u003e\u003cli\u003e如果验证结果显示托号正常，则通常是粉丝侧多设备、设备同步或官方密钥同步问题。\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e参考：WhatsApp 官方说明中也将该提示归因于端到端加密、多设备同步和消息等待解密流程。实际能否恢复显示，只以官方同步结果为准。\u003c/blockquote\u003e"},{"id":"8cc0f4046316564933af65a8","title":"我的号不能接收消息、不显示红点","updatedAt":"2026-05-26T00:00:00+08:00","searchText":"号码不能接收消息、不显示红点时，先按下面顺序判断原因。     一、本地网络波动  如果本地网络波动，可能会导致星辰客户端和星辰服务器短暂断线，页面上的消息状态没有及时刷新。  处理方式：先刷新浏览器，再重新查看消息接收和红点提醒是否恢复。     二、账号绑定代理 IP 波动  如果账号绑定的代理 IP 波动，也可能影响消息接收或提醒状态。  这种情况星辰会自动尝试执行修复，可以先等待系统自动处理。     三、区分不能接收和不能解密  如果刷新浏览器和自动修复后仍没有解决，请先判断问题到底是：  1. 不能接收消息。 2. 能收到消息，但不能解密，表现为显示延迟、等候等提示。  如果是消息解密失败，请准确提交号码、截图和问题描述。截图必须能看出问题发生在哪个联系人或哪个群组，问题描述请明确写为：  \u003e 不能解密接收到的信息     四、等待人工客服复核  如果不是本地网络波动、代理 IP 波动，也不是消息解密失败，请等待人工客服进一步复核。 ","html":"\u003cp\u003e号码不能接收消息、不显示红点时，先按下面顺序判断原因。\u003c/p\u003e\n\u003ch2\u003e一、本地网络波动\u003c/h2\u003e\n\u003cp\u003e如果本地网络波动，可能会导致星辰客户端和星辰服务器短暂断线，页面上的消息状态没有及时刷新。\u003c/p\u003e\n\u003cp\u003e处理方式：先刷新浏览器，再重新查看消息接收和红点提醒是否恢复。\u003c/p\u003e\n\u003ch2\u003e二、账号绑定代理 IP 波动\u003c/h2\u003e\n\u003cp\u003e如果账号绑定的代理 IP 波动，也可能影响消息接收或提醒状态。\u003c/p\u003e\n\u003cp\u003e这种情况星辰会自动尝试执行修复，可以先等待系统自动处理。\u003c/p\u003e\n\u003ch2\u003e三、区分不能接收和不能解密\u003c/h2\u003e\n\u003cp\u003e如果刷新浏览器和自动修复后仍没有解决，请先判断问题到底是：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e不能接收消息。\u003c/li\u003e\u003cli\u003e能收到消息，但不能解密，表现为显示延迟、等候等提示。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e如果是消息解密失败，请准确提交号码、截图和问题描述。截图必须能看出问题发生在哪个联系人或哪个群组，问题描述请明确写为：\u003c/p\u003e\n\u003cblockquote\u003e不能解密接收到的信息\u003c/blockquote\u003e\n\u003ch2\u003e四、等待人工客服复核\u003c/h2\u003e\n\u003cp\u003e如果不是本地网络波动、代理 IP 波动，也不是消息解密失败，请等待人工客服进一步复核。\u003c/p\u003e"},{"id":"8de598e0dbfd06c124eea10e","title":"我的号怎么老是被封","updatedAt":"2026-05-26T00:00:00+08:00","searchText":"  账号被封通常没有精细到每一次操作的明确原因，只能结合账号近期状态和使用行为判断可能原因。    \u003e 处理方式：可以执行 /q 号码 查询可能原因。     一、为什么不能给出精确原因  封号结果来自 WhatsApp 官方风控判断，官方不会提供完整、精确的封号明细。  因此，无法准确说明账号是因为哪一次点击、哪一条消息或哪一个具体操作被封。     二、可以怎么查询  如果需要排查，可以按以下格式提交：  \u003e /q 号码  提交后可查询该号码的可能原因，用于辅助判断后续怎么处理。     三、需要注意  1. 查询结果只能作为可能原因参考。 2. 不能保证查到精确封号原因。 3. 如果账号已封，请按正常解封流程处理。 4. 如果经常被封，需要结合登录、养号、聊天、建群、拉人等使用行为一起排查。  \u003e 提示：封号没有精细原因，不要把查询结果理解为官方给出的唯一原因。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e账号被封通常没有精细到每一次操作的明确原因，只能结合账号近期状态和使用行为判断可能原因。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e处理方式：可以执行 /q 号码 查询可能原因。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么不能给出精确原因\u003c/h2\u003e\n\u003cp\u003e封号结果来自 WhatsApp 官方风控判断，官方不会提供完整、精确的封号明细。\u003c/p\u003e\n\u003cp\u003e因此，无法准确说明账号是因为哪一次点击、哪一条消息或哪一个具体操作被封。\u003c/p\u003e\n\u003ch2\u003e二、可以怎么查询\u003c/h2\u003e\n\u003cp\u003e如果需要排查，可以按以下格式提交：\u003c/p\u003e\n\u003cblockquote\u003e/q 号码\u003c/blockquote\u003e\n\u003cp\u003e提交后可查询该号码的可能原因，用于辅助判断后续怎么处理。\u003c/p\u003e\n\u003ch2\u003e三、需要注意\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e查询结果只能作为可能原因参考。\u003c/li\u003e\u003cli\u003e不能保证查到精确封号原因。\u003c/li\u003e\u003cli\u003e如果账号已封，请按正常解封流程处理。\u003c/li\u003e\u003cli\u003e如果经常被封，需要结合登录、养号、聊天、建群、拉人等使用行为一起排查。\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e提示：封号没有精细原因，不要把查询结果理解为官方给出的唯一原因。\u003c/blockquote\u003e"},{"id":"74698fe6f3ad71f7854ef082","title":"我能收到封号中的消息吗","updatedAt":"2026-05-23T00:00:00+08:00","searchText":"  封号期间产生的消息，解封后登录账号可能会接收到记录，但大概率无法正常解密查看。    \u003e 结论：90% 情况下不能正常查看。WhatsApp 官方执行端到端加解密机制，封号期间的消息是否能解密，只以官方机制为准，没有办法人工操作解密。     一、为什么会这样  WhatsApp 消息采用端到端加密。账号封号期间，账号状态、设备连接、密钥同步等环节可能无法正常完成。  因此，解封后登录账号时，可能会出现以下情况：  1. 能看到有消息记录。 2. 能接收到封号期间产生的离线消息。 3. 消息内容大概率解密失败。 4. 页面提示消息不能解密或无法查看具体内容。     二、能不能人工处理  不能。  封号期间消息能否解密，取决于 WhatsApp 官方端到端加密和密钥同步结果。只要官方没有给当前账号提供可用的解密条件，就无法通过人工操作、后台操作或其他方式强制解密。     三、建议怎么理解  封号中的消息可以理解为：解封后可能会同步到账号上，但能不能看见内容不一定。  如果消息解密失败，只能以官方机制结果为准，无法保证恢复，也无法承诺人工解密。  \u003e 提示：涉及封号期间的重要消息，建议账号恢复正常在线后，引导对方重新发送一次。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e封号期间产生的消息，解封后登录账号可能会接收到记录，但大概率无法正常解密查看。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e结论：90% 情况下不能正常查看。WhatsApp 官方执行端到端加解密机制，封号期间的消息是否能解密，只以官方机制为准，没有办法人工操作解密。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么会这样\u003c/h2\u003e\n\u003cp\u003eWhatsApp 消息采用端到端加密。账号封号期间，账号状态、设备连接、密钥同步等环节可能无法正常完成。\u003c/p\u003e\n\u003cp\u003e因此，解封后登录账号时，可能会出现以下情况：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e能看到有消息记录。\u003c/li\u003e\u003cli\u003e能接收到封号期间产生的离线消息。\u003c/li\u003e\u003cli\u003e消息内容大概率解密失败。\u003c/li\u003e\u003cli\u003e页面提示消息不能解密或无法查看具体内容。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、能不能人工处理\u003c/h2\u003e\n\u003cp\u003e不能。\u003c/p\u003e\n\u003cp\u003e封号期间消息能否解密，取决于 WhatsApp 官方端到端加密和密钥同步结果。只要官方没有给当前账号提供可用的解密条件，就无法通过人工操作、后台操作或其他方式强制解密。\u003c/p\u003e\n\u003ch2\u003e三、建议怎么理解\u003c/h2\u003e\n\u003cp\u003e封号中的消息可以理解为：解封后可能会同步到账号上，但能不能看见内容不一定。\u003c/p\u003e\n\u003cp\u003e如果消息解密失败，只能以官方机制结果为准，无法保证恢复，也无法承诺人工解密。\u003c/p\u003e\n\u003cblockquote\u003e提示：涉及封号期间的重要消息，建议账号恢复正常在线后，引导对方重新发送一次。\u003c/blockquote\u003e"},{"id":"3e7a91c4b0f85d26a6c4d8b1","title":"星辰上的号如何不通过发名片同步其他星辰上的号的粉丝","updatedAt":"2026-05-29T00:00:00+08:00","searchText":"  星辰上的号如需不通过发名片，同步其他星辰上的号的粉丝，请找【F-对接群】处理。       问题  星辰上的号如何不通过发名片，同步其他星辰上的号的粉丝？     处理方式  找【F-对接群】处理。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e星辰上的号如需不通过发名片，同步其他星辰上的号的粉丝，请找【F-对接群】处理。\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e问题\u003c/h2\u003e\n\u003cp\u003e星辰上的号如何不通过发名片，同步其他星辰上的号的粉丝？\u003c/p\u003e\n\u003ch2\u003e处理方式\u003c/h2\u003e\n\u003cp\u003e找【F-对接群】处理。\u003c/p\u003e"},{"id":"a5804ffdbefa2dbc56973afc","title":"星辰上能不能换绑手机号","updatedAt":"2026-05-26T00:00:00+08:00","searchText":"  星辰暂时不支持直接换绑 WhatsApp 手机号码。    \u003e 结论：换绑手机号码本质上和用新手机号码重新注册类似，星辰目前没有提供直接换绑功能。如果必须换绑，只能先把账号登回手机，在手机端完成换绑后，再重新登录到星辰，但不建议这样操作。     一、为什么不支持直接换绑  换绑手机号不是简单修改一个号码字段。对 WhatsApp 来说，换绑后的号码相当于新的身份和新的登录状态，涉及官方验证、设备同步、账号风控和消息解密等问题。  因此，星辰目前不提供后台直接换绑手机号码的功能。     二、如果一定要换绑怎么办  如果业务上一定要换绑，只能按官方手机端流程处理：  1. 先把账号登回手机。 2. 在手机 WhatsApp 上完成号码换绑。 3. 换绑完成后，再把新号码重新登录到星辰。  但这个方式不建议作为常规处理方案。     三、为什么不建议换绑  不建议换绑的原因：  1. 换绑后的风控风险和新登录类似。 2. 换绑后重新登录星辰，仍然可能触发官方验证或风控。 3. 旧群里的历史消息可能出现大量解密重试问题。 4. 换绑后消息、群聊、设备同步结果都以官方机制为准，无法保证完全正常。     四、推荐怎么做  如果旧号码不要了，更推荐：  1. 将旧号码处理为封号或永久封禁状态。 2. 注册并登录新号码。 3. 使用新号码继承旧号码的会话记录。  这样和换绑手机号达到的业务效果接近，但流程更清晰，也更符合星辰现有功能。  \u003e 提示：换绑手机号并不能规避新登录风控，反而可能带来旧群消息解密重试等额外问题。一般情况下，不建议通过换绑手机号解决账号更换需求。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e星辰暂时不支持直接换绑 WhatsApp 手机号码。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e结论：换绑手机号码本质上和用新手机号码重新注册类似，星辰目前没有提供直接换绑功能。如果必须换绑，只能先把账号登回手机，在手机端完成换绑后，再重新登录到星辰，但不建议这样操作。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么不支持直接换绑\u003c/h2\u003e\n\u003cp\u003e换绑手机号不是简单修改一个号码字段。对 WhatsApp 来说，换绑后的号码相当于新的身份和新的登录状态，涉及官方验证、设备同步、账号风控和消息解密等问题。\u003c/p\u003e\n\u003cp\u003e因此，星辰目前不提供后台直接换绑手机号码的功能。\u003c/p\u003e\n\u003ch2\u003e二、如果一定要换绑怎么办\u003c/h2\u003e\n\u003cp\u003e如果业务上一定要换绑，只能按官方手机端流程处理：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e先把账号登回手机。\u003c/li\u003e\u003cli\u003e在手机 WhatsApp 上完成号码换绑。\u003c/li\u003e\u003cli\u003e换绑完成后，再把新号码重新登录到星辰。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e但这个方式不建议作为常规处理方案。\u003c/p\u003e\n\u003ch2\u003e三、为什么不建议换绑\u003c/h2\u003e\n\u003cp\u003e不建议换绑的原因：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e换绑后的风控风险和新登录类似。\u003c/li\u003e\u003cli\u003e换绑后重新登录星辰，仍然可能触发官方验证或风控。\u003c/li\u003e\u003cli\u003e旧群里的历史消息可能出现大量解密重试问题。\u003c/li\u003e\u003cli\u003e换绑后消息、群聊、设备同步结果都以官方机制为准，无法保证完全正常。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e四、推荐怎么做\u003c/h2\u003e\n\u003cp\u003e如果旧号码不要了，更推荐：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e将旧号码处理为封号或永久封禁状态。\u003c/li\u003e\u003cli\u003e注册并登录新号码。\u003c/li\u003e\u003cli\u003e使用新号码继承旧号码的会话记录。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e这样和换绑手机号达到的业务效果接近，但流程更清晰，也更符合星辰现有功能。\u003c/p\u003e\n\u003cblockquote\u003e提示：换绑手机号并不能规避新登录风控，反而可能带来旧群消息解密重试等额外问题。一般情况下，不建议通过换绑手机号解决账号更换需求。\u003c/blockquote\u003e"},{"id":"62f3fdfe249504460c4921d5","title":"IP 没发货应该怎么办","updatedAt":"2026-05-26T00:00:00+08:00","searchText":"如果购买 IP 后没有正常发货，先到费用中心查看对应订单的发货和退款状态。     操作步骤  1. 进入【个人设置】中的【费用中心】。 2. 在费用中心选择对应的 IP 购买类型。 3. 找到发货失败的订单，查看订单是否已经发货失败，以及是否已经退款成功。    如果订单显示发货失败但退款状态不明确，或者你无法确认订单状态，可以按统一提问格式反馈对应订单截图，方便进一步查证。 ","html":"\u003cp\u003e如果购买 IP 后没有正常发货，先到费用中心查看对应订单的发货和退款状态。\u003c/p\u003e\n\u003ch2\u003e操作步骤\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e进入【个人设置】中的【费用中心】。\u003c/li\u003e\u003cli\u003e在费用中心选择对应的 IP 购买类型。\u003c/li\u003e\u003cli\u003e找到发货失败的订单，查看订单是否已经发货失败，以及是否已经退款成功。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/faq-ip-not-delivered-2xdd9lxjgy-ed0f21a3d8.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e如果订单显示发货失败但退款状态不明确，或者你无法确认订单状态，可以按统一提问格式反馈对应订单截图，方便进一步查证。\u003c/p\u003e"}]},{"category":{"id":"99b0c70c8141a65f6608a0dd","name":"测试结果","articlesCount":1},"articles":[{"id":"4c12206ddddf3471b6e3e5c0","title":"20260515新版星辰注册/登录测试","updatedAt":"2026-05-20T23:39:49+08:00","searchText":"  本次测试结论：新版星辰注册 / 登录逻辑目前测试正常。除人为输错验证码外，注册、转移、复接失败大多来自官方限制，不是星辰流程异常。       一、测试结论  新版注册 / 登录逻辑更新后，测试结果显示：  1. 正常号码可以完成注册。 2. 正常号码可以完成登录。 3. 正常号码可以完成转移。 4. 正常号码可以完成复接。 5. 失败场景主要集中在官方限制、号码风控或验证码输入错误。     二、失败通常是什么原因  如果出现注册、登录、转移或复接失败，常见原因如下：  1. 验证码人为输入错误。 2. 官方限制当前号码继续登录。 3. 官方限制当前号码转移设备。 4. 官方限制当前号码复接。 5. 号码处于实时风控状态。  \u003e 说明：最终能否发码、登录、转移或复接，以 WhatsApp 官方实时返回为准。     三、遇到失败应该怎么处理  如果遇到失败，不建议短时间内连续重复尝试。  建议按以下间隔处理：  1. 第一次失败后，间隔半天再试。 2. 仍然失败，间隔 1 天再试。 3. 继续失败，间隔 2 天后再试。  除【代理失败，请重试】外，其他红色失败提示不要短时间多次点击重试。重复操作对发码没有帮助，反而可能加重风控。     四、测试截图参考     ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本次测试结论：新版星辰注册 / 登录逻辑目前测试正常。除人为输错验证码外，注册、转移、复接失败大多来自官方限制，不是星辰流程异常。\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e一、测试结论\u003c/h2\u003e\n\u003cp\u003e新版注册 / 登录逻辑更新后，测试结果显示：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e正常号码可以完成注册。\u003c/li\u003e\u003cli\u003e正常号码可以完成登录。\u003c/li\u003e\u003cli\u003e正常号码可以完成转移。\u003c/li\u003e\u003cli\u003e正常号码可以完成复接。\u003c/li\u003e\u003cli\u003e失败场景主要集中在官方限制、号码风控或验证码输入错误。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、失败通常是什么原因\u003c/h2\u003e\n\u003cp\u003e如果出现注册、登录、转移或复接失败，常见原因如下：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e验证码人为输入错误。\u003c/li\u003e\u003cli\u003e官方限制当前号码继续登录。\u003c/li\u003e\u003cli\u003e官方限制当前号码转移设备。\u003c/li\u003e\u003cli\u003e官方限制当前号码复接。\u003c/li\u003e\u003cli\u003e号码处于实时风控状态。\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e说明：最终能否发码、登录、转移或复接，以 WhatsApp 官方实时返回为准。\u003c/blockquote\u003e\n\u003ch2\u003e三、遇到失败应该怎么处理\u003c/h2\u003e\n\u003cp\u003e如果遇到失败，不建议短时间内连续重复尝试。\u003c/p\u003e\n\u003cp\u003e建议按以下间隔处理：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e第一次失败后，间隔半天再试。\u003c/li\u003e\u003cli\u003e仍然失败，间隔 1 天再试。\u003c/li\u003e\u003cli\u003e继续失败，间隔 2 天后再试。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e除【代理失败，请重试】外，其他红色失败提示不要短时间多次点击重试。重复操作对发码没有帮助，反而可能加重风控。\u003c/p\u003e\n\u003ch2\u003e四、测试截图参考\u003c/h2\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/Co6YOTqh94-8b15aac078.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/aPQmLbOQXF-0f8db9b040.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"}]}]</script>
