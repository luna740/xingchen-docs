  <script id="docs-data" type="application/json">[{"category":{"id":"4623ca0b97109196381e087b","name":"星辰Whatsapp使用手册V2.0","articlesCount":24},"articles":[{"id":"69a7d0daa889b919f4222ff9","title":"如何在星辰登录 WhatsApp 账号","updatedAt":"2026-05-20T19:56:33+08:00","searchText":"  登录前请先确认预计登录的账号数量，并购买对应数量的端口和IP,星辰的端口相当于一台手机，一个号登录需要一个端口和一个IP，即一号一端口一IP      一、购买 端口 1. 点击左上方【购买套餐】 2. 选择【whatsapp】产品，修改需要购买的端口个数，默认选择时间是一个月。       3. 勾选同意《服务协议》，点击【前往支付】，进入【确认订单】弹窗。 4. 确认订单信息无误后，必须点击【确认支付】。       5. 购买成功后，点击导航【账号管理】-\u003e【whatsapp】会看到购买的端口数目增加在【端口总数】和【可用端口数】。          二、购买 IP  登录 WhatsApp 账号前，建议先完成 IP 购买，避免后续绑定或登录时因 IP 未准备好影响操作。  1. 在左侧菜单点击【IP 列表】，进入 IP 管理页面。 2. 在 IP 列表中查看当前账号已拥有的 IP 情况。 3. 点击右侧【购买 IP】按钮，打开【购买 IP】弹窗。        填写购买信息  1. 选择需要购买的 IP 国家或地区。 2. 选择购买数量。目前 IP 仅支持单次购买 30 天。 3. 勾选同意《服务协议》，点击【前往支付】，进入【确认订单】弹窗。       4. 确认订单信息无误后，必须点击【确认支付】。     \u003e 注意：必须看清楚国家和数量是否对，购买错误无法退款。       5. 页面提示【支付成功】后，表示端口购买成功。  \u003e 注意：IP 购买最晚 30 分钟发货，平均发货时间为 10 分钟。如果超过 30 分钟仍未到账，请联系客服处理。为保证账号能正常登录和使用，建议提前购买 IP。        三、将 WhatsApp 账号登录到管理员账号下  \u003e 建议先完成 IP 购买，再进行账号登录或绑定操作。  1. 点击导航【账号管理】-\u003e【whatsapp】-\u003e 【登录】按钮，打开登录弹窗。       2. 选择已购买的ip -\u003e填写托号预设昵称 -\u003e 选择 国家 -\u003e 填入 国家区号的号码，如：86135    3252，点击【确认】。     3. 如果号码没有被注册，请求发送成功会弹出【验证码】输入窗口，输入手机收到的短信验证码，再次点击【确认】，如果页面显示【导入成功】代表号码已经注册并登录成功。         4. 如果号码已经被注册，请求发送成功会弹出【主设备验证码】输入窗口，输入手机whatsapp上弹出的转移码，再次点击【确认】，如果页面显示【导入成功】代表号码已经转移并登录成功。    \u003e 注意：如果明知号码已经被注册，但是登录【自动】发的是短信，可以在第2点，选择【设备转移码】强制发出转移码    \u003e 注意：转移码不能正常识别的号码，大多数是风控中的号码（风控不等于封号，表现是不让正常登录），故强制模式有一定失败的概率，遇到登录失败24小时后再试         5. 登录成功后，【WhatsApp 账号】会加入到【星辰客服系统】中，后续可绑定坐席并进行业务操作。     四、下一步：绑定坐席  账号登录到星辰客服系统后，如需由坐席继续操作，请参考： 如何将 WhatsApp 账号与坐席进行绑定  ./如何将 WhatsApp 账号与坐席进行绑定.md  ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e登录前请先确认预计登录的账号数量，并购买对应数量的端口和IP,星辰的端口相当于一台手机，一个号登录需要一个端口和一个IP，即一号一端口一IP\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e一、购买 端口\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e点击左上方【购买套餐】\u003c/li\u003e\u003cli\u003e选择【whatsapp】产品，修改需要购买的端口个数，默认选择时间是一个月。\u003cfigure\u003e\u003cimg src=\"./assets/images/buy-port-product.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e勾选同意《服务协议》，点击【前往支付】，进入【确认订单】弹窗。\u003c/li\u003e\u003cli\u003e确认订单信息无误后，必须点击【确认支付】。\u003cfigure\u003e\u003cimg src=\"./assets/images/buy-port-confirm.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e购买成功后，点击导航【账号管理】-\u0026gt;【whatsapp】会看到购买的端口数目增加在【端口总数】和【可用端口数】。\u003cfigure\u003e\u003cimg src=\"./assets/images/buy-port-success.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、购买 IP\u003c/h2\u003e\n\u003cp\u003e登录 WhatsApp 账号前，建议先完成 IP 购买，避免后续绑定或登录时因 IP 未准备好影响操作。\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在左侧菜单点击【IP 列表】，进入 IP 管理页面。\u003c/li\u003e\u003cli\u003e在 IP 列表中查看当前账号已拥有的 IP 情况。\u003c/li\u003e\u003cli\u003e点击右侧【购买 IP】按钮，打开【购买 IP】弹窗。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/zukmwa7IZW-ac64f475bc.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch3\u003e填写购买信息\u003c/h3\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e选择需要购买的 IP 国家或地区。\u003c/li\u003e\u003cli\u003e选择购买数量。目前 IP 仅支持单次购买 30 天。\u003c/li\u003e\u003cli\u003e勾选同意《服务协议》，点击【前往支付】，进入【确认订单】弹窗。\u003cfigure\u003e\u003cimg src=\"./assets/images/ht7o55Co4x-7f8b61a70d.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e确认订单信息无误后，必须点击【确认支付】。\u003cblockquote\u003e注意：必须看清楚国家和数量是否对，购买错误无法退款。\u003c/blockquote\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/jXLbKgRBEt-982b576941.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e页面提示【支付成功】后，表示端口购买成功。\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e注意：IP 购买最晚 30 分钟发货，平均发货时间为 10 分钟。如果超过 30 分钟仍未到账，请联系客服处理。为保证账号能正常登录和使用，建议提前购买 IP。\u003c/blockquote\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/9OKAADOYLf-be6448c8b0.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e三、将 WhatsApp 账号登录到管理员账号下\u003c/h2\u003e\n\u003cblockquote\u003e建议先完成 IP 购买，再进行账号登录或绑定操作。\u003c/blockquote\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e点击导航【账号管理】-\u0026gt;【whatsapp】-\u0026gt; 【登录】按钮，打开登录弹窗。\u003cfigure\u003e\u003cimg src=\"./assets/images/8BrgAWN41H-aec3eeffd6.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e选择已购买的ip -\u0026gt;填写托号预设昵称 -\u0026gt; 选择 国家 -\u0026gt; 填入 国家区号的号码，如：86135****3252，点击【确认】。\u003cfigure\u003e\u003cimg src=\"./assets/images/8_tBTq4P4H-024a697adc.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e如果号码没有被注册，请求发送成功会弹出【验证码】输入窗口，输入手机收到的短信验证码，再次点击【确认】，如果页面显示【导入成功】代表号码已经注册并登录成功。\u003cfigure\u003e\u003cimg src=\"./assets/images/u8Phpw7b7j-2ae6016992.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/login-success-extra.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e如果号码已经被注册，请求发送成功会弹出【主设备验证码】输入窗口，输入手机whatsapp上弹出的转移码，再次点击【确认】，如果页面显示【导入成功】代表号码已经转移并登录成功。\u003cblockquote\u003e注意：如果明知号码已经被注册，但是登录【自动】发的是短信，可以在第2点，选择【设备转移码】强制发出转移码\u003c/blockquote\u003e\u003cblockquote\u003e注意：转移码不能正常识别的号码，大多数是风控中的号码（风控不等于封号，表现是不让正常登录），故强制模式有一定失败的概率，遇到登录失败24小时后再试\u003c/blockquote\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/login-transfer-code.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/login-success-extra.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e登录成功后，【WhatsApp 账号】会加入到【星辰客服系统】中，后续可绑定坐席并进行业务操作。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e四、下一步：绑定坐席\u003c/h2\u003e\n\u003cp\u003e账号登录到星辰客服系统后，如需由坐席继续操作，请参考：\u003ca href=\"#8a8a83d08de3e1db318905f2\"\u003e如何将 WhatsApp 账号与坐席进行绑定\u003c/a\u003e\u003c/p\u003e"},{"id":"8a8a83d08de3e1db318905f2","title":"如何将 WhatsApp 账号与坐席进行绑定","updatedAt":"2026-05-20T18:45:00+08:00","searchText":"  本文说明如何新建坐席账号，并将 WhatsApp 账号绑定到对应坐席。绑定完成后，坐席登录坐席系统即可操作该 WhatsApp 账号。    \u003e 注意：如果需要更改已绑定的坐席（在坐席中去掉某个号码的绑定），请联系【F-对接群】里面反馈。     一、新建坐席账号  1. 展开左侧菜单【客服坐席】，点击【坐席列表】。       2. 进入【坐席列表】后，点击【新增】，打开【新增坐席账号】弹窗。           3. 按要求填写坐席账号信息，确认无误后点击【确定】。       4. 页面提示创建成功后，即完成坐席账号新建。     二、将 WhatsApp 账号绑定到坐席  1. 在坐席列表中找到需要绑定的坐席账号，点击该账号旁边的【编辑】。       2. 在编辑弹窗中，点击【WhatsApp 账号】旁边的文本框，打开账号选择弹窗。       3. 勾选需要绑定到该坐席的 WhatsApp 账号，点击【确定】。       4. 回到编辑弹窗后，再次点击【确定】，保存绑定关系。       5. 页面提示【编辑成功】，且【绑定账号数】发生变化，即表示 WhatsApp 账号绑定成功。坐席登录【坐席系统】后，即可操作该 WhatsApp 账号。          三、坐席功能权限说明  坐席权限会影响坐席系统中可使用的功能。创建或编辑坐席时，请根据业务需要勾选对应权限。  1. 好友权限     勾选后，坐席系统可以使用查找联系人功能；不勾选则无法查找联系人。           2. 群组 / 社群权限     勾选后，坐席系统可以创建群组和创建社群；不勾选则无法使用相关功能。           3. 聊天权限     勾选后，坐席系统可以进行私聊和群聊；不勾选则无法使用聊天功能。          ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明如何新建坐席账号，并将 WhatsApp 账号绑定到对应坐席。绑定完成后，坐席登录坐席系统即可操作该 WhatsApp 账号。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：如果需要更改已绑定的坐席（在坐席中去掉某个号码的绑定），请联系【F-对接群】里面反馈。\u003c/blockquote\u003e\n\u003ch2\u003e一、新建坐席账号\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e展开左侧菜单【客服坐席】，点击【坐席列表】。\u003cfigure\u003e\u003cimg src=\"./assets/images/hDQb6UAHeJ-fc6d2060be.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e进入【坐席列表】后，点击【新增】，打开【新增坐席账号】弹窗。\u003cfigure\u003e\u003cimg src=\"./assets/images/ivDF8Eek4O-7c164b9b23.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/cunM36JQn7-b76b9026ba.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e按要求填写坐席账号信息，确认无误后点击【确定】。\u003cfigure\u003e\u003cimg src=\"./assets/images/GsAG5kF1D7-9348d11869.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e页面提示创建成功后，即完成坐席账号新建。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、将 WhatsApp 账号绑定到坐席\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在坐席列表中找到需要绑定的坐席账号，点击该账号旁边的【编辑】。\u003cfigure\u003e\u003cimg src=\"./assets/images/edmLwJPj8j-9b5275d1a0.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e在编辑弹窗中，点击【WhatsApp 账号】旁边的文本框，打开账号选择弹窗。\u003cfigure\u003e\u003cimg src=\"./assets/images/e-N43l7OJa-5faf0eec6d.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e勾选需要绑定到该坐席的 WhatsApp 账号，点击【确定】。\u003cfigure\u003e\u003cimg src=\"./assets/images/GqDGLUdIRf-eb927d61e8.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e回到编辑弹窗后，再次点击【确定】，保存绑定关系。\u003cfigure\u003e\u003cimg src=\"./assets/images/EC-WAwgfI1-9860e0f427.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e页面提示【编辑成功】，且【绑定账号数】发生变化，即表示 WhatsApp 账号绑定成功。坐席登录【坐席系统】后，即可操作该 WhatsApp 账号。\u003cfigure\u003e\u003cimg src=\"./assets/images/qTN1gsZA6V-e655212994.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、坐席功能权限说明\u003c/h2\u003e\n\u003cp\u003e坐席权限会影响坐席系统中可使用的功能。创建或编辑坐席时，请根据业务需要勾选对应权限。\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e好友权限\u003cp\u003e勾选后，坐席系统可以使用查找联系人功能；不勾选则无法查找联系人。\u003c/p\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/FokS5hW5ip-1a38caa1c7.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/hUT11-PWuR-4d72132ee5.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e群组 / 社群权限\u003cp\u003e勾选后，坐席系统可以创建群组和创建社群；不勾选则无法使用相关功能。\u003c/p\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/qU8ni7gCru-57529cdf9f.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/cT6DG-S15r-665d0450a2.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e聊天权限\u003cp\u003e勾选后，坐席系统可以进行私聊和群聊；不勾选则无法使用聊天功能。\u003c/p\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/NomAZA1Yav-24192bcf3d.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/f8SwCB7Szj-07e2032b10.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e"},{"id":"4bd71ff4ff791cc70cb2b33a","title":"如何将 WhatsApp 账号与分组（工单）进行绑定","updatedAt":"2026-05-20T18:50:00+08:00","searchText":"  本文说明如何将 WhatsApp 账号绑定到指定分组（工单）。绑定完成后，账号会归属到对应工单下，方便后续分组管理和业务操作。    \u003e 注意：接粉工单号请找【阿宝】提供。如需调整或更改工单，也请联系【阿宝】处理。     一、进入 WhatsApp 账号列表  1. 在左侧菜单中点击【账号管理】。 2. 点击【WhatsApp】，进入【WhatsApp 账号列表】。          二、选择需要绑定的账号  1. 在账号列表中，找到需要绑定分组的 WhatsApp 账号。 2. 勾选【未绑定分组】的 WhatsApp 账号。 3. 点击【绑定分组】，打开【选择分组】弹窗。              三、输入工单号并确认绑定  1. 在弹窗中输入【阿宝】分配的工单号。 2. 确认工单号无误后，点击【确定】。 3. 页面提示【绑定成功】后，表示 WhatsApp 账号已成功绑定到对应分组（工单）。      ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明如何将 WhatsApp 账号绑定到指定分组（工单）。绑定完成后，账号会归属到对应工单下，方便后续分组管理和业务操作。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：接粉工单号请找【阿宝】提供。如需调整或更改工单，也请联系【阿宝】处理。\u003c/blockquote\u003e\n\u003ch2\u003e一、进入 WhatsApp 账号列表\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在左侧菜单中点击【账号管理】。\u003c/li\u003e\u003cli\u003e点击【WhatsApp】，进入【WhatsApp 账号列表】。\u003cfigure\u003e\u003cimg src=\"./assets/images/6IOfECSlVp-12276427d4.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、选择需要绑定的账号\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在账号列表中，找到需要绑定分组的 WhatsApp 账号。\u003c/li\u003e\u003cli\u003e勾选【未绑定分组】的 WhatsApp 账号。\u003c/li\u003e\u003cli\u003e点击【绑定分组】，打开【选择分组】弹窗。\u003cfigure\u003e\u003cimg src=\"./assets/images/5CBwQsueXG-63264a9f6e.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/dNJVCmvQl3-a6ba1128eb.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、输入工单号并确认绑定\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在弹窗中输入【阿宝】分配的工单号。\u003c/li\u003e\u003cli\u003e确认工单号无误后，点击【确定】。\u003c/li\u003e\u003cli\u003e页面提示【绑定成功】后，表示 WhatsApp 账号已成功绑定到对应分组（工单）。\u003cfigure\u003e\u003cimg src=\"./assets/images/YdnKhgfMuD-c15bb87bfc.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e"},{"id":"3c582c7841373f5b2c92ce9c","title":"如何使用坐席进行聊天","updatedAt":"2026-05-20T18:55:00+08:00","searchText":"  本文说明坐席如何登录坐席系统，并使用已绑定的 WhatsApp 账号进行聊天。坐席系统的聊天操作方式与 WhatsApp 网页端基本一致。        一、打开坐席系统  1. 打开坐席系统登录页面。 2. 访问链接： 星辰坐席系统  https://www.xckfkf.com/ /login           二、登录坐席账号  1. 输入正确的坐席账号。 2. 输入密码和验证码。 3. 点击【确定】，提交登录。          三、进入聊天页面  1. 登录成功后，系统会进入坐席系统主页面。 2. 在坐席系统中选择需要操作的 WhatsApp 账号或会话。 3. 进入会话后即可进行私聊或群聊操作。       \u003e 提示：坐席系统的聊天体验与 WhatsApp 网页端基本一致。如果看不到对应账号，请先确认该 WhatsApp 账号是否已经绑定到当前坐席。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明坐席如何登录坐席系统，并使用已绑定的 WhatsApp 账号进行聊天。坐席系统的聊天操作方式与 WhatsApp 网页端基本一致。\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e一、打开坐席系统\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e打开坐席系统登录页面。\u003c/li\u003e\u003cli\u003e访问链接：\u003ca href=\"https://www.xckfkf.com/#/login\"\u003e星辰坐席系统\u003c/a\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/wdFQn6PTKs-31120cf441.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、登录坐席账号\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e输入正确的坐席账号。\u003c/li\u003e\u003cli\u003e输入密码和验证码。\u003c/li\u003e\u003cli\u003e点击【确定】，提交登录。\u003cfigure\u003e\u003cimg src=\"./assets/images/ndI9Xsp4R6-4781beeb5c.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、进入聊天页面\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e登录成功后，系统会进入坐席系统主页面。\u003c/li\u003e\u003cli\u003e在坐席系统中选择需要操作的 WhatsApp 账号或会话。\u003c/li\u003e\u003cli\u003e进入会话后即可进行私聊或群聊操作。\u003cfigure\u003e\u003cimg src=\"./assets/images/OhMkAUis8s-44e403bb1a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e提示：坐席系统的聊天体验与 WhatsApp 网页端基本一致。如果看不到对应账号，请先确认该 WhatsApp 账号是否已经绑定到当前坐席。\u003c/blockquote\u003e"},{"id":"130e72704a7ad203b64004ca","title":"如何设置签名","updatedAt":"2026-05-20T22:02:24+08:00","searchText":"  本文说明如何在后台或坐席系统中设置 WhatsApp 账号签名，以及签名同步和过期后的显示规则。    \u003e 提示：同一个账号在后台和坐席系统中的签名状态是同步的，任意一端修改后都会影响该账号当前签名。     一、在后台设置签名  1. 进入后台【WhatsApp】账号列表。 2. 找到需要设置签名的账号。 3. 点击【编辑签名】，打开签名设置弹窗。       4. 输入需要展示的签名内容。 5. 选择签名生效时长。 6. 点击【确认】保存设置。 7. 页面显示签名内容和倒计时后，表示签名设置成功。          二、在坐席系统设置签名  1. 登录坐席系统。 2. 找到需要设置签名的账号。 3. 对账号点击鼠标右键。 4. 点击【修改资料】，打开账号资料弹窗。       5. 在弹窗中点击【设置状态】。       6. 输入状态内容。 7. 选择状态生效时间。 8. 点击【保存】。       9. 页面提示设置成功后，表示坐席端签名已生效。          三、签名同步和过期说明  1. 后台和坐席系统设置的是同一个账号签名，状态会保持同步。 2. 签名到期后会自动失效，其他人再查看该账号时会看到默认签名。 3. 例如签名设置为 24 小时，【笑脸在线】在第 24 小时内有效；超过 24 小时后即为已过期。 4. 如果签名仍需继续展示，请在过期前重新设置或延长时间。      ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明如何在后台或坐席系统中设置 WhatsApp 账号签名，以及签名同步和过期后的显示规则。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e提示：同一个账号在后台和坐席系统中的签名状态是同步的，任意一端修改后都会影响该账号当前签名。\u003c/blockquote\u003e\n\u003ch2\u003e一、在后台设置签名\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e进入后台【WhatsApp】账号列表。\u003c/li\u003e\u003cli\u003e找到需要设置签名的账号。\u003c/li\u003e\u003cli\u003e点击【编辑签名】，打开签名设置弹窗。\u003cfigure\u003e\u003cimg src=\"./assets/images/00-Q4__ldx-c468a1edd9.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e输入需要展示的签名内容。\u003c/li\u003e\u003cli\u003e选择签名生效时长。\u003c/li\u003e\u003cli\u003e点击【确认】保存设置。\u003c/li\u003e\u003cli\u003e页面显示签名内容和倒计时后，表示签名设置成功。\u003cfigure\u003e\u003cimg src=\"./assets/images/YUjwMXQ0kY-564face54a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、在坐席系统设置签名\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e登录坐席系统。\u003c/li\u003e\u003cli\u003e找到需要设置签名的账号。\u003c/li\u003e\u003cli\u003e对账号点击鼠标右键。\u003c/li\u003e\u003cli\u003e点击【修改资料】，打开账号资料弹窗。\u003cfigure\u003e\u003cimg src=\"./assets/images/CheHjt8G_D-00a8fa2357.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e在弹窗中点击【设置状态】。\u003cfigure\u003e\u003cimg src=\"./assets/images/jb4q3ZDS68-924d7ba60a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e输入状态内容。\u003c/li\u003e\u003cli\u003e选择状态生效时间。\u003c/li\u003e\u003cli\u003e点击【保存】。\u003cfigure\u003e\u003cimg src=\"./assets/images/CzIWTEG0g0-5ea58bcfce.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e页面提示设置成功后，表示坐席端签名已生效。\u003cfigure\u003e\u003cimg src=\"./assets/images/1kmhf85z3T-a475c95616.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、签名同步和过期说明\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e后台和坐席系统设置的是同一个账号签名，状态会保持同步。\u003c/li\u003e\u003cli\u003e签名到期后会自动失效，其他人再查看该账号时会看到默认签名。\u003c/li\u003e\u003cli\u003e例如签名设置为 24 小时，【笑脸在线】在第 24 小时内有效；超过 24 小时后即为已过期。\u003c/li\u003e\u003cli\u003e如果签名仍需继续展示，请在过期前重新设置或延长时间。\u003cfigure\u003e\u003cimg src=\"./assets/images/3V6pQosC5a-de3ec60d9a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e"},{"id":"7d0b620f82cc816acc54d963","title":"如何重置坐席密码且登录坐席修改密码","updatedAt":"2026-05-20T21:58:16+08:00","searchText":"  本文说明管理员如何重置坐席密码，以及坐席登录后如何自行修改密码。    \u003e 注意：管理员重置后的新密码只会在弹窗中显示一次，请及时复制并发送给对应坐席。     一、管理员重置坐席密码  1. 在左侧菜单进入【客服坐席】。 2. 打开【坐席列表】，找到需要重置密码的坐席账号。 3. 点击该账号右侧的【重置密码】。       4. 系统弹出确认窗口后，点击【确认】。       5. 页面提示密码重置成功后，复制弹窗中的新密码。 6. 将新密码发送给对应坐席，用于后续登录。          二、坐席登录后修改密码  坐席拿到管理员重置后的新密码后，可以登录坐席系统并自行修改为常用密码。  1. 使用当前坐席账号和新密码登录坐席系统。 2. 登录成功后，点击右上角账号下拉按钮。 3. 点击【修改密码】，打开修改密码窗口。       4. 输入旧密码。 5. 输入新的坐席密码，并再次确认。 6. 点击【修改】，完成密码更新。       \u003e 提示：修改完成后，请使用新密码重新登录确认，避免后续因密码记录错误影响使用。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明管理员如何重置坐席密码，以及坐席登录后如何自行修改密码。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：管理员重置后的新密码只会在弹窗中显示一次，请及时复制并发送给对应坐席。\u003c/blockquote\u003e\n\u003ch2\u003e一、管理员重置坐席密码\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在左侧菜单进入【客服坐席】。\u003c/li\u003e\u003cli\u003e打开【坐席列表】，找到需要重置密码的坐席账号。\u003c/li\u003e\u003cli\u003e点击该账号右侧的【重置密码】。\u003cfigure\u003e\u003cimg src=\"./assets/images/lm7x-0GI7i-0e031829ee.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e系统弹出确认窗口后，点击【确认】。\u003cfigure\u003e\u003cimg src=\"./assets/images/vkqUHMZJMj-a848c491f7.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e页面提示密码重置成功后，复制弹窗中的新密码。\u003c/li\u003e\u003cli\u003e将新密码发送给对应坐席，用于后续登录。\u003cfigure\u003e\u003cimg src=\"./assets/images/EhEUTQU6yf-09ef3b8056.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、坐席登录后修改密码\u003c/h2\u003e\n\u003cp\u003e坐席拿到管理员重置后的新密码后，可以登录坐席系统并自行修改为常用密码。\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e使用当前坐席账号和新密码登录坐席系统。\u003c/li\u003e\u003cli\u003e登录成功后，点击右上角账号下拉按钮。\u003c/li\u003e\u003cli\u003e点击【修改密码】，打开修改密码窗口。\u003cfigure\u003e\u003cimg src=\"./assets/images/1Vj9GJxSyV-9fd85f590c.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e输入旧密码。\u003c/li\u003e\u003cli\u003e输入新的坐席密码，并再次确认。\u003c/li\u003e\u003cli\u003e点击【修改】，完成密码更新。\u003cfigure\u003e\u003cimg src=\"./assets/images/Xwibvo6HN9-78f0c8c468.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e提示：修改完成后，请使用新密码重新登录确认，避免后续因密码记录错误影响使用。\u003c/blockquote\u003e"},{"id":"43378e8e2b9f173541747e4b","title":"如何调节群名（任意对话）的显示长度","updatedAt":"2026-05-20T20:08:54+08:00","searchText":"  当联系人、群组或社群名称过长时，可以通过会话列表显示设置调节名称展示长度，方便在列表中快速识别不同会话。       一、适用范围  以下会话名称都可以通过该设置调整显示长度：  - 联系人 - 群组 - 社群 - 其他会话列表中的名称     二、调节显示长度  1. 进入会话列表页面。 2. 找到会话列表显示长度相关设置。 3. 根据需要调整名称显示长度。 4. 调整后，联系人、群组或社群名称会按照新的长度展示。       \u003e 提示：如果群名或联系人名称过长，建议适当增加显示长度，便于区分相似会话。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e当联系人、群组或社群名称过长时，可以通过会话列表显示设置调节名称展示长度，方便在列表中快速识别不同会话。\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e一、适用范围\u003c/h2\u003e\n\u003cp\u003e以下会话名称都可以通过该设置调整显示长度：\u003c/p\u003e\n\u003cul class=\"doc-list\"\u003e\u003cli\u003e联系人\u003c/li\u003e\u003cli\u003e群组\u003c/li\u003e\u003cli\u003e社群\u003c/li\u003e\u003cli\u003e其他会话列表中的名称\u003c/li\u003e\u003c/ul\u003e\n\u003ch2\u003e二、调节显示长度\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e进入会话列表页面。\u003c/li\u003e\u003cli\u003e找到会话列表显示长度相关设置。\u003c/li\u003e\u003cli\u003e根据需要调整名称显示长度。\u003c/li\u003e\u003cli\u003e调整后，联系人、群组或社群名称会按照新的长度展示。\u003cfigure\u003e\u003cimg src=\"./assets/images/v5kPUngj5a-ff09b70c92.gif\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e提示：如果群名或联系人名称过长，建议适当增加显示长度，便于区分相似会话。\u003c/blockquote\u003e"},{"id":"130fdeea74a9912da4275485","title":"如何全局修改翻译设置","updatedAt":"2026-05-20T20:20:27+08:00","searchText":"  本文说明如何在后台配置全局翻译设置，并让坐席端使用这套默认配置。适合需要统一翻译引擎、API KEY、消息翻译和群聊翻译规则的场景。    \u003e 注意：建议使用默认的谷歌免费版就好。     一、打开全局翻译设置  1. 点击账号名称右侧的展开按钮。 2. 点击【翻译设置】，打开翻译设置界面。          二、修改翻译配置  1. 根据业务需要选择翻译引擎。 2. 填写或修改  API KEY 。 3. 配置消息翻译、发送翻译和群聊翻译。 4. 确认设置无误后，点击【提交】保存配置。       \u003e 注意：修改全局配置前，请确认 API KEY 可用。配置错误可能导致翻译不可用或翻译失败。     三、坐席端启用默认配置  1. 进入坐席系统界面。 2. 打开坐席端的翻译设置。 3. 勾选【启用默认配置】。 4. 开启后，坐席端会使用后台设置的全局翻译配置。      ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明如何在后台配置全局翻译设置，并让坐席端使用这套默认配置。适合需要统一翻译引擎、API KEY、消息翻译和群聊翻译规则的场景。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：建议使用默认的谷歌免费版就好。\u003c/blockquote\u003e\n\u003ch2\u003e一、打开全局翻译设置\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e点击账号名称右侧的展开按钮。\u003c/li\u003e\u003cli\u003e点击【翻译设置】，打开翻译设置界面。\u003cfigure\u003e\u003cimg src=\"./assets/images/sD-7tntSBR-21afd2e5ab.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、修改翻译配置\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e根据业务需要选择翻译引擎。\u003c/li\u003e\u003cli\u003e填写或修改 `API KEY`。\u003c/li\u003e\u003cli\u003e配置消息翻译、发送翻译和群聊翻译。\u003c/li\u003e\u003cli\u003e确认设置无误后，点击【提交】保存配置。\u003cfigure\u003e\u003cimg src=\"./assets/images/LOlfoQjoju-530a310b95.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e注意：修改全局配置前，请确认 API KEY 可用。配置错误可能导致翻译不可用或翻译失败。\u003c/blockquote\u003e\n\u003ch2\u003e三、坐席端启用默认配置\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e进入坐席系统界面。\u003c/li\u003e\u003cli\u003e打开坐席端的翻译设置。\u003c/li\u003e\u003cli\u003e勾选【启用默认配置】。\u003c/li\u003e\u003cli\u003e开启后，坐席端会使用后台设置的全局翻译配置。\u003cfigure\u003e\u003cimg src=\"./assets/images/xAzyp4jnDI-642c9ebf27.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e"},{"id":"6a0dabf9db178f1cad82b71f","title":"如何打开浏览器通知","updatedAt":"2026-05-20T20:53:32+08:00","searchText":"  本文说明如何开启 Windows 11 系统通知和 Chrome 网站通知。两处通知都开启后，浏览器才能正常弹出网站消息提醒。    \u003e 注意：通知只跟本地环境和浏览器有关，其他系统比如win10、其他浏览器比如edge自行谷歌搜索【如何打开浏览器通知】     一、开启 Win11 系统通知  1. 按下快捷键  Win + i  打开【设置】。 2. 在左侧选择【系统】，然后在右侧点击【通知】。       3. 确保顶部的【通知】开关处于【开启】状态。       4. 向下滚动到【来自应用和其他发件人的通知】列表。 5. 在列表中找到【Google Chrome】，并确保右侧开关处于【开启】状态。          二、开启 Chrome 网站通知  1. 打开 Google Chrome。 2. 点击右上角【⋮】更多图标，选择【设置】。       3. 点击左侧【隐私设置和安全性】。 4. 点击【网站设置】。       5. 在【权限】部分点击【通知】。       6. 选择【网站可以请求发送通知】。开启后，网站可以向浏览器申请通知权限。       7. 滚动到页面下方，检查需要接收通知的网站是否被误设为【不允许发送通知】。 8. 如果目标网站在不允许列表中，请将它移到【允许发送通知】列表。          三、检查通知是否生效  完成以上设置后，重新打开需要接收通知的网站。如果浏览器弹出通知授权提示，请选择允许。  \u003e 提示：如果仍然收不到通知，请同时检查 Windows 专注助手、浏览器通知权限和网站自身的通知设置。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明如何开启 Windows 11 系统通知和 Chrome 网站通知。两处通知都开启后，浏览器才能正常弹出网站消息提醒。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：通知只跟本地环境和浏览器有关，其他系统比如win10、其他浏览器比如edge自行谷歌搜索【如何打开浏览器通知】\u003c/blockquote\u003e\n\u003ch2\u003e一、开启 Win11 系统通知\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e按下快捷键 `Win + i` 打开【设置】。\u003c/li\u003e\u003cli\u003e在左侧选择【系统】，然后在右侧点击【通知】。\u003cfigure\u003e\u003cimg src=\"./assets/images/browser-notification-win-settings.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e确保顶部的【通知】开关处于【开启】状态。\u003cfigure\u003e\u003cimg src=\"./assets/images/browser-notification-win-toggle.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e向下滚动到【来自应用和其他发件人的通知】列表。\u003c/li\u003e\u003cli\u003e在列表中找到【Google Chrome】，并确保右侧开关处于【开启】状态。\u003cfigure\u003e\u003cimg src=\"./assets/images/browser-notification-chrome-app.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、开启 Chrome 网站通知\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e打开 Google Chrome。\u003c/li\u003e\u003cli\u003e点击右上角【⋮】更多图标，选择【设置】。\u003cfigure\u003e\u003cimg src=\"./assets/images/browser-notification-chrome-settings.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e点击左侧【隐私设置和安全性】。\u003c/li\u003e\u003cli\u003e点击【网站设置】。\u003cfigure\u003e\u003cimg src=\"./assets/images/browser-notification-site-settings.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e在【权限】部分点击【通知】。\u003cfigure\u003e\u003cimg src=\"./assets/images/browser-notification-permission.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e选择【网站可以请求发送通知】。开启后，网站可以向浏览器申请通知权限。\u003cfigure\u003e\u003cimg src=\"./assets/images/browser-notification-request.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e滚动到页面下方，检查需要接收通知的网站是否被误设为【不允许发送通知】。\u003c/li\u003e\u003cli\u003e如果目标网站在不允许列表中，请将它移到【允许发送通知】列表。\u003cfigure\u003e\u003cimg src=\"./assets/images/browser-notification-allow-list.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、检查通知是否生效\u003c/h2\u003e\n\u003cp\u003e完成以上设置后，重新打开需要接收通知的网站。如果浏览器弹出通知授权提示，请选择允许。\u003c/p\u003e\n\u003cblockquote\u003e提示：如果仍然收不到通知，请同时检查 Windows 专注助手、浏览器通知权限和网站自身的通知设置。\u003c/blockquote\u003e"},{"id":"24a22d888bf7ec11a807a1b6","title":"如何静音通知","updatedAt":"2026-05-20T20:26:05+08:00","searchText":"  本文说明如何将联系人或群组会话设置为静音通知，以及如何取消静音。适合需要减少消息提醒干扰，但仍保留会话记录的场景。       一、设置静音通知  1. 在会话列表中找到需要静音的联系人或群组。 2. 右键点击该会话。 3. 在菜单中点击【静音通知】。          二、确认静音状态  1. 设置成功后，会话列表中会显示静音标识。 2. 后续该会话有新消息时，系统不会按正常通知方式提醒。          三、取消静音通知  1. 找到已静音的联系人或群组。 2. 右键点击该会话。 3. 点击取消静音相关选项，即可恢复通知。  \u003e 提示：静音通知只影响提醒方式，不会删除会话，也不会影响消息接收。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明如何将联系人或群组会话设置为静音通知，以及如何取消静音。适合需要减少消息提醒干扰，但仍保留会话记录的场景。\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e一、设置静音通知\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在会话列表中找到需要静音的联系人或群组。\u003c/li\u003e\u003cli\u003e右键点击该会话。\u003c/li\u003e\u003cli\u003e在菜单中点击【静音通知】。\u003cfigure\u003e\u003cimg src=\"./assets/images/a8YPoudx4u-cf0b61f250.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、确认静音状态\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e设置成功后，会话列表中会显示静音标识。\u003c/li\u003e\u003cli\u003e后续该会话有新消息时，系统不会按正常通知方式提醒。\u003cfigure\u003e\u003cimg src=\"./assets/images/MAJROIjXKb-704c810788.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、取消静音通知\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e找到已静音的联系人或群组。\u003c/li\u003e\u003cli\u003e右键点击该会话。\u003c/li\u003e\u003cli\u003e点击取消静音相关选项，即可恢复通知。\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e提示：静音通知只影响提醒方式，不会删除会话，也不会影响消息接收。\u003c/blockquote\u003e"},{"id":"8983db65132cba9a1dc96751","title":"如何对应坐席好友和统计工单的粉丝","updatedAt":"2026-05-20T20:29:57+08:00","searchText":"  本文说明如何通过好友 ID 对应坐席系统中的好友和后台统计工单中的粉丝，方便核对同一个粉丝在不同页面中的数据。       一、在坐席系统查看好友 ID  1. 登录坐席系统。 2. 打开需要核对的好友详情。 3. 在好友详情中查看好友 ID。该 ID 是好友的唯一标识。          二、在后台粉丝列表查看 ID  1. 进入后台的粉丝列表。 2. 找到需要核对的粉丝记录。 3. 查看粉丝列表中的 ID。          三、对应关系说明  坐席系统好友详情中的 ID，与后台粉丝列表中的 ID 是对应的。两个页面中 ID 一致，即表示它们是同一个粉丝。  \u003e 提示：核对粉丝归属或统计数据时，优先使用 ID 判断，不要只依赖昵称或头像，因为昵称和头像可能重复或发生变化。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明如何通过好友 ID 对应坐席系统中的好友和后台统计工单中的粉丝，方便核对同一个粉丝在不同页面中的数据。\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e一、在坐席系统查看好友 ID\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e登录坐席系统。\u003c/li\u003e\u003cli\u003e打开需要核对的好友详情。\u003c/li\u003e\u003cli\u003e在好友详情中查看好友 ID。该 ID 是好友的唯一标识。\u003cfigure\u003e\u003cimg src=\"./assets/images/oZ6MEuPHyD-f9284f4557.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、在后台粉丝列表查看 ID\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e进入后台的粉丝列表。\u003c/li\u003e\u003cli\u003e找到需要核对的粉丝记录。\u003c/li\u003e\u003cli\u003e查看粉丝列表中的 ID。\u003cfigure\u003e\u003cimg src=\"./assets/images/8YCX6LgDxr-28a87afee4.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、对应关系说明\u003c/h2\u003e\n\u003cp\u003e坐席系统好友详情中的 ID，与后台粉丝列表中的 ID 是对应的。两个页面中 ID 一致，即表示它们是同一个粉丝。\u003c/p\u003e\n\u003cblockquote\u003e提示：核对粉丝归属或统计数据时，优先使用 ID 判断，不要只依赖昵称或头像，因为昵称和头像可能重复或发生变化。\u003c/blockquote\u003e"},{"id":"7466efc325536dd41f9258fa","title":"如何使用对话自定义分组","updatedAt":"2026-05-20T20:34:07+08:00","searchText":"  本文说明如何创建对话自定义分组，并对分组中的联系人、群组或社群会话进行添加、移除、重命名和删除操作。       一、创建自定义分组  1. 在会话列表中点击【管理分组】。       2. 点击【+】按钮，新建分组。       3. 在创建界面填写分组名称，勾选需要加入分组的会话，然后点击【创建】。       4. 页面提示创建成功后，即完成自定义分组创建。          二、修改分组名称  1. 找到需要修改的分组，点击【更改分组名称】按钮。       2. 在弹窗中填写新的分组名称。 3. 点击【确认】，保存新的分组名称。          三、添加聊天到分组  1. 进入目标分组，点击【添加聊天】按钮。       2. 勾选需要加入该分组的聊天会话。 3. 点击【添加】。       4. 添加成功后，可以在该分组下看到刚才勾选的聊天会话。          四、从分组中移除聊天  1. 进入目标分组，点击【移除聊天】按钮。       2. 在弹窗中勾选需要移除的聊天。 3. 点击【移除】。       4. 移除成功后，会话会回到默认分类：联系人回到联系人列表，群组聊天回到群组，社群聊天回到社群。          五、删除自定义分组  1. 找到需要删除的分组，点击【删除分组】按钮。       2. 系统弹出确认删除界面后，确认提示内容。 3. 点击【删除】完成删除。       \u003e 注意：删除分组后，该分组中的所有聊天会自动移至默认分组，不会删除聊天本身。     六、转移会话到其他分组  如果需要把会话转移到新的分组，可以进入目标新分组，使用【添加聊天】选择要转移的会话。添加完成后，该会话就会出现在新的分组中。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明如何创建对话自定义分组，并对分组中的联系人、群组或社群会话进行添加、移除、重命名和删除操作。\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e一、创建自定义分组\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在会话列表中点击【管理分组】。\u003cfigure\u003e\u003cimg src=\"./assets/images/1WEoTQdxtu-a2bd8d2f0e.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e点击【+】按钮，新建分组。\u003cfigure\u003e\u003cimg src=\"./assets/images/qTRNBHf9vE-6b284d77c9.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e在创建界面填写分组名称，勾选需要加入分组的会话，然后点击【创建】。\u003cfigure\u003e\u003cimg src=\"./assets/images/L3G6WHdEy3-99303b0e46.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e页面提示创建成功后，即完成自定义分组创建。\u003cfigure\u003e\u003cimg src=\"./assets/images/mK13phpu6g-903ad25c6d.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、修改分组名称\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e找到需要修改的分组，点击【更改分组名称】按钮。\u003cfigure\u003e\u003cimg src=\"./assets/images/gFICXMAkbO-68929f1bfb.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e在弹窗中填写新的分组名称。\u003c/li\u003e\u003cli\u003e点击【确认】，保存新的分组名称。\u003cfigure\u003e\u003cimg src=\"./assets/images/uQk-cYdwq_-b21b0c26f2.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、添加聊天到分组\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e进入目标分组，点击【添加聊天】按钮。\u003cfigure\u003e\u003cimg src=\"./assets/images/0IdnEv-Y9T-542b0d9b8d.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e勾选需要加入该分组的聊天会话。\u003c/li\u003e\u003cli\u003e点击【添加】。\u003cfigure\u003e\u003cimg src=\"./assets/images/PcN0krMZBF-5d9510c288.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e添加成功后，可以在该分组下看到刚才勾选的聊天会话。\u003cfigure\u003e\u003cimg src=\"./assets/images/DB6fNxEjYx-6a0957cf8b.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e四、从分组中移除聊天\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e进入目标分组，点击【移除聊天】按钮。\u003cfigure\u003e\u003cimg src=\"./assets/images/N8b3Ni61LR-d1d6cc54d6.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e在弹窗中勾选需要移除的聊天。\u003c/li\u003e\u003cli\u003e点击【移除】。\u003cfigure\u003e\u003cimg src=\"./assets/images/4_cRnl7_DK-7e640d2b12.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e移除成功后，会话会回到默认分类：联系人回到联系人列表，群组聊天回到群组，社群聊天回到社群。\u003cfigure\u003e\u003cimg src=\"./assets/images/_hRRzEMTJU-b3037e7435.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e五、删除自定义分组\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e找到需要删除的分组，点击【删除分组】按钮。\u003cfigure\u003e\u003cimg src=\"./assets/images/n_CvwO1hp--03bbcce1cc.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e系统弹出确认删除界面后，确认提示内容。\u003c/li\u003e\u003cli\u003e点击【删除】完成删除。\u003cfigure\u003e\u003cimg src=\"./assets/images/ebXnICTEfx-dfe3619b42.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e注意：删除分组后，该分组中的所有聊天会自动移至默认分组，不会删除聊天本身。\u003c/blockquote\u003e\n\u003ch2\u003e六、转移会话到其他分组\u003c/h2\u003e\n\u003cp\u003e如果需要把会话转移到新的分组，可以进入目标新分组，使用【添加聊天】选择要转移的会话。添加完成后，该会话就会出现在新的分组中。\u003c/p\u003e"},{"id":"91607c6bee58eee082787eba","title":"如何一键已读","updatedAt":"2026-05-20T21:59:53+08:00","searchText":"  本文说明如何使用【一键已读】功能，将账号中未归档的消息批量标记为已读。    \u003e 注意：【一键已读】会批量处理当前账号未归档的消息，请确认无需逐条查看后再操作。     一、进入账号列表  1. 在左侧菜单进入【账号管理】。 2. 打开对应的 WhatsApp 账号列表。 3. 找到需要执行一键已读的账号。     二、执行一键已读  1. 在账号列表中，对目标账号点击鼠标右键。 2. 在右键菜单中点击【一键已读】。 3. 系统会将该账号中未归档的消息批量标记为已读。          三、使用建议  1. 不建议频繁点击【一键已读】，避免影响坐席正常判断新消息。 2. 如果账号仍在持续接收客户消息，建议先确认是否有重要消息需要人工查看。 3. 一键已读适合用于清理已确认无需处理的未读消息。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明如何使用【一键已读】功能，将账号中未归档的消息批量标记为已读。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：【一键已读】会批量处理当前账号未归档的消息，请确认无需逐条查看后再操作。\u003c/blockquote\u003e\n\u003ch2\u003e一、进入账号列表\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在左侧菜单进入【账号管理】。\u003c/li\u003e\u003cli\u003e打开对应的 WhatsApp 账号列表。\u003c/li\u003e\u003cli\u003e找到需要执行一键已读的账号。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、执行一键已读\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在账号列表中，对目标账号点击鼠标右键。\u003c/li\u003e\u003cli\u003e在右键菜单中点击【一键已读】。\u003c/li\u003e\u003cli\u003e系统会将该账号中未归档的消息批量标记为已读。\u003cfigure\u003e\u003cimg src=\"./assets/images/Xx3AATUEMB-7e6cc4ef78.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、使用建议\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e不建议频繁点击【一键已读】，避免影响坐席正常判断新消息。\u003c/li\u003e\u003cli\u003e如果账号仍在持续接收客户消息，建议先确认是否有重要消息需要人工查看。\u003c/li\u003e\u003cli\u003e一键已读适合用于清理已确认无需处理的未读消息。\u003c/li\u003e\u003c/ol\u003e"},{"id":"75d4ce22d9f68f92fa0d7e6e","title":"如何进行群审批","updatedAt":"2026-05-20T20:37:21+08:00","searchText":"  本文说明收到进群申请后，如何进入群审批页面并处理审批。适用于通过邀请链接申请进群，或群内普通成员请求添加其他人员进群的场景。       一、查看进群申请通知  1. 当有人通过邀请链接申请进群时，系统会产生通知消息。 2. 当群内普通成员请求添加其他人员进群时，也会产生通知消息。          二、进入审批界面  1. 在通知消息中点击相关入口。 2. 页面会跳转到群审批界面。          三、查找并处理审批  1. 审批界面会按时间倒序展示申请记录，最新申请会排在前面。 2. 如果申请记录较多，可以使用模糊搜索快速查找目标申请。 3. 找到对应申请后，根据实际情况进行审批处理。          四、审批频率注意事项  \u003e 注意：审批操作过快可能会触发限制。建议控制审批频率，约 20 秒处理一个申请。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明收到进群申请后，如何进入群审批页面并处理审批。适用于通过邀请链接申请进群，或群内普通成员请求添加其他人员进群的场景。\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e一、查看进群申请通知\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e当有人通过邀请链接申请进群时，系统会产生通知消息。\u003c/li\u003e\u003cli\u003e当群内普通成员请求添加其他人员进群时，也会产生通知消息。\u003cfigure\u003e\u003cimg src=\"./assets/images/iT_YzsLtWD-ab2b1871db.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、进入审批界面\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在通知消息中点击相关入口。\u003c/li\u003e\u003cli\u003e页面会跳转到群审批界面。\u003cfigure\u003e\u003cimg src=\"./assets/images/KceWFqfXFE-ca47e5a943.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、查找并处理审批\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e审批界面会按时间倒序展示申请记录，最新申请会排在前面。\u003c/li\u003e\u003cli\u003e如果申请记录较多，可以使用模糊搜索快速查找目标申请。\u003c/li\u003e\u003cli\u003e找到对应申请后，根据实际情况进行审批处理。\u003cfigure\u003e\u003cimg src=\"./assets/images/20UEcxqUTD-4f249d7115.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e四、审批频率注意事项\u003c/h2\u003e\n\u003cblockquote\u003e注意：审批操作过快可能会触发限制。建议控制审批频率，约 20 秒处理一个申请。\u003c/blockquote\u003e"},{"id":"d4e55cd8ffc5569b71db6eeb","title":"如何在群聊中快速查看资料","updatedAt":"2026-05-20T20:40:44+08:00","searchText":"  本文说明如何在群聊中快速查看成员资料。适合需要确认群成员身份、查看资料信息或进行后续沟通前核对信息的场景。       一、进入群聊  1. 打开需要查看成员资料的群聊。 2. 在群聊消息或成员区域找到目标成员。     二、快速查看成员资料  1. 点击目标群成员的头像。 2. 系统会打开该成员的资料信息。           \u003e 提示：通过头像查看资料可以快速核对成员信息，不需要先添加好友。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明如何在群聊中快速查看成员资料。适合需要确认群成员身份、查看资料信息或进行后续沟通前核对信息的场景。\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e一、进入群聊\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e打开需要查看成员资料的群聊。\u003c/li\u003e\u003cli\u003e在群聊消息或成员区域找到目标成员。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、快速查看成员资料\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e点击目标群成员的头像。\u003c/li\u003e\u003cli\u003e系统会打开该成员的资料信息。\u003cfigure\u003e\u003cimg src=\"./assets/images/IoRWoX95e0-52199ce356.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/T9sTiUIRAA-eddf602889.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e提示：通过头像查看资料可以快速核对成员信息，不需要先添加好友。\u003c/blockquote\u003e"},{"id":"749e3e05e9e68b4ea6aca3a0","title":"如何使用批量加群","updatedAt":"2026-05-20T20:40:44+08:00","searchText":"  本文说明如何在坐席系统中使用批量加群功能。该功能用于一次性添加多个群链接，并按设置的间隔逐个执行加群操作。    \u003e 注意：新号通过链接批量加群有可能封号。 \u003e 注意：老号通过链接批量加新群有可能封群。 \u003e 注意：大量的加群动作需要养号，接力加群必封群或者封号（先少部分人拉一起创群，然后其他号通过链接批量进群，这个操作叫接力。接力是已知的违禁动作）。     一、打开批量加群功能  1. 进入坐席系统。 2. 点击坐席右侧底部的【批量加群 / 退群】按钮。     二、填写群链接并开始加群  1. 粘贴需要添加的群链接。 2. 设置等待时间。 3. 点击【批量加群】，系统开始按顺序执行加群。          三、查看加群结果  1. 批量加群开始后，系统会逐个处理群链接。 2. 每添加一个群，都会显示成功或失败提示。 3. 页面会同步展示加群记录，方便核对执行结果。          四、操作限制  \u003e 注意：批量加群过程中不要刷新浏览器。刷新会自动停止批量加群。同时不要开启批量退群，因为加群和退群只能执行一项，不能同时进行。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明如何在坐席系统中使用批量加群功能。该功能用于一次性添加多个群链接，并按设置的间隔逐个执行加群操作。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：新号通过链接批量加群有可能封号。\u003c/blockquote\u003e\n\u003cblockquote\u003e注意：老号通过链接批量加新群有可能封群。\u003c/blockquote\u003e\n\u003cblockquote\u003e注意：大量的加群动作需要养号，接力加群必封群或者封号（先少部分人拉一起创群，然后其他号通过链接批量进群，这个操作叫接力。接力是已知的违禁动作）。\u003c/blockquote\u003e\n\u003ch2\u003e一、打开批量加群功能\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e进入坐席系统。\u003c/li\u003e\u003cli\u003e点击坐席右侧底部的【批量加群 / 退群】按钮。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、填写群链接并开始加群\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e粘贴需要添加的群链接。\u003c/li\u003e\u003cli\u003e设置等待时间。\u003c/li\u003e\u003cli\u003e点击【批量加群】，系统开始按顺序执行加群。\u003cfigure\u003e\u003cimg src=\"./assets/images/jrCia-Wub_-52d4e3bbb6.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、查看加群结果\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e批量加群开始后，系统会逐个处理群链接。\u003c/li\u003e\u003cli\u003e每添加一个群，都会显示成功或失败提示。\u003c/li\u003e\u003cli\u003e页面会同步展示加群记录，方便核对执行结果。\u003cfigure\u003e\u003cimg src=\"./assets/images/DFt1oCiy7F-ee0d234743.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e四、操作限制\u003c/h2\u003e\n\u003cblockquote\u003e注意：批量加群过程中不要刷新浏览器。刷新会自动停止批量加群。同时不要开启批量退群，因为加群和退群只能执行一项，不能同时进行。\u003c/blockquote\u003e"},{"id":"58b9b6849105343563639e9c","title":"如何使用批量退群","updatedAt":"2026-05-20T20:40:44+08:00","searchText":"  本文说明如何在坐席系统中使用批量退群功能。该功能用于批量选择群聊，并按设置的间隔逐个执行退群操作。    \u003e 注意：一般情况下不会触发风控。如果不确定适合的操作频率，请不要修改默认间隔配置。     一、打开批量退群功能  1. 进入坐席系统。 2. 点击坐席右侧底部的【批量加群 / 退群】按钮。 3. 切换到【批量退群】页面。     二、选择群聊并开始退群  1. 勾选需要退出的群聊。 2. 设置等待时间。 3. 点击【批量退群】，系统开始按顺序执行退群。          三、查看退群结果  1. 批量退群开始后，系统会逐个处理已勾选的群聊。 2. 每退出一个群，都会显示成功或失败提示。 3. 页面会同步展示退群记录。 4. 如需中断操作，可以点击【停止】。          四、操作限制  \u003e 注意：批量退群过程中不要刷新浏览器。刷新会自动停止批量退群。同时不要开启批量加群，因为加群和退群只能执行一项，不能同时进行。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明如何在坐席系统中使用批量退群功能。该功能用于批量选择群聊，并按设置的间隔逐个执行退群操作。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：一般情况下不会触发风控。如果不确定适合的操作频率，请不要修改默认间隔配置。\u003c/blockquote\u003e\n\u003ch2\u003e一、打开批量退群功能\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e进入坐席系统。\u003c/li\u003e\u003cli\u003e点击坐席右侧底部的【批量加群 / 退群】按钮。\u003c/li\u003e\u003cli\u003e切换到【批量退群】页面。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、选择群聊并开始退群\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e勾选需要退出的群聊。\u003c/li\u003e\u003cli\u003e设置等待时间。\u003c/li\u003e\u003cli\u003e点击【批量退群】，系统开始按顺序执行退群。\u003cfigure\u003e\u003cimg src=\"./assets/images/Dmot_oBNYi-b8c09ce333.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、查看退群结果\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e批量退群开始后，系统会逐个处理已勾选的群聊。\u003c/li\u003e\u003cli\u003e每退出一个群，都会显示成功或失败提示。\u003c/li\u003e\u003cli\u003e页面会同步展示退群记录。\u003c/li\u003e\u003cli\u003e如需中断操作，可以点击【停止】。\u003cfigure\u003e\u003cimg src=\"./assets/images/DxQFspICid-f6d2d45bb6.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e四、操作限制\u003c/h2\u003e\n\u003cblockquote\u003e注意：批量退群过程中不要刷新浏览器。刷新会自动停止批量退群。同时不要开启批量加群，因为加群和退群只能执行一项，不能同时进行。\u003c/blockquote\u003e"},{"id":"fad933e15da3a515f5882972","title":"如何续费 IP 和开启自动续费","updatedAt":"2026-05-20T20:58:11+08:00","searchText":"  本文说明如何手动续费 IP，以及如何开启 IP 自动续费。建议提前续费或开启自动续费，避免 IP 到期影响 WhatsApp 账号正常使用。       一、通过 WhatsApp 账号列表续费 IP  1. 进入【WhatsApp】账号列表。 2. 选中需要续费 IP 的账号。 3. 点击【续费 IP】按钮。       4. 页面弹出支付界面后，点击【前往支付】。       5. 确认订单无误后，点击【确认支付】。 6. 支付成功后，即完成 IP 续费。正常情况下续费周期为一个月。          二、通过 IP 列表续费 IP  1. 进入【IP 列表】。 2. 选中需要续费的 IP。 3. 点击【续费 IP】按钮。       4. 页面弹出支付界面后，点击【前往支付】。       5. 确认订单无误后，点击【确认支付】。 6. 支付成功后，即完成 IP 续费。正常情况下续费周期为一个月。          三、在 WhatsApp 账号列表开启自动续费  1. 打开【WhatsApp】账号列表。 2. 横向滑动底部滚动条，找到【自动续费 IP】列。 3. 点击【开启】按钮。       4. 页面弹出确认窗口后，点击【确认】。 5. 确认后，该账号的 IP 自动续费即开启成功。          四、在 IP 列表开启自动续费  1. 打开【IP 列表】。 2. 横向滑动底部滚动条，找到【自动续费 IP】列。 3. 点击【开启】按钮。       4. 页面弹出确认窗口后，点击【确认】。 5. 确认后，该 IP 自动续费即开启成功。       \u003e 注意：开启自动续费后，请保持账号余额充足。余额不足可能导致续费失败，进而影响账号正常使用。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明如何手动续费 IP，以及如何开启 IP 自动续费。建议提前续费或开启自动续费，避免 IP 到期影响 WhatsApp 账号正常使用。\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e一、通过 WhatsApp 账号列表续费 IP\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e进入【WhatsApp】账号列表。\u003c/li\u003e\u003cli\u003e选中需要续费 IP 的账号。\u003c/li\u003e\u003cli\u003e点击【续费 IP】按钮。\u003cfigure\u003e\u003cimg src=\"./assets/images/qFYQzFYBFL-2caa139900.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e页面弹出支付界面后，点击【前往支付】。\u003cfigure\u003e\u003cimg src=\"./assets/images/KEvJDkphFz-b93540fdfe.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e确认订单无误后，点击【确认支付】。\u003c/li\u003e\u003cli\u003e支付成功后，即完成 IP 续费。正常情况下续费周期为一个月。\u003cfigure\u003e\u003cimg src=\"./assets/images/A304mMnhPJ-500b3916b1.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、通过 IP 列表续费 IP\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e进入【IP 列表】。\u003c/li\u003e\u003cli\u003e选中需要续费的 IP。\u003c/li\u003e\u003cli\u003e点击【续费 IP】按钮。\u003cfigure\u003e\u003cimg src=\"./assets/images/o0pJbSQVh5-5d652caf35.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e页面弹出支付界面后，点击【前往支付】。\u003cfigure\u003e\u003cimg src=\"./assets/images/gmYqZorK6Y-53d5a4039b.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e确认订单无误后，点击【确认支付】。\u003c/li\u003e\u003cli\u003e支付成功后，即完成 IP 续费。正常情况下续费周期为一个月。\u003cfigure\u003e\u003cimg src=\"./assets/images/bbsNeTWB3k-7d5e7d091a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、在 WhatsApp 账号列表开启自动续费\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e打开【WhatsApp】账号列表。\u003c/li\u003e\u003cli\u003e横向滑动底部滚动条，找到【自动续费 IP】列。\u003c/li\u003e\u003cli\u003e点击【开启】按钮。\u003cfigure\u003e\u003cimg src=\"./assets/images/Jmj1Jpzroj-7c27950e73.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e页面弹出确认窗口后，点击【确认】。\u003c/li\u003e\u003cli\u003e确认后，该账号的 IP 自动续费即开启成功。\u003cfigure\u003e\u003cimg src=\"./assets/images/qbevVaOvxa-c8d818ab83.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e四、在 IP 列表开启自动续费\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e打开【IP 列表】。\u003c/li\u003e\u003cli\u003e横向滑动底部滚动条，找到【自动续费 IP】列。\u003c/li\u003e\u003cli\u003e点击【开启】按钮。\u003cfigure\u003e\u003cimg src=\"./assets/images/HBYtsBEJfw-1e55e21413.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e页面弹出确认窗口后，点击【确认】。\u003c/li\u003e\u003cli\u003e确认后，该 IP 自动续费即开启成功。\u003cfigure\u003e\u003cimg src=\"./assets/images/INqavEyJEE-ca0173e11a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003cblockquote\u003e注意：开启自动续费后，请保持账号余额充足。余额不足可能导致续费失败，进而影响账号正常使用。\u003c/blockquote\u003e"},{"id":"2388935951e7ec39c9beafb2","title":"如何更换 IP","updatedAt":"2026-05-20T20:59:50+08:00","searchText":"  本文说明账号解封后如何释放旧 IP，并在重新登录时选择新的 IP。    \u003e 注意：账号在线状态下不允许更换 IP。需要先释放 IP，再重新登录并选择新 IP。     一、释放已解封账号的 IP  1. 在账号列表中筛选【已解封】状态的账号。 2. 找到需要更换 IP 的账号。 3. 点击【释放 IP】按钮。 4. 系统弹出确认窗口后，点击【确认】。 5. 页面提示成功后，表示旧 IP 已释放。              二、重新登录并选择新 IP  1. 回到账号列表，点击该账号的【登录】按钮。 2. 页面弹出登录窗口后，重新选择需要使用的新 IP。 3. 确认登录信息无误后，继续完成登录。      ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明账号解封后如何释放旧 IP，并在重新登录时选择新的 IP。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：账号在线状态下不允许更换 IP。需要先释放 IP，再重新登录并选择新 IP。\u003c/blockquote\u003e\n\u003ch2\u003e一、释放已解封账号的 IP\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在账号列表中筛选【已解封】状态的账号。\u003c/li\u003e\u003cli\u003e找到需要更换 IP 的账号。\u003c/li\u003e\u003cli\u003e点击【释放 IP】按钮。\u003c/li\u003e\u003cli\u003e系统弹出确认窗口后，点击【确认】。\u003c/li\u003e\u003cli\u003e页面提示成功后，表示旧 IP 已释放。\u003cfigure\u003e\u003cimg src=\"./assets/images/-Y_6CeAotV-e605ac09b6.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/NUuWyc74AI-55691541ea.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、重新登录并选择新 IP\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e回到账号列表，点击该账号的【登录】按钮。\u003c/li\u003e\u003cli\u003e页面弹出登录窗口后，重新选择需要使用的新 IP。\u003c/li\u003e\u003cli\u003e确认登录信息无误后，继续完成登录。\u003cfigure\u003e\u003cimg src=\"./assets/images/Xme1t3SQSz-aa4e723e4e.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e"},{"id":"d4b3c2a02ced51eec27b6ad2","title":"如何解封","updatedAt":"2026-05-20T21:25:50+08:00","searchText":"  本文说明如何判断 WhatsApp 账号是否被封、如何提交解封申请，以及账号解封后如何重新登录。    \u003e 注意：账号进入【解封中】后不会自动变为【已解封】，需要手动点击【查看解封状态】查询结果。建议至少每半天查询一次，避免超过有效期。     一、判断账号是否被封  1. 查看坐席账号头像是否出现红点。 2. 将鼠标移动到红点上，查看是否提示【封禁】。 3. 如果账号无法正常私聊或群聊，同时出现封禁提示，说明该账号已被封禁。          二、提交解封申请  1. 进入账号列表页面。 2. 将状态筛选为【封禁】，点击【搜索】。 3. 找到需要申请解封的账号。 4. 点击【申请解封】，打开申请解封弹窗。 5. 解封理由可以不填写，直接点击【确认】提交申请。          三、查看解封状态  1. 提交申请后，账号会进入【解封中】状态。 2. 【解封中】不会自动变为【已解封】，需要手动点击【查看解封状态】查询结果。 3. 建议至少每半天查询一次状态，确认账号是否已经完成解封。 4. 解封申请和解封状态查询都有有效期，请及时查询，避免超过有效期后无法继续查看或处理。          四、已解封后重新登录  \u003e 注意：已解封账号需要手机插卡复接登录。  1. 在账号列表中筛选并找到【已解封】账号。 2. 点击【登录】，打开登录弹窗。 3. 检查登录信息是否正确。 4. 如果此前释放过 IP，需要重新选择 IP。 5. 确认无误后，点击【确认】完成重新登录。      ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明如何判断 WhatsApp 账号是否被封、如何提交解封申请，以及账号解封后如何重新登录。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：账号进入【解封中】后不会自动变为【已解封】，需要手动点击【查看解封状态】查询结果。建议至少每半天查询一次，避免超过有效期。\u003c/blockquote\u003e\n\u003ch2\u003e一、判断账号是否被封\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e查看坐席账号头像是否出现红点。\u003c/li\u003e\u003cli\u003e将鼠标移动到红点上，查看是否提示【封禁】。\u003c/li\u003e\u003cli\u003e如果账号无法正常私聊或群聊，同时出现封禁提示，说明该账号已被封禁。\u003cfigure\u003e\u003cimg src=\"./assets/images/XnZfQLX0rG-be1025b1e1.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、提交解封申请\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e进入账号列表页面。\u003c/li\u003e\u003cli\u003e将状态筛选为【封禁】，点击【搜索】。\u003c/li\u003e\u003cli\u003e找到需要申请解封的账号。\u003c/li\u003e\u003cli\u003e点击【申请解封】，打开申请解封弹窗。\u003c/li\u003e\u003cli\u003e解封理由可以不填写，直接点击【确认】提交申请。\u003cfigure\u003e\u003cimg src=\"./assets/images/h0uXb-AiAq-5599b899c9.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、查看解封状态\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e提交申请后，账号会进入【解封中】状态。\u003c/li\u003e\u003cli\u003e【解封中】不会自动变为【已解封】，需要手动点击【查看解封状态】查询结果。\u003c/li\u003e\u003cli\u003e建议至少每半天查询一次状态，确认账号是否已经完成解封。\u003c/li\u003e\u003cli\u003e解封申请和解封状态查询都有有效期，请及时查询，避免超过有效期后无法继续查看或处理。\u003cfigure\u003e\u003cimg src=\"./assets/images/E1XwzD8RG--200d95a916.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e四、已解封后重新登录\u003c/h2\u003e\n\u003cblockquote\u003e注意：已解封账号需要手机插卡复接登录。\u003c/blockquote\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在账号列表中筛选并找到【已解封】账号。\u003c/li\u003e\u003cli\u003e点击【登录】，打开登录弹窗。\u003c/li\u003e\u003cli\u003e检查登录信息是否正确。\u003c/li\u003e\u003cli\u003e如果此前释放过 IP，需要重新选择 IP。\u003c/li\u003e\u003cli\u003e确认无误后，点击【确认】完成重新登录。\u003cfigure\u003e\u003cimg src=\"./assets/images/Bt0cKbErjH-c31d9af7ed.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e"},{"id":"14954024065c4b5ad2b53205","title":"账号所有状态的含义","updatedAt":"2026-05-20T21:35:04+08:00","searchText":"  本文说明账号列表中常见状态的含义，以及遇到封禁、解封中、已解封等状态时应该如何处理。       一、登出  账号显示【登出】通常表示账号被官方踢出，或被人为转走。此时需要手机插卡复接后再重新登录。  1. 在账号列表中找到【登出】状态的账号。 2. 准备对应手机和 SIM 卡。 3. 按复接登录流程重新登录账号。 4. 卡没信号了或者找不到到卡了等各种原因已经无法接码了，只能在【F-对接群】中反馈把号码设置成【永久封禁】状态，然后用其他号码继承粉丝，除此之外别无办法          二、离线  账号显示【离线】通常有两类原因：  - 账号被官方临时限制。 - 代理长时间失效导致账号下线。  一般情况下，如果是账号使用不当导致的官方限制，限制解除后任意操作会自动恢复上线。     三、封禁  账号显示【封禁】表示账号已被封，通常无法正常进行私聊或群聊。  判断方式：  1. 查看坐席账号头像是否出现红点。 2. 将鼠标移动到红点上，查看是否提示【封禁】。 3. 如果账号无法正常私聊或群聊，同时出现封禁提示，说明该账号已被封禁。       处理方式：  1. 进入账号列表页面。 2. 将状态筛选为【封禁】，点击【搜索】。 3. 找到需要申请解封的账号。 4. 点击【申请解封】，打开申请解封弹窗。 5. 解封理由可以不填写，直接点击【确认】提交申请。          四、解封中  账号显示【解封中】表示解封申请已提交，正在等待官方处理。该状态不会自动变为【已解封】，需要手动查询解封结果。  1. 提交申请后，账号会进入【解封中】状态。 2. 点击【查看解封状态】，手动查询当前是否已经完成解封。 3. 建议至少每半天查询一次状态，确认是否已经变为【已解封】。 4. 解封申请和解封状态查询都有有效期，请及时查询，避免超过有效期后无法继续查看或处理。          五、已解封  账号显示【已解封】表示账号已经完成解封，可以尝试重新登录。  \u003e 注意：已解封账号需要手机插卡复接登录。  1. 在账号列表中筛选并找到【已解封】账号。 2. 点击【登录】，打开登录弹窗。 3. 检查登录信息是否正确。 4. 如果此前释放过 IP，需要重新选择 IP。 5. 确认无误后，点击【确认】完成重新登录。          六、永久封禁  账号显示【永久封禁】表示账号被官方永久封禁。该状态下账号无法按普通解封流程恢复。  如果需要保留原账号会话记录，可以通过关联账号方式，将永久封禁账号的会话记录关联到新账号下。  \u003e 提示：永久封禁与普通封禁不同，请先确认状态，再选择对应处理方式。     相关文档  如果需要将【永久封禁】账号的会话记录继承到新账号下继续跟进，请参考： 如何永封继承  ./如何永封继承.md  ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明账号列表中常见状态的含义，以及遇到封禁、解封中、已解封等状态时应该如何处理。\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e一、登出\u003c/h2\u003e\n\u003cp\u003e账号显示【登出】通常表示账号被官方踢出，或被人为转走。此时需要手机插卡复接后再重新登录。\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在账号列表中找到【登出】状态的账号。\u003c/li\u003e\u003cli\u003e准备对应手机和 SIM 卡。\u003c/li\u003e\u003cli\u003e按复接登录流程重新登录账号。\u003c/li\u003e\u003cli\u003e卡没信号了或者找不到到卡了等各种原因已经无法接码了，只能在【F-对接群】中反馈把号码设置成【永久封禁】状态，然后用其他号码继承粉丝，除此之外别无办法\u003cfigure\u003e\u003cimg src=\"./assets/images/Tmpdvn92cN-99f010990c.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、离线\u003c/h2\u003e\n\u003cp\u003e账号显示【离线】通常有两类原因：\u003c/p\u003e\n\u003cul class=\"doc-list\"\u003e\u003cli\u003e账号被官方临时限制。\u003c/li\u003e\u003cli\u003e代理长时间失效导致账号下线。\u003c/li\u003e\u003c/ul\u003e\n\u003cp\u003e一般情况下，如果是账号使用不当导致的官方限制，限制解除后任意操作会自动恢复上线。\u003c/p\u003e\n\u003ch2\u003e三、封禁\u003c/h2\u003e\n\u003cp\u003e账号显示【封禁】表示账号已被封，通常无法正常进行私聊或群聊。\u003c/p\u003e\n\u003cp\u003e判断方式：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e查看坐席账号头像是否出现红点。\u003c/li\u003e\u003cli\u003e将鼠标移动到红点上，查看是否提示【封禁】。\u003c/li\u003e\u003cli\u003e如果账号无法正常私聊或群聊，同时出现封禁提示，说明该账号已被封禁。\u003cfigure\u003e\u003cimg src=\"./assets/images/XnZfQLX0rG-be1025b1e1.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e处理方式：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e进入账号列表页面。\u003c/li\u003e\u003cli\u003e将状态筛选为【封禁】，点击【搜索】。\u003c/li\u003e\u003cli\u003e找到需要申请解封的账号。\u003c/li\u003e\u003cli\u003e点击【申请解封】，打开申请解封弹窗。\u003c/li\u003e\u003cli\u003e解封理由可以不填写，直接点击【确认】提交申请。\u003cfigure\u003e\u003cimg src=\"./assets/images/h0uXb-AiAq-5599b899c9.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e四、解封中\u003c/h2\u003e\n\u003cp\u003e账号显示【解封中】表示解封申请已提交，正在等待官方处理。该状态不会自动变为【已解封】，需要手动查询解封结果。\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e提交申请后，账号会进入【解封中】状态。\u003c/li\u003e\u003cli\u003e点击【查看解封状态】，手动查询当前是否已经完成解封。\u003c/li\u003e\u003cli\u003e建议至少每半天查询一次状态，确认是否已经变为【已解封】。\u003c/li\u003e\u003cli\u003e解封申请和解封状态查询都有有效期，请及时查询，避免超过有效期后无法继续查看或处理。\u003cfigure\u003e\u003cimg src=\"./assets/images/E1XwzD8RG--200d95a916.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e五、已解封\u003c/h2\u003e\n\u003cp\u003e账号显示【已解封】表示账号已经完成解封，可以尝试重新登录。\u003c/p\u003e\n\u003cblockquote\u003e注意：已解封账号需要手机插卡复接登录。\u003c/blockquote\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在账号列表中筛选并找到【已解封】账号。\u003c/li\u003e\u003cli\u003e点击【登录】，打开登录弹窗。\u003c/li\u003e\u003cli\u003e检查登录信息是否正确。\u003c/li\u003e\u003cli\u003e如果此前释放过 IP，需要重新选择 IP。\u003c/li\u003e\u003cli\u003e确认无误后，点击【确认】完成重新登录。\u003cfigure\u003e\u003cimg src=\"./assets/images/Bt0cKbErjH-c31d9af7ed.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e六、永久封禁\u003c/h2\u003e\n\u003cp\u003e账号显示【永久封禁】表示账号被官方永久封禁。该状态下账号无法按普通解封流程恢复。\u003c/p\u003e\n\u003cp\u003e如果需要保留原账号会话记录，可以通过关联账号方式，将永久封禁账号的会话记录关联到新账号下。\u003c/p\u003e\n\u003cblockquote\u003e提示：永久封禁与普通封禁不同，请先确认状态，再选择对应处理方式。\u003c/blockquote\u003e\n\u003ch2\u003e相关文档\u003c/h2\u003e\n\u003cp\u003e如果需要将【永久封禁】账号的会话记录继承到新账号下继续跟进，请参考：\u003ca href=\"#1bb06441c03c0b4cf92ddb34\"\u003e如何永封继承\u003c/a\u003e\u003c/p\u003e"},{"id":"1bb06441c03c0b4cf92ddb34","title":"如何永封继承","updatedAt":"2026-05-20T21:32:02+08:00","searchText":"  本文说明如何将【永久封禁】账号的会话记录继承到新的在线账号下，方便继续跟进原账号中的客户会话。    \u003e 注意：一个【永久封禁】账号只能被一个账号继承。如果继承错了，需要先找到永封的号，解除继承关系，再重新选择另外的账号去继承永封的号。 \u003e 注意：一个账号允许继承多个【永封号】，也允许子孙继承；比如A继承了永封B号后，A也永封了，C继承A就会继承A和B粉丝的并集 \u003e 注意：【封禁】、【解封中】、【已解封】、【登出】状态的号，可以在联系【F-对接群】里面反馈设置状态为【永久封禁】，该操作不可取消，慎重考虑     一、适用场景  当原账号已经处于【永久封禁】状态，但账号内仍有需要继续跟进的会话记录时，可以使用永封继承功能，将这些会话记录关联到新的账号下继续处理。     二、操作前确认  1. 原账号必须是【永久封禁】状态，并且账号下有会话记录。 2. 新账号需要先绑定坐席，否则不会出现继承永封相关功能。 3. 新账号必须处于【在线】状态，才可以作为继承目标账号。 4. 如果页面没有操作权限，请联系【F-对接群】里面反馈。     三、发起永封继承  1. 在账号列表中筛选【永久封禁】状态。 2. 找到需要继承会话记录的永久封禁账号，并复制该账号。       3. 将账号状态筛选为【在线】。 4. 找到用于承接会话记录的新账号，点击【新增关联】。 5. 在弹窗中选择需要继承的永久封禁账号，也可以直接粘贴账号进行搜索。 6. 确认账号无误后，点击【确认】完成继承。     \u003e 提示：账号后面的蓝色数字表示相同粉丝数，可用于辅助判断继承对象是否正确。          四、查看继承效果  继承完成后，进入坐席查看会话列表。新账号下会显示继承后的会话数据，可继续跟进原永久封禁账号中的客户。  关联后效果如下：    关联前效果如下：       五、解除永封继承  如果继承账号选择错误，或需要重新调整继承关系，可以先解除当前继承。  1. 找到需要解除继承的账号。 2. 点击【关联账号数】下方的数字，进入关联列表。       3. 在关联列表中找到需要解除的账号。 4. 点击【删除】，即可解除当前继承关系。      ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明如何将【永久封禁】账号的会话记录继承到新的在线账号下，方便继续跟进原账号中的客户会话。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：一个【永久封禁】账号只能被一个账号继承。如果继承错了，需要先找到永封的号，解除继承关系，再重新选择另外的账号去继承永封的号。\u003c/blockquote\u003e\n\u003cblockquote\u003e注意：一个账号允许继承多个【永封号】，也允许子孙继承；比如A继承了永封B号后，A也永封了，C继承A就会继承A和B粉丝的并集\u003c/blockquote\u003e\n\u003cblockquote\u003e注意：【封禁】、【解封中】、【已解封】、【登出】状态的号，可以在联系【F-对接群】里面反馈设置状态为【永久封禁】，该操作不可取消，慎重考虑\u003c/blockquote\u003e\n\u003ch2\u003e一、适用场景\u003c/h2\u003e\n\u003cp\u003e当原账号已经处于【永久封禁】状态，但账号内仍有需要继续跟进的会话记录时，可以使用永封继承功能，将这些会话记录关联到新的账号下继续处理。\u003c/p\u003e\n\u003ch2\u003e二、操作前确认\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e原账号必须是【永久封禁】状态，并且账号下有会话记录。\u003c/li\u003e\u003cli\u003e新账号需要先绑定坐席，否则不会出现继承永封相关功能。\u003c/li\u003e\u003cli\u003e新账号必须处于【在线】状态，才可以作为继承目标账号。\u003c/li\u003e\u003cli\u003e如果页面没有操作权限，请联系【F-对接群】里面反馈。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、发起永封继承\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e在账号列表中筛选【永久封禁】状态。\u003c/li\u003e\u003cli\u003e找到需要继承会话记录的永久封禁账号，并复制该账号。\u003cfigure\u003e\u003cimg src=\"./assets/images/bk3FCbvQzK-e8d80987c4.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e将账号状态筛选为【在线】。\u003c/li\u003e\u003cli\u003e找到用于承接会话记录的新账号，点击【新增关联】。\u003c/li\u003e\u003cli\u003e在弹窗中选择需要继承的永久封禁账号，也可以直接粘贴账号进行搜索。\u003c/li\u003e\u003cli\u003e确认账号无误后，点击【确认】完成继承。\u003cblockquote\u003e提示：账号后面的蓝色数字表示相同粉丝数，可用于辅助判断继承对象是否正确。\u003c/blockquote\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/mpjTzb3Rle-53b82f0b5f.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e四、查看继承效果\u003c/h2\u003e\n\u003cp\u003e继承完成后，进入坐席查看会话列表。新账号下会显示继承后的会话数据，可继续跟进原永久封禁账号中的客户。\u003c/p\u003e\n\u003cp\u003e关联后效果如下：\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/q6XC1bLRoU-2e2b226d4d.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e关联前效果如下：\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/tIo89HPd6l-7cc9a151ea.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e五、解除永封继承\u003c/h2\u003e\n\u003cp\u003e如果继承账号选择错误，或需要重新调整继承关系，可以先解除当前继承。\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e找到需要解除继承的账号。\u003c/li\u003e\u003cli\u003e点击【关联账号数】下方的数字，进入关联列表。\u003cfigure\u003e\u003cimg src=\"./assets/images/4aZ_GyevcT-95035b1565.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e在关联列表中找到需要解除的账号。\u003c/li\u003e\u003cli\u003e点击【删除】，即可解除当前继承关系。\u003cfigure\u003e\u003cimg src=\"./assets/images/53jFq1LrGp-6a5549252e.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e"},{"id":"a1facaa356e3b84c5985b672","title":"如何查看端口是否过期","updatedAt":"2026-05-27T00:00:00+08:00","searchText":"   查看端口是否过期  1. 打开 WhatsApp 账号列表，筛选“在线”的账号。 2. 滑动到“端口过期”这一列，可以通过排序查看到期时间。       开启自动续费  开启自动续费后，系统会在到期前一天续费一个月，同时扣除对应余额。  1. 找到需要续费的账号，滑动到“自动续费端口”这一列。 2. 操作开关，可以开启或关闭自动续费。系统会出现二次确认弹窗，点击确认按钮。       查询扣费记录  自动续费端口的扣费记录查询路径：  个人设置 -\u003e 费用中心 -\u003e 订单类型选择“续费端口” -\u003e 平台选择“WhatsApp” -\u003e 搜索结果中备注为自动续费的订单即为扣费记录。   ","html":"\u003ch2\u003e查看端口是否过期\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e打开 WhatsApp 账号列表，筛选“在线”的账号。\u003c/li\u003e\u003cli\u003e滑动到“端口过期”这一列，可以通过排序查看到期时间。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/manual-port-expiry-mwwzmigyta-887e645df2.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e开启自动续费\u003c/h2\u003e\n\u003cp\u003e开启自动续费后，系统会在到期前一天续费一个月，同时扣除对应余额。\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e找到需要续费的账号，滑动到“自动续费端口”这一列。\u003c/li\u003e\u003cli\u003e操作开关，可以开启或关闭自动续费。系统会出现二次确认弹窗，点击确认按钮。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/manual-port-expiry-lilskwuvg9-6c2eb0aa2b.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e查询扣费记录\u003c/h2\u003e\n\u003cp\u003e自动续费端口的扣费记录查询路径：\u003c/p\u003e\n\u003cp\u003e个人设置 -\u0026gt; 费用中心 -\u0026gt; 订单类型选择“续费端口” -\u0026gt; 平台选择“WhatsApp” -\u0026gt; 搜索结果中备注为自动续费的订单即为扣费记录。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/manual-port-expiry-xdbemvbdxg-621102b7b1.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"},{"id":"5ea75dc9a9082425d6b79471","title":"如何绩效上传归类使用手册","updatedAt":"2026-05-27T00:00:00+08:00","searchText":"   操作步骤  1. 对方发的图片显示上传按钮后，可以点击按钮上传绩效。     注意：发了图片后，需要回复信息，或者对方再发送除图片、视频之外的信息，才会显示上传按钮。对方发送图文加文字时，会直接显示上传按钮。       2. 填写上传信息，按上传表单填写正确信息，点击提交。       3. 信息提交后会进入审核状态，后台审核后，可以查询状态。            4. 如果出现审核不通过，需要重新修改提交。       5. 等待出现审核通过，即表示数据上传正确并已审核通过。      ","html":"\u003ch2\u003e操作步骤\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e对方发的图片显示上传按钮后，可以点击按钮上传绩效。\u003cp\u003e注意：发了图片后，需要回复信息，或者对方再发送除图片、视频之外的信息，才会显示上传按钮。对方发送图文加文字时，会直接显示上传按钮。\u003c/p\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/manual-performance-upload-p1d_bqfn-n-523829ade3.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e填写上传信息，按上传表单填写正确信息，点击提交。\u003cfigure\u003e\u003cimg src=\"./assets/images/manual-performance-upload-yu6zrwywkk-5ad2a6ade6.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e信息提交后会进入审核状态，后台审核后，可以查询状态。\u003cfigure\u003e\u003cimg src=\"./assets/images/manual-performance-upload-mrltrsnskz-2a4fd06690.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003cfigure\u003e\u003cimg src=\"./assets/images/manual-performance-upload-irxxw6sicb-700afd6a7b.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e如果出现审核不通过，需要重新修改提交。\u003cfigure\u003e\u003cimg src=\"./assets/images/manual-performance-upload-x0s7p6bwib-aef75184cd.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003cli\u003e等待出现审核通过，即表示数据上传正确并已审核通过。\u003cfigure\u003e\u003cimg src=\"./assets/images/manual-performance-upload-20ksrgyoqb-3169368425.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\u003c/li\u003e\u003c/ol\u003e"}]},{"category":{"id":"0adb1147b3a9b5455385bc91","name":"常见问题","articlesCount":21},"articles":[{"id":"a2980b63aff5e5944f3a8147","title":"提问模板和星辰助手上线","updatedAt":"2026-05-26T00:00:00+08:00","searchText":"星辰助手已上线，提问统一使用 /q。     一、聊天相关问题  提问格式：  \u003e /q 号码 图片 问题描述 \u003e 如 /q 34603989581 图片 接收消息不能解密    标准的聊天问题提交必须同时包含号码、截图和问题描述，三项缺一不可。截图至少要能看出在哪里对话，以及具体问题内容。        截图缺失或不规范  如果截图看不出问题发生在哪个联系人或哪个群，星辰助手会拒绝记录，并提醒补充截图后重新发送。        缺少号码  如果没有提交号码，星辰助手会拒绝记录，并提醒补充号码后重新发送。        号码和截图都不符合要求  如果号码和截图都不符合要求，星辰助手会提醒按完整格式重新提交。    \u003e 注意：聊天相关问题大部分需要人工查证，请一次性提交完整信息。 \u003e 聊天问题通常需要多方查证定位。不在人工客服上班时间内提交的问题，会在上班后集中处理；后续会有更多聊天问题加入自助处理。     二、涉及号码但不是聊天的问题  提问格式：  \u003e /q 号码 问题描述  例如号码状态、登录、封号、在线状态等问题，可以按这个格式提交。     三、不涉及具体号码的问题  提问格式：  \u003e /q 问题描述  例如：  \u003e /q 怎么打开静音通知    \u003e /q 购买端口       四、人工客服时间  \u003e 人工客服时间：北京时间每周日到周五，早上 9 点到晚上 9 点。  需要人工查证的问题，会在记录后等待人工客服上班处理。  \u003e 注意：聊天问题一定要留下符合格式的信息。没有号码、截图不完整，或者看不出问题发生在哪个联系人或哪个群，问题会被忽略记录，需要重新按完整格式提交。     五、助手额外功能      1. 尝试自动修复消息提醒异常  如果出现接收消息没有红点、点击聊天后才看到具体内容，或者账号在线但发消息提示账号离线，可以让助手尝试自动修复。  提问方式：  \u003e /q 号码 不能接收消息 \u003e /q 没有消息提醒 号码 \u003e /q 号码 账号在线，发消息提示账号离线    \u003e 注意：这类问题必须提交号码。缺少号码时，助手会回复要求补充号码。      2. 请求助手分析封号可能原因  如果需要分析封号可能原因，可以按以下方式提问：  \u003e /q 号码 怎么封号了 \u003e /q 号码 分析封号原因 \u003e /q 号码 为什么封禁  助手会根据号码情况分析原因，并发送分析报告。    \u003e 注意：这类问题必须提交号码。缺少号码时，助手会回复要求补充号码。    \u003e 注意：目前所有号码都缺少养号环节。封号原因里如果没有更明确的问题，分析结论通常只会是不养号被封。 \u003e 注意：不要滥用封号原因分析功能。星辰会视情况禁用该功能；是否属于滥用，会参考上面的养号结论，不应该连续、多个提交封号查询请求。 ","html":"\u003cp\u003e星辰助手已上线，提问统一使用 /q。\u003c/p\u003e\n\u003ch2\u003e一、聊天相关问题\u003c/h2\u003e\n\u003cp\u003e提问格式：\u003c/p\u003e\n\u003cblockquote\u003e/q 号码 图片 问题描述\u003c/blockquote\u003e\n\u003cblockquote\u003e如 /q 34603989581 图片 接收消息不能解密\u003c/blockquote\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/faq-assistant-chat-decrypt-example-7-96da5fef10.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e标准的聊天问题提交必须同时包含号码、截图和问题描述，三项缺一不可。截图至少要能看出在哪里对话，以及具体问题内容。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/faq-assistant-chat-decrypt-example-5-42d669a2e9.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch3\u003e截图缺失或不规范\u003c/h3\u003e\n\u003cp\u003e如果截图看不出问题发生在哪个联系人或哪个群，星辰助手会拒绝记录，并提醒补充截图后重新发送。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/faq-assistant-chat-batch-1-633a73ae50.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch3\u003e缺少号码\u003c/h3\u003e\n\u003cp\u003e如果没有提交号码，星辰助手会拒绝记录，并提醒补充号码后重新发送。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/faq-assistant-chat-batch-3-bc4e3cd8c7.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch3\u003e号码和截图都不符合要求\u003c/h3\u003e\n\u003cp\u003e如果号码和截图都不符合要求，星辰助手会提醒按完整格式重新提交。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/faq-assistant-chat-batch-2-0c212bb63e.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cblockquote\u003e注意：聊天相关问题大部分需要人工查证，请一次性提交完整信息。\u003c/blockquote\u003e\n\u003cblockquote\u003e聊天问题通常需要多方查证定位。不在人工客服上班时间内提交的问题，会在上班后集中处理；后续会有更多聊天问题加入自助处理。\u003c/blockquote\u003e\n\u003ch2\u003e二、涉及号码但不是聊天的问题\u003c/h2\u003e\n\u003cp\u003e提问格式：\u003c/p\u003e\n\u003cblockquote\u003e/q 号码 问题描述\u003c/blockquote\u003e\n\u003cp\u003e例如号码状态、登录、封号、在线状态等问题，可以按这个格式提交。\u003c/p\u003e\n\u003ch2\u003e三、不涉及具体号码的问题\u003c/h2\u003e\n\u003cp\u003e提问格式：\u003c/p\u003e\n\u003cblockquote\u003e/q 问题描述\u003c/blockquote\u003e\n\u003cp\u003e例如：\u003c/p\u003e\n\u003cblockquote\u003e/q 怎么打开静音通知\u003c/blockquote\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/faq-assistant-general-example-3-b952a3d8a0.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cblockquote\u003e/q 购买端口\u003c/blockquote\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/faq-assistant-general-example-4-b9cf050a3a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、人工客服时间\u003c/h2\u003e\n\u003cblockquote\u003e人工客服时间：北京时间每周日到周五，早上 9 点到晚上 9 点。\u003c/blockquote\u003e\n\u003cp\u003e需要人工查证的问题，会在记录后等待人工客服上班处理。\u003c/p\u003e\n\u003cblockquote\u003e注意：聊天问题一定要留下符合格式的信息。没有号码、截图不完整，或者看不出问题发生在哪个联系人或哪个群，问题会被忽略记录，需要重新按完整格式提交。\u003c/blockquote\u003e\n\u003ch2\u003e五、助手额外功能\u003c/h2\u003e\n\u003ch3\u003e1. 尝试自动修复消息提醒异常\u003c/h3\u003e\n\u003cp\u003e如果出现接收消息没有红点、点击聊天后才看到具体内容，或者账号在线但发消息提示账号离线，可以让助手尝试自动修复。\u003c/p\u003e\n\u003cp\u003e提问方式：\u003c/p\u003e\n\u003cblockquote\u003e/q 号码 不能接收消息\u003c/blockquote\u003e\n\u003cblockquote\u003e/q 没有消息提醒 号码\u003c/blockquote\u003e\n\u003cblockquote\u003e/q 号码 账号在线，发消息提示账号离线\u003c/blockquote\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/faq-assistant-chat-batch-4-a87e69ac9a.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cblockquote\u003e注意：这类问题必须提交号码。缺少号码时，助手会回复要求补充号码。\u003c/blockquote\u003e\n\u003ch3\u003e2. 请求助手分析封号可能原因\u003c/h3\u003e\n\u003cp\u003e如果需要分析封号可能原因，可以按以下方式提问：\u003c/p\u003e\n\u003cblockquote\u003e/q 号码 怎么封号了\u003c/blockquote\u003e\n\u003cblockquote\u003e/q 号码 分析封号原因\u003c/blockquote\u003e\n\u003cblockquote\u003e/q 号码 为什么封禁\u003c/blockquote\u003e\n\u003cp\u003e助手会根据号码情况分析原因，并发送分析报告。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/faq-assistant-ban-report-1-2972d72e5b.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cblockquote\u003e注意：这类问题必须提交号码。缺少号码时，助手会回复要求补充号码。\u003c/blockquote\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/faq-assistant-message-fix-2-213d8ce3d7.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cblockquote\u003e注意：目前所有号码都缺少养号环节。封号原因里如果没有更明确的问题，分析结论通常只会是不养号被封。\u003c/blockquote\u003e\n\u003cblockquote\u003e注意：不要滥用封号原因分析功能。星辰会视情况禁用该功能；是否属于滥用，会参考上面的养号结论，不应该连续、多个提交封号查询请求。\u003c/blockquote\u003e"},{"id":"017fd6fd9859424b3e429587","title":"什么是盾牌超能力","updatedAt":"2026-06-24T10:50:16+08:00","searchText":"  本文说明盾牌超能力的含义、获取方式、查看入口，以及使用时需要注意的风险。    \u003e 注意：盾牌表示该粉丝与星辰协议账号之间已经建立过可信互动，可用于判断是否适合主动发起聊天；但不建议为了使用功能去频繁点击【加好友】。 \u003e 2026 年 6 月官方更新了盾牌机制，新版盾牌加入了“橙色”盾牌，代表官方新添加的不可信隐私，用于区分“绿色”盾牌的官方百分百信任。     一、什么是盾牌超能力  盾牌分两种：  1. 绿色盾牌 2. 橙色盾牌  ~~盾牌超能力是星辰用于识别可信粉丝的标识。账号拥有盾牌后，可以更清楚地判断哪些粉丝适合主动聊天、建群或邀请进群。~~  【绿色】盾牌超能力是星辰用于识别可信粉丝的标识。账号拥有【绿色】盾牌后，可以更清楚地判断哪些粉丝适合主动聊天、建群或邀请进群。  【绿色】盾牌的核心作用：  ~~盾牌的核心作用~~  1. 帮助坐席判断对方是否为可信互动对象。 2. 降低主动发消息时触发风控的概率。 3. 支持星辰协议账号之间共享可信标识。 4. 不需要先加好友，也可以基于已有对话进行后续操作。  【橙色】盾牌超能力是官方新风控导致的产物。  【橙色】盾牌的核心作用：  1. 有限度地可以尝试主动联系对方，【大概率】只会先触发【限制】而不是【封号】。 2. 如果确定对方会因为你主动联系而回复，橙色盾牌等效于绿色盾牌，且会在对方【回复消息】后变绿。     二、盾牌如何产生  ~~只要粉丝主动发消息，或者回复过你的消息，就会获取盾牌标识。~~  只要粉丝主动给你发消息，或者回复过你的消息，你就会获取粉丝的【绿色】盾牌标识。  ~~所有星辰协议的盾牌标识是共享的。例如账号 A 获取了粉丝 1 的盾牌，账号 B 或新注册账号 C 也可以直接向粉丝 1 发起聊天，并降低触发风控的风险。~~  官方新版风控规则，所有的【橙色】盾牌标识是共享的。【绿色】盾牌的标识是不共享的。例如账号 A 获取了粉丝 1 的【绿色】盾牌，账号 B 或新注册账号 C【只会】获得粉丝 1 的【橙色】盾牌，A 和粉丝 1 聊天是低风控风险的。但是 B、C 和粉丝 1 主动聊天，大概率还是有可能触发限制，少概率会封号；需要粉丝 1 回复了，盾牌才会变成【绿色】，风控风险才会降低。       三、如何查看是否有盾牌      方法一：通过联系人搜索查看  在联系人搜索中查看目标账号，如果该账号有盾牌标识，说明已经属于可信互动对象。        方法二：通过群组或社群成员查看  进入群组或社群成员列表，找到对应成员后点击【发信息】。进入聊天会话后，可以查看对方是否有盾牌标识。       四、不要为了盾牌去加好友  \u003e 2026/06/04 新增：无论【绿色】盾牌还是【橙色】盾牌，加好友这个风控是官方单独计算的，有不算低的封号概率。  接粉收发消息本身没有风控问题，但【加好友】操作存在封号风险。根据目前统计，不管是主动添加还是被动添加好友，都可能被官方统计并触发风控。  \u003e 建议：不要点击【加好友】按钮。不加好友不影响聊天、建群、邀请进群等功能。       五、有盾牌后可以做什么  \u003e 2026/06/04 新增：下面内容限制范围是【绿色盾牌】。  不需要将对方加为好友。只要双方已经产生对话，并且对方带有盾牌，就可以继续进行以下操作：  1. 主动发起聊天。 2. 拉对方组建群组。 3. 邀请对方进入群组。     ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明盾牌超能力的含义、获取方式、查看入口，以及使用时需要注意的风险。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：盾牌表示该粉丝与星辰协议账号之间已经建立过可信互动，可用于判断是否适合主动发起聊天；但不建议为了使用功能去频繁点击【加好友】。\u003c/blockquote\u003e\n\u003cblockquote\u003e2026 年 6 月官方更新了盾牌机制，新版盾牌加入了“橙色”盾牌，代表官方新添加的不可信隐私，用于区分“绿色”盾牌的官方百分百信任。\u003c/blockquote\u003e\n\u003ch2\u003e一、什么是盾牌超能力\u003c/h2\u003e\n\u003cp\u003e盾牌分两种：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e绿色盾牌\u003c/li\u003e\u003cli\u003e橙色盾牌\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e\u003cdel\u003e盾牌超能力是星辰用于识别可信粉丝的标识。账号拥有盾牌后，可以更清楚地判断哪些粉丝适合主动聊天、建群或邀请进群。\u003c/del\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"shield-label shield-label-green\"\u003e【绿色】\u003csvg aria-hidden=\"true\" class=\"svg-icon trust-icon green\"\u003e\u003cuse href=\"#icon-chat-trust\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/span\u003e盾牌超能力是星辰用于识别可信粉丝的标识。账号拥有\u003cspan class=\"shield-label shield-label-green\"\u003e【绿色】\u003csvg aria-hidden=\"true\" class=\"svg-icon trust-icon green\"\u003e\u003cuse href=\"#icon-chat-trust\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/span\u003e盾牌后，可以更清楚地判断哪些粉丝适合主动聊天、建群或邀请进群。\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"shield-label shield-label-green\"\u003e【绿色】\u003csvg aria-hidden=\"true\" class=\"svg-icon trust-icon green\"\u003e\u003cuse href=\"#icon-chat-trust\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/span\u003e盾牌的核心作用：\u003c/p\u003e\n\u003cp\u003e\u003cdel\u003e盾牌的核心作用\u003c/del\u003e\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e帮助坐席判断对方是否为可信互动对象。\u003c/li\u003e\u003cli\u003e降低主动发消息时触发风控的概率。\u003c/li\u003e\u003cli\u003e支持星辰协议账号之间共享可信标识。\u003c/li\u003e\u003cli\u003e不需要先加好友，也可以基于已有对话进行后续操作。\u003c/li\u003e\u003c/ol\u003e\n\u003cp\u003e\u003cspan class=\"shield-label shield-label-orange\"\u003e【橙色】\u003csvg aria-hidden=\"true\" class=\"svg-icon trust-icon yellow\"\u003e\u003cuse href=\"#icon-chat-trust\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/span\u003e盾牌超能力是官方新风控导致的产物。\u003c/p\u003e\n\u003cp\u003e\u003cspan class=\"shield-label shield-label-orange\"\u003e【橙色】\u003csvg aria-hidden=\"true\" class=\"svg-icon trust-icon yellow\"\u003e\u003cuse href=\"#icon-chat-trust\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/span\u003e盾牌的核心作用：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e有限度地可以尝试主动联系对方，【大概率】只会先触发【限制】而不是【封号】。\u003c/li\u003e\u003cli\u003e如果确定对方会因为你主动联系而回复，橙色盾牌等效于绿色盾牌，且会在对方【回复消息】后变绿。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、盾牌如何产生\u003c/h2\u003e\n\u003cp\u003e\u003cdel\u003e只要粉丝主动发消息，或者回复过你的消息，就会获取盾牌标识。\u003c/del\u003e\u003c/p\u003e\n\u003cp\u003e只要粉丝主动给你发消息，或者回复过你的消息，你就会获取粉丝的\u003cspan class=\"shield-label shield-label-green\"\u003e【绿色】\u003csvg aria-hidden=\"true\" class=\"svg-icon trust-icon green\"\u003e\u003cuse href=\"#icon-chat-trust\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/span\u003e盾牌标识。\u003c/p\u003e\n\u003cp\u003e\u003cdel\u003e所有星辰协议的盾牌标识是共享的。例如账号 A 获取了粉丝 1 的盾牌，账号 B 或新注册账号 C 也可以直接向粉丝 1 发起聊天，并降低触发风控的风险。\u003c/del\u003e\u003c/p\u003e\n\u003cp\u003e官方新版风控规则，所有的\u003cspan class=\"shield-label shield-label-orange\"\u003e【橙色】\u003csvg aria-hidden=\"true\" class=\"svg-icon trust-icon yellow\"\u003e\u003cuse href=\"#icon-chat-trust\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/span\u003e盾牌标识是共享的。\u003cspan class=\"shield-label shield-label-green\"\u003e【绿色】\u003csvg aria-hidden=\"true\" class=\"svg-icon trust-icon green\"\u003e\u003cuse href=\"#icon-chat-trust\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/span\u003e盾牌的标识是不共享的。例如账号 A 获取了粉丝 1 的\u003cspan class=\"shield-label shield-label-green\"\u003e【绿色】\u003csvg aria-hidden=\"true\" class=\"svg-icon trust-icon green\"\u003e\u003cuse href=\"#icon-chat-trust\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/span\u003e盾牌，账号 B 或新注册账号 C【只会】获得粉丝 1 的\u003cspan class=\"shield-label shield-label-orange\"\u003e【橙色】\u003csvg aria-hidden=\"true\" class=\"svg-icon trust-icon yellow\"\u003e\u003cuse href=\"#icon-chat-trust\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/span\u003e盾牌，A 和粉丝 1 聊天是低风控风险的。但是 B、C 和粉丝 1 主动聊天，大概率还是有可能触发限制，少概率会封号；需要粉丝 1 回复了，盾牌才会变成\u003cspan class=\"shield-label shield-label-green\"\u003e【绿色】\u003csvg aria-hidden=\"true\" class=\"svg-icon trust-icon green\"\u003e\u003cuse href=\"#icon-chat-trust\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/span\u003e，风控风险才会降低。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/2Hxz9mvm83-c9874a0d4f.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e三、如何查看是否有盾牌\u003c/h2\u003e\n\u003ch3\u003e方法一：通过联系人搜索查看\u003c/h3\u003e\n\u003cp\u003e在联系人搜索中查看目标账号，如果该账号有盾牌标识，说明已经属于可信互动对象。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/DrNF3J4ryC-861e19482d.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch3\u003e方法二：通过群组或社群成员查看\u003c/h3\u003e\n\u003cp\u003e进入群组或社群成员列表，找到对应成员后点击【发信息】。进入聊天会话后，可以查看对方是否有盾牌标识。\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/uJ5ty8kwJt-4b8d2f926e.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、不要为了盾牌去加好友\u003c/h2\u003e\n\u003cblockquote\u003e2026/06/04 新增：无论\u003cspan class=\"shield-label shield-label-green\"\u003e【绿色】\u003csvg aria-hidden=\"true\" class=\"svg-icon trust-icon green\"\u003e\u003cuse href=\"#icon-chat-trust\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/span\u003e盾牌还是\u003cspan class=\"shield-label shield-label-orange\"\u003e【橙色】\u003csvg aria-hidden=\"true\" class=\"svg-icon trust-icon yellow\"\u003e\u003cuse href=\"#icon-chat-trust\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/span\u003e盾牌，加好友这个风控是官方单独计算的，有不算低的封号概率。\u003c/blockquote\u003e\n\u003cp\u003e接粉收发消息本身没有风控问题，但【加好友】操作存在封号风险。根据目前统计，不管是主动添加还是被动添加好友，都可能被官方统计并触发风控。\u003c/p\u003e\n\u003cblockquote\u003e建议：不要点击【加好友】按钮。不加好友不影响聊天、建群、邀请进群等功能。\u003c/blockquote\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/2fHd-fpX-c-c7415006a6.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e五、有盾牌后可以做什么\u003c/h2\u003e\n\u003cblockquote\u003e2026/06/04 新增：下面内容限制范围是\u003cspan class=\"shield-label shield-label-green\"\u003e【绿色】\u003csvg aria-hidden=\"true\" class=\"svg-icon trust-icon green\"\u003e\u003cuse href=\"#icon-chat-trust\"\u003e\u003c/use\u003e\u003c/svg\u003e\u003c/span\u003e盾牌。\u003c/blockquote\u003e\n\u003cp\u003e不需要将对方加为好友。只要双方已经产生对话，并且对方带有盾牌，就可以继续进行以下操作：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e主动发起聊天。\u003c/li\u003e\u003cli\u003e拉对方组建群组。\u003c/li\u003e\u003cli\u003e邀请对方进入群组。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/4mfZKZNJDW-eac52f4cdb.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/1DLGvZrOGr-355cba8670.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e"},{"id":"d4fe0f681bdbb9233865dd6b","title":"星辰相比江河优势在哪里","updatedAt":"2026-05-20T23:00:25+08:00","searchText":"  星辰相比江河的核心优势，是上号后可以脱离手机集中管理，并把账号、坐席、分组、IP、进粉统计等操作统一放在 Web 端完成。       一、上号后可脱离手机操作  星辰登录 WhatsApp 账号后，可以在后台直接管理账号，不需要长期依赖手机操作。  主要优势：  1. 不需要额外安装插件。 2. 不需要先创建分组激活码。 3. 可以直接在后台完成登录上号。 4. 上号后可脱离手机进行后续操作。       二、功能集中在 Web 端  星辰把常用管理操作集中在 Web 端，减少多系统、多设备来回切换。  可直接操作的能力包括：  1. 分组绑定。 2. 坐席绑定。 3. IP 购买。 4. 账号解封申请。 5. 解封后的复接登录。 6. 服务端 24 小时保持 WhatsApp 在线。     三、进粉统计更稳定  星辰进粉不依赖用户本地网络，粉丝数据更新更快，统计更稳定。  表现为：  1. 粉丝信息更准确。 2. 数据同步更快。 3. 不容易出现卡粉。 4. 进粉后可以更快用于后续业务操作。       四、坐席系统更适合集中管理  星辰提供坐席系统，操作体验接近 WhatsApp 网页端，适合团队批量集中管理账号。  坐席系统可以用于：  1. 查看账号和会话信息。 2. 操作私聊和群聊。 3. 管理群组和社群。 4. 让后台和坐席分工协作。       五、适合什么场景  如果团队需要批量管理 WhatsApp 账号、统一分配坐席、稳定统计进粉、减少手机依赖，星辰会比单纯依赖江河更适合集中化运营。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e星辰相比江河的核心优势，是上号后可以脱离手机集中管理，并把账号、坐席、分组、IP、进粉统计等操作统一放在 Web 端完成。\u003c/strong\u003e\u003c/p\u003e\n\u003ch2\u003e一、上号后可脱离手机操作\u003c/h2\u003e\n\u003cp\u003e星辰登录 WhatsApp 账号后，可以在后台直接管理账号，不需要长期依赖手机操作。\u003c/p\u003e\n\u003cp\u003e主要优势：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e不需要额外安装插件。\u003c/li\u003e\u003cli\u003e不需要先创建分组激活码。\u003c/li\u003e\u003cli\u003e可以直接在后台完成登录上号。\u003c/li\u003e\u003cli\u003e上号后可脱离手机进行后续操作。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/U2WCdVWw8R-eb78cb4f37.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e二、功能集中在 Web 端\u003c/h2\u003e\n\u003cp\u003e星辰把常用管理操作集中在 Web 端，减少多系统、多设备来回切换。\u003c/p\u003e\n\u003cp\u003e可直接操作的能力包括：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e分组绑定。\u003c/li\u003e\u003cli\u003e坐席绑定。\u003c/li\u003e\u003cli\u003eIP 购买。\u003c/li\u003e\u003cli\u003e账号解封申请。\u003c/li\u003e\u003cli\u003e解封后的复接登录。\u003c/li\u003e\u003cli\u003e服务端 24 小时保持 WhatsApp 在线。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e三、进粉统计更稳定\u003c/h2\u003e\n\u003cp\u003e星辰进粉不依赖用户本地网络，粉丝数据更新更快，统计更稳定。\u003c/p\u003e\n\u003cp\u003e表现为：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e粉丝信息更准确。\u003c/li\u003e\u003cli\u003e数据同步更快。\u003c/li\u003e\u003cli\u003e不容易出现卡粉。\u003c/li\u003e\u003cli\u003e进粉后可以更快用于后续业务操作。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/-H5WM8U_Mc-01ec03bc23.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e四、坐席系统更适合集中管理\u003c/h2\u003e\n\u003cp\u003e星辰提供坐席系统，操作体验接近 WhatsApp 网页端，适合团队批量集中管理账号。\u003c/p\u003e\n\u003cp\u003e坐席系统可以用于：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e查看账号和会话信息。\u003c/li\u003e\u003cli\u003e操作私聊和群聊。\u003c/li\u003e\u003cli\u003e管理群组和社群。\u003c/li\u003e\u003cli\u003e让后台和坐席分工协作。\u003c/li\u003e\u003c/ol\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/EYfCDIV0Vd-c82b266249.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e五、适合什么场景\u003c/h2\u003e\n\u003cp\u003e如果团队需要批量管理 WhatsApp 账号、统一分配坐席、稳定统计进粉、减少手机依赖，星辰会比单纯依赖江河更适合集中化运营。\u003c/p\u003e"},{"id":"07e22c3e84fe58064e09a284","title":"为什么不建议加好友","updatedAt":"2026-05-20T22:44:03+08:00","searchText":"  本文说明为什么不建议在星辰中频繁点击【加好友】，以及有盾牌和无盾牌账号在页面上的区别。    \u003e 注意：不加好友不影响聊天、建群、邀请进群等正常功能。为了降低账号风控风险，建议不要主动点击【加好友】。     一、为什么不建议加好友  根据当前统计，不管是主动添加好友，还是被动添加好友，都可能被官方记录并触发风控。  加好友可能带来的风险：  1. 增加账号被官方风控的概率。 2. 增加账号被限制或封禁的风险。 3. 大量、频繁点击【加好友】更容易被识别为异常操作。     二、什么情况下会显示加好友按钮  只有带有信任盾牌的账号，页面才会显示【添加好友】按钮。没有信任盾牌的账号，不会显示该按钮。  有信任盾牌时，页面会显示添加好友入口：    没有信任盾牌时，页面不会显示添加好友入口：       三、推荐怎么做  1. 不要为了使用功能去点击【加好友】。 2. 只要已经产生对话，并且对方有盾牌，就可以正常聊天。 3. 建群、邀请进群等操作不依赖加好友。 4. 如果业务必须操作，请控制频率，不要短时间大量点击。  \u003e 建议：优先通过正常聊天、群聊、邀请进群完成业务，不要把【加好友】作为常规操作。 ","html":"\u003cp class=\"lead\"\u003e\u003cstrong\u003e本文说明为什么不建议在星辰中频繁点击【加好友】，以及有盾牌和无盾牌账号在页面上的区别。\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e注意：不加好友不影响聊天、建群、邀请进群等正常功能。为了降低账号风控风险，建议不要主动点击【加好友】。\u003c/blockquote\u003e\n\u003ch2\u003e一、为什么不建议加好友\u003c/h2\u003e\n\u003cp\u003e根据当前统计，不管是主动添加好友，还是被动添加好友，都可能被官方记录并触发风控。\u003c/p\u003e\n\u003cp\u003e加好友可能带来的风险：\u003c/p\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e增加账号被官方风控的概率。\u003c/li\u003e\u003cli\u003e增加账号被限制或封禁的风险。\u003c/li\u003e\u003cli\u003e大量、频繁点击【加好友】更容易被识别为异常操作。\u003c/li\u003e\u003c/ol\u003e\n\u003ch2\u003e二、什么情况下会显示加好友按钮\u003c/h2\u003e\n\u003cp\u003e只有带有信任盾牌的账号，页面才会显示【添加好友】按钮。没有信任盾牌的账号，不会显示该按钮。\u003c/p\u003e\n\u003cp\u003e有信任盾牌时，页面会显示添加好友入口：\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/pXXBreV0yY-1030fe8236.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003cp\u003e没有信任盾牌时，页面不会显示添加好友入口：\u003c/p\u003e\n\u003cfigure\u003e\u003cimg src=\"./assets/images/MR0aO9KIo2-dcc96a89e8.png\" alt=\"\" loading=\"lazy\"\u003e\u003c/figure\u003e\n\u003ch2\u003e三、推荐怎么做\u003c/h2\u003e\n\u003col class=\"doc-list\"\u003e\u003cli\u003e不要为了使用功能去点击
